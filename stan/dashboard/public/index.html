              setPrefs({ ...DEFAULT_PREFS, ...server });
            }
            setLoaded(true);
          })
          .catch(() => { if (!cancelled) setLoaded(true); });
        return () => { cancelled = true; };
      }, []);

      // Session-only update (doesn't persist). Used by view buttons.
      const setPref = useCallback((key, value) => {
        setPrefs(p => ({ ...p, [key]: value }));
      }, []);

      // Persist the current prefs to localStorage. Called by the
      // explicit "Set as default" button so casual view-switching
      // doesn't silently change the user's default.
      const saveDefaults = useCallback((override) => {
        try {
          const snap = {
            ...(override || prefs),
            last_updated: new Date().toISOString(),
          };
          window.localStorage.setItem(PREFS_STORAGE_KEY, JSON.stringify(snap));
        } catch (_) {}
      }, [prefs]);

      return { prefs, setPref, saveDefaults, prefsLoaded: loaded };
    }

    /* ── ViewSelector — segmented control for the three views ───── */
    function ViewSelector({ value, onChange, onSetDefault, savedDefault }) {
      const options = [
        { key: 'gauges',       label: 'Gauges' },
        { key: 'weekly_table', label: 'Weekly table' },
        { key: 'matrix',       label: 'Metric matrix' },
      ];
      return (
        <div style={{display:'flex', gap:'0.5rem', alignItems:'center',
                     marginBottom:'0.75rem', flexWrap:'wrap'}}>
          <div role="radiogroup" aria-label="Front page view"
               style={{display:'inline-flex', border:'0.5px solid var(--border)',
                       borderRadius:'0.4rem', overflow:'hidden'}}>
            {options.map((o, i) => {
              const active = value === o.key;
              return (
                <button key={o.key}
                  role="radio"
                  aria-checked={active}
                  onClick={() => onChange(o.key)}
                  style={{
                    padding:'0 0.8rem', height:'28px', fontSize:'12.5px',
                    background: active ? 'var(--bg)' : 'var(--surface)',
                    color: active ? 'var(--accent)' : 'var(--muted)',
                    fontWeight: active ? 700 : 500,
                    border:'none',
                    borderLeft: i === 0 ? 'none' : '0.5px solid var(--border)',
                    cursor:'pointer', outline:'none',
                  }}>
                  {o.label}
                </button>
              );
            })}
          </div>
          <button
            onClick={onSetDefault}
            title={savedDefault === value
              ? 'Already saved as your default'
              : 'Save the current view as your per-browser default'}
            disabled={savedDefault === value}
            style={{
              padding:'0 0.6rem', height:'28px', fontSize:'11.5px',
              background:'transparent',
              color: savedDefault === value ? 'var(--muted)' : 'var(--accent)',
              border:'0.5px solid var(--border)',
              borderRadius:'0.4rem',
              cursor: savedDefault === value ? 'default' : 'pointer',
              opacity: savedDefault === value ? 0.6 : 1,
            }}>
            {savedDefault === value ? '✓ Default saved' : '⚙ Set as default'}
          </button>
        </div>
      );
    }

    /* ── FilterBar — shared filter controls for all three views ──── */
    function FilterBar({ filters, onChange, instrumentNames, ms1Format, onMs1Format }) {
      const sel = {
        height:'26px', fontSize:'12px', padding:'0 0.4rem',
        background:'var(--surface)', color:'var(--text)',
        border:'0.5px solid var(--border)', borderRadius:'0.3rem',
      };
      return (
        <div style={{display:'flex', gap:'0.75rem', alignItems:'center',
                     marginBottom:'0.75rem', flexWrap:'wrap', fontSize:'12px',
                     color:'var(--muted)'}}>
          <label style={{display:'flex', gap:'0.3rem', alignItems:'center'}}>
            Instrument:
            <select style={sel} value={filters.instrument}
              onChange={e => onChange({ ...filters, instrument: e.target.value })}>
              <option value="__all__">All</option>
              {instrumentNames.map(n => <option key={n} value={n}>{n}</option>)}
            </select>
          </label>
          <label style={{display:'flex', gap:'0.3rem', alignItems:'center'}}>
            Since:
            <select style={sel} value={filters.sinceDays}
              onChange={e => onChange({ ...filters, sinceDays: Number(e.target.value) })}>
              <option value={1}>24h</option>
              <option value={7}>7d</option>
              <option value={14}>14d</option>
              <option value={30}>30d</option>
            </select>
          </label>
          <label style={{display:'flex', gap:'0.3rem', alignItems:'center'}}>
            Sample:
            <select style={sel} value={filters.sample}
              onChange={e => onChange({ ...filters, sample: e.target.value })}>
              <option value="hela">HeLa QC only</option>
              <option value="all">All QC runs</option>
            </select>
          </label>
          {ms1Format && (
            <label style={{display:'flex', gap:'0.3rem', alignItems:'center',
                           marginLeft:'auto'}}>
              MS1 AUC:
              <select style={sel} value={ms1Format}
                onChange={e => onMs1Format(e.target.value)}>
                <option value="sci">sci (8.6e10)</option>
                <option value="short">short (86.0B)</option>
              </select>
            </label>
          )}
        </div>
      );
    }

    /* ── WeeklyTableView ─────────────────────────────────────────── */
    // One row per QC run, grouped by day, numeric values visible for
    // each of the four metrics + tint + thin 3-px range bar. Answers
    // "give me the numbers for the week" directly.
    function WeeklyTableView({ runs, allRuns, ms1Format }) {
      if (!runs || runs.length === 0) {
        return (
          <div className="card" style={{marginBottom:'1.5rem', color:'var(--muted)'}}>
            No QC runs this week.{' '}
            <a href="#" onClick={e => {
              e.preventDefault();
              // naive hop to history tab — keeps behavior if we add a
              // real router later. The tab state lives in App().
              window.dispatchEvent(new CustomEvent('stan:gotoTab', { detail: 'history' }));
            }} style={{color:'var(--accent)'}}>Open QC History →</a>
          </div>
        );
      }

      const baselines = computeBaselines(allRuns, 30);

      // Per-metric min/max across the displayed runs (for the range bar).
      const weekRange = {};
      for (const m of METRIC_CONFIG) {
        const vals = runs.map(r => readMetric(r, m).value).filter(v => v != null && v > 0);
        if (vals.length) {
          weekRange[m.key] = { min: Math.min(...vals), max: Math.max(...vals) };
        } else {
          weekRange[m.key] = null;
        }
      }

      // Group by day.
      const byDay = {};
      for (const r of runs) {
        const d = new Date(r.run_date);
        const key = d.toDateString();
        (byDay[key] ||= []).push(r);
      }
      // Iterate newest→oldest
      const dayKeys = Object.keys(byDay).sort((a, b) => new Date(b) - new Date(a));

      function medianOf(arr, m) {
        const v = arr.map(r => readMetric(r, m).value).filter(x => x != null && x > 0);
        if (!v.length) return null;
        v.sort((a, b) => a - b);
        const mid = Math.floor(v.length / 2);
        return v.length % 2 ? v[mid] : (v[mid - 1] + v[mid]) / 2;
      }

      const th = {padding:'0.4rem 0.5rem', fontSize:'11.5px', color:'var(--muted)',
                  borderBottom:'1px solid var(--border)', textAlign:'left',
                  whiteSpace:'nowrap'};
      const thR = {...th, textAlign:'right'};
      const td = {padding:'0.4rem 0.5rem', fontSize:'12.5px',
                  borderBottom:'1px solid var(--border)', whiteSpace:'nowrap',
                  fontVariantNumeric:'tabular-nums'};

      return (
        <div className="card" style={{marginBottom:'1.5rem', padding:'0.75rem 0.9rem'}}>
          <div style={{fontSize:'0.95rem', color:'var(--accent)', marginBottom:'0.5rem',
                       fontWeight:600}}>
            This Week's QCs — {runs.length} run{runs.length === 1 ? '' : 's'}
          </div>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%', borderCollapse:'collapse'}}>
              <thead>
                <tr>
                  <th style={th}>Time</th>
                  <th style={th}>Sample</th>
                  <th style={th}>Mode</th>
                  {METRIC_CONFIG.map(m => (
                    <th key={m.key} style={thR}>{m.label}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {dayKeys.map(dk => {
                  const dayRuns = byDay[dk].sort(
                    (a, b) => new Date(b.run_date) - new Date(a.run_date)
                  );
                  const dLabel = new Date(dk).toLocaleDateString([], {
                    weekday: 'short', month: 'short', day: 'numeric',
                  });
                  return (
                    <React.Fragment key={dk}>
                      <tr style={{background:'rgba(218,170,0,0.06)'}}>
                        <td colSpan={3} style={{...td, fontWeight:600,
                                                color:'var(--accent)'}}>
                          {dLabel} · {dayRuns.length} run{dayRuns.length === 1 ? '' : 's'}
                        </td>
                        {METRIC_CONFIG.map(m => {
                          const med = medianOf(dayRuns, m);
                          return (
                            <td key={m.key} style={{...td, textAlign:'right',
                                                    color:'var(--muted)',
                                                    fontStyle:'italic'}}
                                title={`Day median`}>
                              {med == null ? '—' : (m.key === 'tic_auc'
                                ? formatMs1(med, ms1Format)
                                : Math.round(med).toLocaleString())}
                            </td>
                          );
                        })}
                      </tr>
                      {dayRuns.map(r => {
                        const inst = r.instrument;
                        const base = baselines[inst] || {};
                        return (
                          <tr key={r.id || r.run_id}>
                            <td style={td} title={new Date(r.run_date).toLocaleString()}>
                              {new Date(r.run_date).toLocaleTimeString(
                                [], {hour: '2-digit', minute: '2-digit'}
                              )}
                            </td>
                            <td style={{...td, maxWidth:'22ch', overflow:'hidden',
                                        textOverflow:'ellipsis'}}
                                title={r.run_name}>
                              {r.run_name}
                            </td>
                            <td style={td}>{r.mode || '—'}</td>
                            {METRIC_CONFIG.map(m => {
                              const { value: v, viaFallback } = readMetric(r, m);
                              const pct = pctFromBaseline(v, base[m.key]);
                              const tint = tintFor(pct);
                              const range = weekRange[m.key];
                              const barPct = (v != null && range && range.max > range.min)
                                ? ((v - range.min) / (range.max - range.min)) * 100
                                : null;
                              return (
                                <td key={m.key}
                                    style={{...td, textAlign:'right',
                                            background: tint, position:'relative',
                                            minWidth:'6.5rem'}}
                                    title={pct != null
                                      ? `${pct >= 0 ? '+' : ''}${pct.toFixed(1)}% vs 30-run baseline`
                                      + (viaFallback ? ` (via ${m.ddaFallback})` : '')
                                      : (viaFallback ? `via ${m.ddaFallback}` : '')}>
                                  <span>{formatMetric(m.key, v, ms1Format)}</span>
                                  {viaFallback && v != null && (
                                    <span style={{fontSize:'0.65rem',
                                                  color:'var(--muted)',
                                                  marginLeft:'0.25rem'}}>*</span>
                                  )}
                                  {barPct != null && (
                                    <div style={{height:'3px',
                                                 background:'rgba(255,255,255,0.08)',
                                                 marginTop:'3px',
                                                 borderRadius:'2px',
                                                 overflow:'hidden'}}>
                                      <div style={{width:`${barPct}%`, height:'100%',
                                                   background:'var(--accent)'}} />
                                    </div>
                                  )}
                                </td>
                              );
                            })}
                          </tr>
                        );
                      })}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div style={{marginTop:'0.4rem', fontSize:'0.7rem', color:'var(--muted)'}}>
            Tint: green ≥ +4% vs 30-run baseline · amber −4% to −12% · red ≤ −12% ·
            bar scale = this week's min/max per metric ·
            <span style={{marginLeft:'0.2rem'}}>* = value via DDA fallback column</span>
            {/* TODO (SPEC §7 column-tracking): show a visual divider in
                the table if a column change happened mid-week. Waiting
                on TODO #18 (longitudinal column tracking). */}
          </div>
        </div>
      );
    }

    /* ── MetricMatrixView ────────────────────────────────────────── */
    // Transposed heatmap: rows = 4 metrics, columns = QC runs across
    // the week. Surfaces decoupling between metrics that gauges and
    // per-run tables can't. Column click → deep-link to run detail.
    function MetricMatrixView({ runs, allRuns, ms1Format }) {
      if (!runs || runs.length === 0) {
        return (
          <div className="card" style={{marginBottom:'1.5rem', color:'var(--muted)'}}>
            No QC runs in the selected window.
          </div>
        );
      }

      const baselines = computeBaselines(allRuns, 30);
      const ordered = [...runs].sort(
        (a, b) => new Date(a.run_date) - new Date(b.run_date)
      );

      // Where each day begins in the ordered list — we draw a 1-px
      // vertical divider on those boundaries.
      const dayStarts = new Set();
      let lastDay = null;
      ordered.forEach((r, i) => {
        const d = new Date(r.run_date).toDateString();
        if (d !== lastDay) { dayStarts.add(i); lastDay = d; }
      });

      const cellStyle = {
        padding: '0.35rem 0.5rem', fontSize: '12px',
        fontVariantNumeric: 'tabular-nums', whiteSpace: 'nowrap',
        textAlign: 'right', borderBottom: '1px solid var(--border)',
      };
      const headerCellStyle = {
        ...cellStyle, color: 'var(--muted)', fontSize: '11px',
        borderBottom: '1px solid var(--border)', cursor: 'pointer',
        fontWeight: 500,
      };
      const labelColStyle = {
        ...cellStyle, textAlign: 'left', position: 'sticky', left: 0,
        background: 'var(--surface)', fontWeight: 600,
        color: 'var(--accent)', zIndex: 2,
      };

      // When a column header is clicked, hop to the run detail.
      // LiveRuns doesn't own a router, so we dispatch a window event
      // the History tab (or a future run-detail panel) can listen for.
      function openRun(r) {
        const id = r.id || r.run_id;
        if (!id) return;
        window.dispatchEvent(new CustomEvent('stan:openRun', { detail: { id } }));
      }

      return (
        <div className="card" style={{marginBottom:'1.5rem', padding:'0.75rem 0.9rem'}}>
          <div style={{fontSize:'0.95rem', color:'var(--accent)', marginBottom:'0.5rem',
                       fontWeight:600}}>
            Metric matrix — {ordered.length} run{ordered.length === 1 ? '' : 's'}
          </div>
          <div style={{overflowX:'auto'}}>
            <table style={{borderCollapse:'collapse',
                           borderSpacing:0}}>
              <thead>
                <tr>
                  <th style={{...labelColStyle, top:0, zIndex:3,
                              borderBottom:'1px solid var(--border)'}}></th>
                  {ordered.map((r, i) => {
                    const d = new Date(r.run_date);
                    const showDay = dayStarts.has(i);
                    return (
                      <th key={(r.id || r.run_id) + '_' + i}
                          onClick={() => openRun(r)}
                          title={`${r.run_name}\n${d.toLocaleString()}\nClick to open run detail`}
                          style={{...headerCellStyle,
                                  borderLeft: dayStarts.has(i) && i !== 0
                                    ? '1px solid var(--accent)'
                                    : 'none'}}>
                        {showDay && (
                          <div style={{fontWeight:600, color:'var(--text)',
                                       fontSize:'10.5px'}}>
                            {d.toLocaleDateString([], {weekday:'short', day:'numeric'})}
                          </div>
                        )}
                        <div>{d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                      </th>
                    );
                  })}
                </tr>
              </thead>
              <tbody>
                {METRIC_CONFIG.map(m => (
                  <tr key={m.key}>
                    <td style={labelColStyle}>{m.label}</td>
                    {ordered.map((r, i) => {
                      const { value: v, viaFallback } = readMetric(r, m);
                      const base = (baselines[r.instrument] || {})[m.key];
                      const pct = pctFromBaseline(v, base);
                      return (
                        <td key={(r.id || r.run_id) + '_' + m.key}
                            style={{...cellStyle, background: tintFor(pct),
                                    borderLeft: dayStarts.has(i) && i !== 0
                                      ? '1px solid var(--accent)'
                                      : 'none'}}
                            title={(v == null
                              ? 'no value'
                              : `${r.run_name}\n${m.label}: ${formatMetric(m.key, v, ms1Format)}`
                                + (pct != null
                                    ? `\n${pct >= 0 ? '+' : ''}${pct.toFixed(1)}% vs 30-run baseline`
                                    : '')
                                + (viaFallback ? `\n(via ${m.ddaFallback})` : ''))}>
                          {formatMetric(m.key, v, ms1Format)}
                          {viaFallback && v != null && (
                            <span style={{fontSize:'0.65rem',
                                          color:'var(--muted)',
                                          marginLeft:'0.15rem'}}>*</span>
                          )}
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{marginTop:'0.4rem', fontSize:'0.7rem', color:'var(--muted)'}}>
            Click a column header to jump to that run · dividers mark day boundaries ·
            tint matches the weekly-table scale (±4 / ±12%)
          </div>
        </div>
      );
    }

    function LiveRuns() {
      // qc_only=True is the default on /api/runs, but we pass it
      // explicitly to lock in the invariant documented in SPEC §3
      // ("Only QC-classified runs are ever displayed").
      const { data: allRuns, loading, reload, error } = useFetch('/api/runs?limit=200&qc_only=True');
      const { data: warningsData } = useFetch('/api/warnings');
      useEffect(() => { const t = setInterval(reload, 15000); return () => clearInterval(t); }, [reload]);

      // v0.2.106: front-page view selector state. Prefs drive the
      // initial view; session-only filter state sits alongside.
      const { prefs, setPref, saveDefaults, prefsLoaded } = usePreferences();
      const [filters, setFilters] = useState({
        instrument: '__all__',
        sinceDays: 7,
        sample: 'hela',
      });
      // Track what value is currently saved as the user's default
      // (so the "Set as default" button can render a checkmark).
      const [savedDefault, setSavedDefault] = useState(null);
      useEffect(() => {
        try {
          const raw = window.localStorage.getItem(PREFS_STORAGE_KEY);
          if (raw) setSavedDefault((JSON.parse(raw) || {}).front_page_view || null);
        } catch (_) {}
      }, [prefsLoaded]);

      if (loading && !allRuns) return <div className="empty">Loading...</div>;
      // Defensive: /api/runs should return an array but a server error may
      // return {detail:"…"}. Treat anything non-array as "no runs yet".
      if (!Array.isArray(allRuns) || allRuns.length === 0) {
        return <div className="empty">No QC runs yet. Start the watcher to begin monitoring.</div>;
      }

      // Apply the session filters. Same 7-day default as before, but
      // the user can now widen / narrow via the FilterBar.
      const sinceCutoff = new Date(Date.now() - filters.sinceDays * 86400000);
      const runs = allRuns.filter(r => {
        if (new Date(r.run_date) < sinceCutoff) return false;
        if (filters.instrument !== '__all__' && r.instrument !== filters.instrument) return false;
        if (filters.sample === 'hela' && !isHelaRun(r)) return false;
        return true;
      });
      const instrumentNames = Array.from(
        new Set(allRuns.map(r => r.instrument).filter(Boolean))
      ).sort();

      // Show most recent per instrument (always, even if not today)
      const byInstrument = {};
      for (const r of allRuns) {
        if (!byInstrument[r.instrument]) byInstrument[r.instrument] = r;
      }

      // v0.2.172: surface drift alerts prominently. Any recent run
      // with drift_class in ('warn', 'drifted') triggers a banner
      // at the top of the page. Brett asked for a "clear warning"
      // so operators see it without scrolling to find the badge.
      const driftAlerts = runs
        .filter(r => r.drift_class === 'drifted' || r.drift_class === 'warn')
        .sort((a, b) => new Date(b.run_date) - new Date(a.run_date));
      const worstDrift = driftAlerts.find(r => r.drift_class === 'drifted')
                         || driftAlerts[0];

      // v0.2.174: stale-instrument-name warning. Surfaced when a DB
      // instrument name has recent runs but isn't configured in
      // instruments.yml — almost always means rename cleanup was missed
      // and the homepage is showing two cards for one physical instrument.
      const staleNameWarnings = (warningsData?.warnings || [])
        .filter(w => w.kind === 'stale_instrument_name');

      return (
        <div>
          {staleNameWarnings.length > 0 && (
            <div style={{
              background: 'rgba(234,179,8,0.18)',
              border: '1px solid #ca8a04',
              borderLeft: '5px solid #ca8a04',
              borderRadius: '0.35rem',
              padding: '0.75rem 1rem',
              marginBottom: '1rem',
            }}>
              <div style={{fontWeight:700, fontSize:'0.95rem', color:'#fde68a'}}>
                Duplicate instrument cards detected
              </div>
              <div style={{fontSize:'0.8rem', color:'var(--muted)', marginTop:'0.25rem'}}>
                {staleNameWarnings.length === 1
                  ? 'One instrument name is'
                  : `${staleNameWarnings.length} instrument names are`} in the DB with recent runs
                but missing from your <code>instruments.yml</code>. This usually
                means a rename left orphan runs that now render as a separate card.
                Merge them with <code>stan fix-instrument-names</code>:
              </div>
              <ul style={{margin:'0.35rem 0 0.1rem 1.25rem', padding:0, fontSize:'0.78rem'}}>
                {staleNameWarnings.map((w, i) => (
                  <li key={`stale-${i}`} style={{marginBottom:'0.2rem'}}>
                    <strong style={{color:'var(--text)'}}>{w.stale_name}</strong>
                    {' '}({w.recent_run_count} recent run{w.recent_run_count === 1 ? '' : 's'})
                    {w.suggested_targets?.length > 0 && (
                      <span style={{color:'var(--muted)'}}>
                        {' → merge into one of: '}
                        {w.suggested_targets.map((t, ti) => (
                          <code key={t} style={{marginRight:'0.3rem'}}>"{t}"</code>
                        ))}
                      </span>
                    )}
                    <div style={{color:'#cbd5e1', fontFamily:'monospace', fontSize:'0.72rem', marginTop:'0.15rem'}}>
                      stan fix-instrument-names --from "{w.stale_name}" --to "&lt;target&gt;"
                    </div>
                  </li>
                ))}
              </ul>
            </div>
          )}
          {worstDrift && (
            <div style={{
              background: worstDrift.drift_class === 'drifted'
                ? 'rgba(220,38,38,0.22)' : 'rgba(234,179,8,0.22)',
              border: '1px solid ' + (worstDrift.drift_class === 'drifted'
                ? '#dc2626' : '#ca8a04'),
              borderLeft: '5px solid ' + (worstDrift.drift_class === 'drifted'
                ? '#dc2626' : '#ca8a04'),
              borderRadius: '0.35rem',
              padding: '0.75rem 1rem',
              marginBottom: '1rem',
              display: 'flex',
              alignItems: 'center',
              gap: '0.75rem',
              flexWrap: 'wrap',
            }}>
              <span style={{fontSize:'1.5rem'}}>
                {worstDrift.drift_class === 'drifted' ? '🔴' : '⚠️'}
              </span>
              <div style={{flex:'1 1 auto', minWidth:0}}>
                <div style={{fontWeight:700, fontSize:'0.95rem',
                             color: worstDrift.drift_class === 'drifted' ? '#fca5a5' : '#fde68a'}}>
                  {worstDrift.drift_class === 'drifted'
                    ? 'DIA window drift detected'
                    : 'DIA window drift warning'}
                  {' '}
                  ({driftAlerts.length} run{driftAlerts.length === 1 ? '' : 's'}
                  {' '}in the last 7 days)
                </div>
                <div style={{fontSize:'0.8rem', color:'var(--muted)', marginTop:'0.15rem'}}>
                  Most recent: <strong style={{color:'var(--text)'}}>
                    {worstDrift.run_name}</strong>
                  {' '}on <strong style={{color:'var(--text)'}}>{worstDrift.instrument}</strong>
                  {' '}at {new Date(worstDrift.run_date).toLocaleString([], {
                    month:'short', day:'numeric', hour:'2-digit', minute:'2-digit',
                  })}
                  {' · coverage '}<strong style={{color:'var(--text)'}}>
                    {(worstDrift.drift_coverage * 100).toFixed(1)}%</strong>
                  {' · median drift '}<strong style={{color:'var(--text)'}}>
                    {(worstDrift.drift_median_im >= 0 ? '+' : '') + worstDrift.drift_median_im.toFixed(3)} /K0
                  </strong>
                </div>
                <div style={{fontSize:'0.75rem', color:'var(--muted)', marginTop:'0.25rem'}}>
                  Click the drift badge on the run's row for the per-window scatter chart.
                  Usual causes: column resettling (transient - resolves after 10-20 runs),
                  method-file mismatch (load the right DIA-PASEF method), or mobility recalibration needed.
                </div>
              </div>
            </div>
          )}
          {/* v0.2.106: three-way view selector (Gauges / Weekly table /
              Metric matrix). All three consume the same in-memory
              `runs` so switching is instant with no refetch. */}
          <ViewSelector
            value={prefs.front_page_view}
            onChange={v => setPref('front_page_view', v)}
            onSetDefault={() => {
              saveDefaults({ ...prefs });
              setSavedDefault(prefs.front_page_view);
            }}
            savedDefault={savedDefault}
          />
          <FilterBar
            filters={filters}
            onChange={setFilters}
            instrumentNames={instrumentNames}
            ms1Format={prefs.front_page_view !== 'gauges' ? prefs.ms1_format : null}
            onMs1Format={v => setPref('ms1_format', v)}
          />
          {prefs.front_page_view === 'gauges' && (
            runs.length > 0 ? (
              <GaugesView runs={runs} />
            ) : (
              <div className="card" style={{marginBottom:'1.5rem'}}>
                <div style={{color:'var(--muted)'}}>
                  No QC runs in the selected window. Showing most recent per instrument below.
                </div>
              </div>
            )
          )}
          {prefs.front_page_view === 'weekly_table' && (
            <WeeklyTableView runs={runs} allRuns={allRuns} ms1Format={prefs.ms1_format} />
          )}
          {prefs.front_page_view === 'matrix' && (
            <MetricMatrixView runs={runs} allRuns={allRuns} ms1Format={prefs.ms1_format} />
          )}
          {/* v0.2.154: two-zone layout — instrument cards on the left,
              WeekHeatmap filling the right. When instrument count >= 4
              we fall back to the original auto-fill grid (no heatmap)
              so 4+ cards aren't squeezed into 1/3 of the width. */}
          {(() => {
            const instruments = Object.entries(byInstrument);
            const nInst = instruments.length;
            const useTwoZone = nInst > 0 && nInst <= 3;
            const instrumentCards = instruments.map(([name, run]) => (
              <div className="card" key={name}>
                <h3 style={{display:'flex', alignItems:'center', gap:'0.5rem', flexWrap:'wrap'}}>
                  {name}
                  <LastQcBadge instrument={name} />
                </h3>
                <ColumnLifeBadge instrument={name} />
                <div className="metric"><span className="metric-label">Last run</span><span className="metric-value" title={run.run_name} style={{maxWidth:'60%', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{run.run_name}</span></div>
                <div className="metric"><span className="metric-label">Mode</span><span className="metric-value">{run.mode}</span></div>
                <div className="metric"><span className="metric-label">IPS</span><span className="badge badge-grs">IPS {run.ips_score || '—'}</span></div>
                <div className="metric">
                  <span className="metric-label">PEG / Drift</span>
                  <span style={{display:'inline-flex', gap:'0.3rem'}}>
                    <PegBadge run={run} /><DriftBadge run={run} />
                  </span>
                </div>
                {run.mode === 'DIA' && <div className="metric"><span className="metric-label">Precursors</span><span className="metric-value">{run.n_precursors?.toLocaleString()}</span></div>}
                {run.mode === 'DDA' && <div className="metric"><span className="metric-label">PSMs</span><span className="metric-value">{run.n_psms?.toLocaleString()}</span></div>}
                <div className="metric"><span className="metric-label">Time</span><span className="metric-value" title={new Date(run.run_date).toLocaleString()}>{new Date(run.run_date).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</span></div>
                <MiniSparkline allRuns={allRuns} instrument={name} currentMode={run.mode} />
                {run.diagnosis && <div className="diagnosis">{run.diagnosis}</div>}
                <LogEventButton instrument={name} />
              </div>
            ));

            if (!useTwoZone) {
              return <div className="grid">{instrumentCards}</div>;
            }
            // Two-zone grid: instrument cards get enough columns for their
            // count, heatmap fills the rest. The `--inst-cols` var and
            // `1fr` trailing track mean 1 card takes 33%, 2 cards take
            // 50%, 3 cards take 66% — heatmap always gets the remainder.
            const gridTemplate =
              nInst === 1 ? 'minmax(300px, 380px) 1fr'
              : nInst === 2 ? 'minmax(300px, 360px) minmax(300px, 360px) 1fr'
              : 'minmax(280px, 340px) minmax(280px, 340px) minmax(280px, 340px) 1fr';
            return (
              <div style={{display:'grid', gridTemplateColumns: gridTemplate,
                           gap:'1rem', alignItems:'start'}}>
                {instrumentCards}
                <WeekHeatmap instruments={instruments.map(([n]) => n)} />
              </div>
            );
          })()}
          <TodayTicOverlay />
        </div>
      );
    }

    // WeekHeatmap (v0.2.154, expanded v0.2.174) — Week-at-a-glance status
    // grid filling the right zone of "This Week's QCs".
    // Rows = instrument × {QC, Sample, Blank} · Columns = last 7 days.
    // Cell content = run count that day for that class.
    // Colors:
    //   QC cells: green=IPS≥70, amber=40–69, red=<40 (QC passes color-graded)
    //   Sample/Blank cells: blue=runs present, dim=no runs (no QC score)
    // Uses /api/today/tic-overview which returns facets={qc, sample, blank}
    // classified by filename pattern (see _classify_run_class on server).
    function WeekHeatmap({ instruments }) {
      const { data: overview } = useFetch('/api/today/tic-overview?days=7');

      // Build 7-day array.
      const days = [];
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      for (let i = 6; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        days.push(d);
      }
      const dayKey = d => d.toISOString().slice(0, 10);

      // Collect runs from all three facets, tagged with class.
      const allFaceted = [];
      if (overview?.facets) {
        for (const cls of ['qc', 'sample', 'blank']) {
          for (const r of (overview.facets[cls] || [])) {
            allFaceted.push({ ...r, _class: cls });
          }
        }
      }

      // grid[inst][cls][dayKey] = [runs]
      const grid = {};
      for (const inst of instruments) {
        grid[inst] = { qc: {}, sample: {}, blank: {} };
        for (const cls of ['qc', 'sample', 'blank']) {
          for (const d of days) grid[inst][cls][dayKey(d)] = [];
        }
      }
      for (const r of allFaceted) {
        const rd = new Date(r.run_date);
        const k = dayKey(rd);
        if (grid[r.instrument] && k in grid[r.instrument][r._class]) {
          grid[r.instrument][r._class][k].push(r);
        }
      }

      // Cell color: QC uses IPS grading; sample/blank use activity-only blue.
      function cellStatus(cellRuns, cls) {
        if (!cellRuns.length) return { color:'rgba(100,116,139,0.15)', text:'var(--muted)' };
        if (cls !== 'qc') {
          return { color: 'rgba(96,165,250,0.22)', text: '#bfdbfe' };
        }
        const minIps = Math.min(...cellRuns.map(r => r.ips_score ?? 100));
        if (minIps < 40) return { color:'rgba(239,68,68,0.35)', text:'#fecaca' };
        if (minIps < 70) return { color:'rgba(234,179,8,0.35)', text:'#fef08a' };
        return                  { color:'rgba(34,197,94,0.30)', text:'#bbf7d0' };
      }

      const monthDayLabel = d =>
        d.toLocaleString([], { month: 'short', day: 'numeric' });

      const CLASS_LABELS = { qc: 'QC', sample: 'Sample', blank: 'Blank' };

      return (
        <div className="card" style={{padding:'0.9rem'}}>
          <h3 style={{margin:'0 0 0.4rem 0'}}>Week at a glance</h3>
          <p style={{fontSize:'0.7rem', color:'var(--muted)', margin:'0 0 0.6rem 0'}}>
            Rows = instrument × class (QC / Sample / Blank) · cell = count that day.
            QC cells colored by worst IPS (green ≥70, amber 40–69, red &lt;40).
            Sample/Blank cells blue when runs present, dim when none.
          </p>
          <div style={{display:'grid',
                       gridTemplateColumns: `minmax(110px, auto) minmax(54px, auto) repeat(7, 1fr)`,
                       gap:'0.2rem', fontSize:'0.72rem',
                       fontVariantNumeric:'tabular-nums'}}>
            {/* Header row: corner, class label header, 7 day labels */}
            <div />
            <div />
            {days.map((d, i) => (
              <div key={`h-${i}`} style={{
                textAlign:'center', color:'var(--muted)', padding:'0.15rem 0',
                fontWeight: i === 6 ? 700 : 400,
              }}>
                {monthDayLabel(d)}
              </div>
            ))}
            {/* Data rows: one block of 3 rows per instrument */}
            {instruments.map(inst => (
              <React.Fragment key={`row-${inst}`}>
                {['qc', 'sample', 'blank'].map((cls, ci) => (
                  <React.Fragment key={`row-${inst}-${cls}`}>
                    {/* Instrument name shown only on first (QC) row */}
                    <div style={{
                      gridColumn: 1,
                      color: ci === 0 ? 'var(--text)' : 'transparent',
                      padding:'0.2rem 0.3rem',
                      whiteSpace:'nowrap', overflow:'hidden',
                      textOverflow:'ellipsis', fontSize:'0.7rem',
                      fontWeight: ci === 0 ? 600 : 400,
                      borderTop: ci === 0 ? '1px solid rgba(148,163,184,0.15)' : 'none',
                    }} title={inst}>
                      {ci === 0 ? inst : ''}
                    </div>
                    <div style={{
                      color:'var(--muted)', padding:'0.2rem 0.4rem 0.2rem 0',
                      fontSize:'0.68rem', textAlign:'right',
                      borderTop: ci === 0 ? '1px solid rgba(148,163,184,0.15)' : 'none',
                    }}>
                      {CLASS_LABELS[cls]}
                    </div>
                    {days.map((d, di) => {
                      const k = dayKey(d);
                      const cellRuns = grid[inst][cls][k] || [];
                      const status = cellStatus(cellRuns, cls);
                      const tipHead = `${inst} · ${CLASS_LABELS[cls]} · ${monthDayLabel(d)}`;
                      const tip = cellRuns.length
                        ? `${tipHead}\n${cellRuns.length} run${cellRuns.length === 1 ? '' : 's'}` +
                          (cls === 'qc'
                            ? `\nIPS range: ${Math.min(...cellRuns.map(r => r.ips_score ?? 0))}` +
                              `–${Math.max(...cellRuns.map(r => r.ips_score ?? 0))}`
                            : '')
                        : `${tipHead} · no runs`;
                      return (
                        <div key={`c-${inst}-${cls}-${di}`}
                             title={tip}
                             style={{
                               background: status.color, color: status.text,
                               borderRadius: '0.2rem',
                               textAlign: 'center',
                               padding: '0.25rem 0',
                               fontWeight: 600,
                               minHeight: '1.3rem',
                               display: 'flex',
                               alignItems: 'center',
                               justifyContent: 'center',
                               borderTop: ci === 0 ? '1px solid rgba(148,163,184,0.15)' : 'none',
                             }}>
                          {cellRuns.length || ''}
                        </div>
                      );
                    })}
                  </React.Fragment>
                ))}
              </React.Fragment>
            ))}
          </div>
        </div>
      );
    }

    // Today's QC TIC overlay — every QC run from today overlaid on one
    // chart, colored light→dark by time of day so the operator can see
    // the day's gradient shape at a glance. When an LC issue starts
    // mid-day it shows up as divergence in the later (darker) traces.
    //
    // Scope note: QC-only for now. Spec's Sample/Blank facets require
    // joining sample_health to a future tic-for-health-rows table.
    // That's Ship B follow-up work; the MVP is the QC overlay because
    // it uses data we already extract in baseline.py.
    function TodayTicOverlay() {
      const [data, setData] = useState(null);
      const [normalize, setNormalize] = useState(true);
      // Which facets to render. 'all' keeps the original 3-panel view,
      // 'qc' / 'sample' / 'blank' drill into a single category so the
      // operator can focus. Brett 2026-04-21: default 3-up panels are
      // hard to read when only one category matters.
      const [filter, setFilter] = useState('all');

      useEffect(() => {
        fetch(API + '/api/today/tic-overview')
          .then(r => r.json())
          .then(setData)
          .catch(() => setData({ runs: [], n_runs: 0, n_with_tic: 0 }));
      }, []);

      if (!data) {
        return (
          <div className="card" style={{marginTop:'1rem'}}>
            <h3>This Week's TIC overlay</h3>
            <div style={{color:'var(--muted)'}}>Loading…</div>
          </div>
        );
      }
      // v0.2.132+ returns three faceted buckets. Older API responses
      // only had data.runs (QC) — fall back to that shape so a stale
      // backend doesn't break the UI.
      const facets = data.facets || { qc: data.runs || [], sample: [], blank: [] };
      const totalRuns = (facets.qc?.length || 0)
                      + (facets.sample?.length || 0)
                      + (facets.blank?.length || 0);
      if (totalRuns === 0) {
        return null;  // QuickStatus already says "no runs today"
      }
      const totalWithTic =
        (facets.qc?.filter(r => r.has_tic).length || 0)
        + (facets.sample?.filter(r => r.has_tic).length || 0)
        + (facets.blank?.filter(r => r.has_tic).length || 0);
      if (totalWithTic === 0) {
        return (
          <div className="card" style={{marginTop:'1rem'}}>
            <h3>This Week's TIC overlay</h3>
            <div style={{color:'var(--muted)', fontSize:'0.85rem'}}>
              {totalRuns} run{totalRuns === 1 ? '' : 's'} today but none have
              a TIC trace in the DB. Run <code>stan backfill-tic</code> to
              populate traces for existing runs, or wait for the next baseline.
            </div>
          </div>
        );
      }

      // Build a "Instrument: Column (installed Xd ago)" subtitle from
      // the /api/today endpoint's columns payload so the operator can
      // see at a glance which column is producing today's traces.
      const colEntries = Object.entries(data.columns || {})
        .filter(([, c]) => c && (c.vendor || c.model));
      const columnSubtitle = colEntries.length === 0 ? null : (
        <div style={{fontSize:'0.75rem', color:'var(--muted)', margin:'0 0 0.25rem 0'}}>
          {colEntries.map(([inst, c], i) => {
            const label = [c.vendor, c.model].filter(Boolean).join(' ');
            const ageStr = c.days_ago == null ? ''
              : c.days_ago === 0 ? ' (installed today)'
              : ` (installed ${c.days_ago}d ago)`;
            return (
              <span key={`col-${inst}`}>
                {i > 0 && <span style={{margin:'0 0.5rem'}}>·</span>}
                <strong>{inst}:</strong> {label || 'unnamed column'}{ageStr}
              </span>
            );
          })}
        </div>
      );

      // Per-facet high-contrast palettes. v0.2.146: replaced the
      // light→dark ramp that washed out on the dark dashboard bg
      // (Brett saw near-invisible light-gray sample traces on 4/21).
      // These are mid-tone saturated colors distinct from each other
      // within a facet AND from other facets' palettes. Recency is
      // encoded via line-width in TicOverlaySvg instead of brightness.
      const FACET_PALETTES = {
        qc:     ['#60a5fa', '#22d3ee', '#38bdf8', '#818cf8', '#a78bfa', '#34d399'],  // blues/teals
        sample: ['#f472b6', '#c084fc', '#e879f9', '#fb7185', '#fbbf24', '#facc15'],  // purples/pinks/ambers
        blank:  ['#cbd5e1', '#a3a3a3', '#9ca3af', '#d4d4d8', '#94a3b8', '#71717a'],  // light neutrals on dark
      };

      return (
        <div className="card" style={{marginTop:'1rem'}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:'0.5rem'}}>
            <h3 style={{margin:0}}>
              This Week's TIC overlay ({totalWithTic} trace{totalWithTic === 1 ? '' : 's'})
            </h3>
            <div style={{display:'flex', alignItems:'center', gap:'0.6rem', flexWrap:'wrap'}}>
              {/* Facet filter: All / QC / Sample / Blank */}
              <div style={{display:'inline-flex', gap:'0.2rem'}}>
                {[
                  ['all', 'All'],
                  ['qc', `QC (${facets.qc?.length || 0})`],
                  ['sample', `Sample (${facets.sample?.length || 0})`],
                  ['blank', `Blank (${facets.blank?.length || 0})`],
                ].map(([k, lab]) => (
                  <button key={k} onClick={() => setFilter(k)} style={{
                    padding:'0.2rem 0.55rem', fontSize:'0.75rem',
                    background: filter === k ? 'var(--accent)' : 'var(--bg)',
                    color: filter === k ? '#000' : 'var(--text)',
                    border:'1px solid var(--border)', borderRadius:'0.25rem',
                    cursor:'pointer',
                  }}>{lab}</button>
                ))}
              </div>
              <label style={{display:'inline-flex', alignItems:'center', gap:'0.3rem', fontSize:'0.8rem', color:'var(--muted)'}}>
                <input type="checkbox" checked={normalize}
                       onChange={e => setNormalize(e.target.checked)} />
                Normalize (0–1 per trace)
              </label>
            </div>
          </div>
          {columnSubtitle}
          <p style={{fontSize:'0.75rem', color:'var(--muted)', margin:'0.25rem 0 0.5rem 0'}}>
            Distinct color per trace within each facet · thicker line = more recent run.
            Divergence between traces = LC or spray issue appearing mid-day.
            Triangles at the bottom of QC = cIRT anchor peptide RTs for the most
            recent QC run (green &lt;0.5 min drift, yellow &lt;1.5, red ≥1.5).
          </p>
          {['qc', 'sample', 'blank'].map(cls => {
            if (filter !== 'all' && filter !== cls) return null;
            const items = facets[cls] || [];
            const withTic = items.filter(r => r.has_tic);
            const label = cls === 'qc' ? 'QC' : cls === 'sample' ? 'Sample' : 'Blank';
            return (
              <FacetPanel key={cls}
                          label={label} items={items} withTic={withTic}
                          palette={FACET_PALETTES[cls]} normalize={normalize}
                          showCirtMarkers={cls === 'qc'} />
            );
          })}
        </div>
      );
    }

    // One panel within the 3-facet TIC overlay. Renders a TicOverlaySvg
    // (when there are TIC traces) or a one-line stub (when items
    // exist but none have a stored TIC).
    function FacetPanel({ label, items, withTic, palette, normalize, showCirtMarkers }) {
      if (items.length === 0) return null;
      return (
        <div style={{marginTop:'0.5rem', paddingTop:'0.5rem', borderTop:'1px solid var(--border)'}}>
          <div style={{display:'flex', alignItems:'baseline', gap:'0.5rem',
                       fontSize:'0.85rem', fontWeight:500}}>
            <span>{label}</span>
            <span style={{color:'var(--muted)', fontSize:'0.7rem', fontWeight:'normal'}}>
              {items.length} run{items.length === 1 ? '' : 's'} ·
              {' '}{withTic.length} with TIC
            </span>
          </div>
          {withTic.length > 0
            ? <TicOverlaySvg runs={withTic} normalize={normalize}
                             palette={palette} showCirtMarkers={showCirtMarkers} />
            : <div style={{color:'var(--muted)', fontSize:'0.75rem', padding:'0.4rem 0'}}>
                No TIC traces yet for these runs.
                {label !== 'QC' && (
                  <> Sample/Blank traces start populating after v0.2.132 —
                     older sample_health rows have no TIC in the DB.</>)}
              </div>}
        </div>
      );
    }

    // v0.2.146: per-trace distinct-color palette replaces the old
    // light→dark ramp. Brett: light-end of the ramp disappeared on
    // the dark dashboard. Palette cycles if n > palette.length.
    function traceColor(i, palette) {
      const p = palette || ['#60a5fa', '#22d3ee', '#38bdf8', '#818cf8', '#a78bfa', '#34d399'];
      return p[i % p.length];
    }
    // Line width encodes recency — newest trace is thickest so the
    // operator's eye goes to the current run first.
    function traceWidth(i, n) {
      if (n <= 1) return 2.2;
      const t = i / (n - 1);  // 0 = oldest, 1 = newest
      return 1.2 + t * 1.6;   // 1.2 → 2.8 px
    }

    function TicOverlaySvg({ runs, normalize, height=260, palette,
                              showCirtMarkers=true }) {
      // v0.2.174: 'all' | 'outliers' | 'recent10' view.
      // - all: every trace (old behavior)
      // - outliers: median curve + top-5 most-deviant traces
      // - recent10: newest 10 traces
      // Solves the "50+ trace legend is useless" problem by focusing the
      // chart on the traces worth investigating.
      const [view, setView] = useState('all');
      const [hoverId, setHoverId] = useState(null);
      // Convert each run's rt_min[] + intensity[] into (x, y) path points.
      const width = 900;
      const padding = 30;
      const w = width - padding * 2;
      const h = height - padding * 2;

      const baseSeries = useMemo(() => runs.map(r => {
        const rt = r.tic?.rt_min || [];
        const intensity = r.tic?.intensity || [];
        if (rt.length < 2 || rt.length !== intensity.length) return null;
        let yvals = intensity.slice();
        if (normalize) {
          const mx = Math.max(...yvals);
          if (mx > 0) yvals = yvals.map(v => v / mx);
        }
        return { run: r, rt, y: yvals };
      }).filter(Boolean), [runs, normalize]);

      // Build a common RT grid and interpolate every trace onto it so
      // we can compute a pointwise median and each trace's deviation
      // from it. Used only by the 'outliers' view.
      const { medianCurve, deviations } = useMemo(() => {
        if (baseSeries.length < 3) return { medianCurve: null, deviations: new Map() };
        const rtMx = Math.max(...baseSeries.map(s => Math.max(...s.rt)));
        const rtMn = Math.min(...baseSeries.map(s => Math.min(...s.rt)));
        const N = 120;
        const grid = Array.from({length:N}, (_,i) => rtMn + (i/(N-1)) * (rtMx - rtMn));
        const interp = (rt, y, t) => {
          if (t <= rt[0]) return y[0];
          if (t >= rt[rt.length-1]) return y[rt.length-1];
          let lo = 0, hi = rt.length - 1;
          while (hi - lo > 1) {
            const mid = (lo + hi) >> 1;
            if (rt[mid] <= t) lo = mid; else hi = mid;
          }
          const f = (t - rt[lo]) / (rt[hi] - rt[lo] || 1);
          return y[lo] + f * (y[hi] - y[lo]);
        };
        const matrix = baseSeries.map(s => grid.map(t => interp(s.rt, s.y, t)));
        const med = grid.map((_, j) => {
          const col = matrix.map(row => row[j]).sort((a,b) => a-b);
          return col[Math.floor(col.length/2)];
        });
        const devs = new Map();
        baseSeries.forEach((s, i) => {
          let sum = 0;
          for (let j = 0; j < N; j++) sum += Math.abs(matrix[i][j] - med[j]);
          devs.set(s.run.run_id, sum / N);
        });
        return { medianCurve: { rt: grid, y: med }, deviations: devs };
      }, [baseSeries]);

      // Pick which traces to actually plot based on the view mode.
      const series = useMemo(() => {
        if (view === 'all' || baseSeries.length < 3) return baseSeries;
        if (view === 'recent10') {
          // baseSeries is already oldest→newest; take the last 10.
          return baseSeries.slice(Math.max(0, baseSeries.length - 10));
        }
        // outliers: top 5 by mean-abs-deviation from median
        const scored = baseSeries.map(s => [s, deviations.get(s.run.run_id) || 0]);
        scored.sort((a, b) => b[1] - a[1]);
        return scored.slice(0, 5).map(p => p[0])
          .sort((a, b) => new Date(a.run.run_date) - new Date(b.run.run_date));
      }, [baseSeries, view, deviations]);

      if (series.length === 0) {
        return <div style={{color:'var(--muted)'}}>No renderable traces.</div>;
      }

      const rtMax = Math.max(...series.map(s => Math.max(...s.rt)));
      const rtMin = Math.min(...series.map(s => Math.min(...s.rt)));
      const rtRange = (rtMax - rtMin) || 1;

      const yMax = normalize ? 1 : Math.max(...series.flatMap(s => s.y));
      const yMin = normalize ? 0 : Math.min(0, ...series.flatMap(s => s.y));
      const yRange = (yMax - yMin) || 1;

      const viewBtn = (k, lab) => (
        <button key={k} onClick={() => setView(k)} style={{
          padding:'0.12rem 0.45rem', fontSize:'0.7rem',
          background: view === k ? 'var(--accent)' : 'transparent',
          color: view === k ? '#000' : 'var(--muted)',
          border:'1px solid var(--border)', borderRadius:'0.2rem',
          cursor:'pointer',
        }}>{lab}</button>
      );

      return (
        <div>
          {/* View selector — replaces the unreadable 50-entry legend with a
              focused outliers-only / newest-10 view */}
          <div style={{display:'flex', gap:'0.25rem', marginBottom:'0.3rem',
                       justifyContent:'flex-end', alignItems:'center',
                       fontSize:'0.7rem', color:'var(--muted)'}}>
            <span style={{marginRight:'0.3rem'}}>Show:</span>
            {viewBtn('all', `All (${baseSeries.length})`)}
            {viewBtn('outliers', 'Outliers (top 5 vs median)')}
            {viewBtn('recent10', 'Newest 10')}
          </div>
          <svg viewBox={`0 0 ${width} ${height}`} style={{width:'100%', height:`${height}px`}}>
            {/* RT axis tick marks */}
            {Array.from({length: 6}, (_, i) => {
              const rt = rtMin + (i / 5) * rtRange;
              const x = padding + (i / 5) * w;
              return (
                <g key={`xt-${i}`}>
                  <line x1={x} y1={height-padding} x2={x} y2={height-padding+4}
                        stroke="var(--muted)" strokeWidth="0.5" />
                  <text x={x} y={height-padding+15} fill="var(--muted)"
                        fontSize="10" textAnchor="middle">
                    {rt.toFixed(1)}
                  </text>
                </g>
              );
            })}
            <text x={width/2} y={height-2} fill="var(--muted)" fontSize="10"
                  textAnchor="middle">RT (min)</text>
            <text x={padding-22} y={padding+4} fill="var(--muted)" fontSize="10"
                  textAnchor="start">
              {normalize ? 'Intensity (normalized)' : 'Intensity (raw)'}
            </text>

            {/* Median reference curve — only shown in outliers mode so the
                operator can see what "normal" looks like. Gray dashed. */}
            {view === 'outliers' && medianCurve && (() => {
              const pts = medianCurve.rt.map((t, i) => {
                const x = padding + ((t - rtMin) / rtRange) * w;
                const y = padding + h - ((medianCurve.y[i] - yMin) / yRange) * h;
                return `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`;
              }).join(' ');
              return (
                <path d={pts} fill="none" stroke="#94a3b8"
                      strokeWidth="2" strokeDasharray="6,4" opacity="0.6">
                  <title>Cohort median TIC</title>
                </path>
              );
            })()}

            {/* TIC lines — oldest first so newest (thicker) paints on top */}
            {series.map((s, si) => {
              const c = traceColor(si, palette);
              const lw = traceWidth(si, series.length);
              const isHover = hoverId === s.run.run_id;
              const dim = hoverId && !isHover;
              const pts = s.rt.map((t, i) => {
                const x = padding + ((t - rtMin) / rtRange) * w;
                const y = padding + h - ((s.y[i] - yMin) / yRange) * h;
                return `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`;
              }).join(' ');
              const dt = new Date(s.run.run_date);
              const timeStr = dt.toLocaleString([], {hour:'2-digit', minute:'2-digit'});
              const ids = s.run.mode === 'DDA' ? s.run.n_psms : s.run.n_precursors;
              const idsLabel = s.run.mode === 'DDA' ? 'PSMs' : 'precursors';
              const devStr = deviations.get(s.run.run_id);
              const tip = `${s.run.run_name}\n${timeStr} · ${s.run.instrument}\n` +
                          `IPS ${s.run.ips_score || '—'} · ${ids ? ids.toLocaleString() : '—'} ${idsLabel}` +
                          (devStr != null ? `\ndeviation vs median: ${devStr.toFixed(3)}` : '');
              return (
                <path key={`tic-${s.run.run_id}`} d={pts} fill="none"
                      stroke={c} strokeWidth={isHover ? lw + 1.5 : lw}
                      opacity={dim ? 0.15 : 0.95}
                      onMouseEnter={() => setHoverId(s.run.run_id)}
                      onMouseLeave={() => setHoverId(null)}
                      style={{cursor:'pointer'}}>
                  <title>{tip}</title>
                </path>
              );
            })}

            {/* cIRT anchor markers for the MOST RECENT run only — drawn
                as small downward triangles at the bottom of the chart.
                Showing every run's markers (10 peptides × 5 runs = 50
                triangles) would be unreadable; the latest run is what
                the operator cares about. Trend across the day is in
                the dedicated Trends → cIRT card. Only QC panels render
                these — Sample/Blank don't go through DIA-NN. */}
            {showCirtMarkers && (() => {
              const latest = series[series.length - 1];
              const markers = latest?.run?.cirt_markers || [];
              if (!markers.length) return null;
              const MARKER_COLORS = {
                green:   '#16a34a',
                yellow:  '#eab308',
                red:     '#dc2626',
                unknown: '#94a3b8',
              };
              const yBase = height - padding;  // bottom of chart area
              return markers.map((m, mi) => {
                if (m.observed_rt_min == null) return null;
                const x = padding + ((m.observed_rt_min - rtMin) / rtRange) * w;
                if (x < padding || x > width - padding) return null;
                const c = MARKER_COLORS[m.deviation_class] || MARKER_COLORS.unknown;
                const devStr = m.deviation_min != null
                  ? (m.deviation_min >= 0 ? '+' : '') + m.deviation_min.toFixed(3) + ' min'
                  : 'n/a';
                const refStr = m.reference_rt_min != null
                  ? m.reference_rt_min.toFixed(2) + ' min'
                  : 'n/a';
                const tip =
                  `${m.peptide}\n` +
                  `Observed: ${m.observed_rt_min.toFixed(3)} min\n` +
                  `Reference: ${refStr}\n` +
                  `Δ: ${devStr}  (${m.deviation_class})`;
                // v0.2.146: triangles enlarged 4px→8px wide, 7px→13px tall
                // with a black stroke so they read cleanly on any background.
                const TRI_W = 8, TRI_H = 13;
                const tri = `${x.toFixed(1)},${yBase.toFixed(1)} ` +
                            `${(x-TRI_W).toFixed(1)},${(yBase-TRI_H).toFixed(1)} ` +
                            `${(x+TRI_W).toFixed(1)},${(yBase-TRI_H).toFixed(1)}`;
                // Dotted vertical guide from the triangle up into the
                // chart so the operator can eyeball which part of the
                // TIC the peptide anchors to.
                return (
                  <g key={`cirt-${mi}`}>
                    <line x1={x} y1={padding} x2={x} y2={yBase-TRI_H}
                          stroke={c} strokeDasharray="2,3"
                          strokeWidth="0.9" opacity="0.5" />
                    <polygon points={tri} fill={c} stroke="#000" strokeWidth="1" strokeLinejoin="round">
                      <title>{tip}</title>
                    </polygon>
                  </g>
                );
              });
            })()}
          </svg>
          {/* Legend: one entry per trace with time + full run name.
              v0.2.146: legend now shows run_name (truncated, with full
              name on hover) — Brett pointed out the old legend only
              showed the instrument key which was useless for telling
              traces apart. Swatch width matches the line's thickness
              (recency). */}
          <div style={{display:'flex', flexDirection:'column', gap:'0.2rem',
                       fontSize:'0.72rem', color:'var(--text)',
                       marginTop:'0.4rem', paddingLeft:'1rem'}}>
            {series.map((s, si) => {
              const c = traceColor(si, palette);
              const lw = traceWidth(si, series.length);
              const dt = new Date(s.run.run_date);
              const timeStr = dt.toLocaleString([], {hour:'2-digit', minute:'2-digit'});
              const fullName = s.run.run_name || '—';
              const shortName = fullName.length > 48
                ? fullName.slice(0, 45) + '…'
                : fullName;
              return (
                <span key={`leg-${s.run.run_id}`}
                      title={fullName}
                      style={{display:'inline-flex', alignItems:'center',
                              gap:'0.45rem', fontVariantNumeric:'tabular-nums'}}>
                  <span style={{width:'1.1rem', height:`${lw}px`, background:c,
                                display:'inline-block', borderRadius:'1px',
                                flexShrink:0}} />
                  <span style={{color:'var(--muted)', width:'3.2rem', flexShrink:0}}>
                    {timeStr}
                  </span>
                  <span style={{fontFamily:'ui-monospace, Menlo, monospace',
                                whiteSpace:'nowrap', overflow:'hidden',
                                textOverflow:'ellipsis'}}>
                    {shortName}
                  </span>
                </span>
              );
            })}
          </div>
        </div>
      );
    }

    // Classify a run as "failed" — near-zero results indicate a broken
    // injection, empty file, or failed search rather than just a weak
    // sample. Mirrors the stan.community.validate.HARD_GATES thresholds
    // so the dashboard and the community-submission gate agree on what
    // counts as a failed run (n_precursors<5000 for DIA, n_psms<5000
    // for DDA). Used for the "hide failed" filter toggle and the red
    // failure badge on rows that escape the filter (e.g. when toggle is off).
    function isFailedRun(r) {
      if (!r) return false;
      const mode = (r.mode || '').toUpperCase();
      if (mode === 'DDA') {
        return (r.n_psms || 0) < 5000;
      }
      // Default to DIA rules for anything non-DDA (diaPASEF, DIA, etc.)
      return (r.n_precursors || 0) < 5000;
    }

    // v0.2.185: parse the trailing Bruker/Thermo sequential file number
    // from a run_name. Examples:
    //   "22April2026_DIA_HeLa50_60spd_S1-A4_1_21144.d"      -> "21144"
    //   "FL220426_VelozB-UnivPe_60m_7.raw"                   -> "7"
    //   "1mai25_HeL50-C43tk078b3_100spd_S4-F6_1_12816.d"    -> "12816"
    // Strategy: strip extension, take the last "_" segment that's all
    // digits. If nothing matches, return empty so the cell stays blank
    // rather than showing a misleading partial match.
    function fileNumber(runName) {
      if (!runName) return '';
      const stem = String(runName).replace(/\.[dD]$/, '').replace(/\.raw$/i, '');
      const parts = stem.split('_');
      for (let i = parts.length - 1; i >= 0; i--) {
        if (/^\d+$/.test(parts[i])) return parts[i];
      }
      return '';
    }

    function RunHistory() {
      // Fetch with include_hidden=true so we can show/hide client-side
      // via a toggle without refetching. Hidden rows are filtered out
      // by default; the "Show hidden" toggle restores them with dim
      // styling so the operator can review or unhide.
      const { data: runs, loading, reload } = useFetch(
        '/api/runs?limit=1000&include_hidden=true'
      );
      const [sortKey, setSortKey] = useState('run_date');
      const [sortDir, setSortDir] = useState('desc');
      const [dateFilter, setDateFilter] = useState('all');
      const [searchTerm, setSearchTerm] = useState('');
      const [selectedRun, setSelectedRun] = useState(null);
      // Default: hide failed runs (near-zero results — see isFailedRun)
      // AND hide soft-deleted rows (hidden=1). Operator toggles them
      // back on with the controls at the top of the table.
      const [hideFailed, setHideFailed] = useState(true);
      const [showHidden, setShowHidden] = useState(false);

      if (loading) return <div className="empty">Loading...</div>;
      // Defensive: treat any non-array response as "no runs".
      if (!Array.isArray(runs) || runs.length === 0) {
        return <div className="empty">No runs recorded yet.</div>;
      }

      async function hideRun(run_id, current, runName) {
        const nowHidden = !current;
        let reason = '';
        if (nowHidden) {
          reason = window.prompt(
            `Hide "${runName}" from QC history?\n\n` +
            `Optional reason (saved with the row for later review):`,
            ''
          );
          if (reason === null) return;  // cancel
        }
        try {
          const res = await fetch(API + `/api/runs/${encodeURIComponent(run_id)}/hide`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ hidden: nowHidden, reason: reason || '' }),
          });
          if (!res.ok) {
            const text = await res.text();
            alert(`Hide failed: ${res.status} ${text}`);
            return;
          }
          reload();
        } catch (e) {
          alert(`Hide failed: ${e}`);
        }
      }

      // Filter by date range
      const now = new Date();
      const filterDate = (runDate) => {
        const d = new Date(runDate);
        if (dateFilter === 'all') return true;
        if (dateFilter === 'today') {
          return d.toDateString() === now.toDateString();
        }
        if (dateFilter === 'week') {
          const weekAgo = new Date(now.getTime() - 7 * 86400000);
          return d >= weekAgo;
        }
        if (dateFilter === 'month') {
          return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        }
        if (dateFilter === 'year') {
          return d.getFullYear() === now.getFullYear();
        }
        if (dateFilter === 'past') {
          return d.getFullYear() < now.getFullYear();
        }
        return true;
      };

      // Filter + sort
      let filtered = runs.filter(r => filterDate(r.run_date));
      // Hidden-row filter (hidden=1 means operator soft-deleted it)
      if (!showHidden) {
        filtered = filtered.filter(r => !r.hidden);
      }
      // Failed-run filter (near-zero precursors/PSMs)
      if (hideFailed) {
        filtered = filtered.filter(r => !isFailedRun(r));
      }
      if (searchTerm) {
        const term = searchTerm.toLowerCase();
        filtered = filtered.filter(r =>
          (r.run_name || '').toLowerCase().includes(term) ||
          (r.instrument || '').toLowerCase().includes(term)
        );
      }
      const getSortVal = (r) => {
        if (sortKey === 'primary_ids') return (r.mode === 'DDA' ? r.n_psms : r.n_precursors) || 0;
        // v0.2.185: file number is derived from run_name, not a column
        if (sortKey === 'file_number') {
          const n = parseInt(fileNumber(r.run_name), 10);
          return isFinite(n) ? n : 0;
        }
        return r[sortKey];
      };
      filtered.sort((a, b) => {
        let va = getSortVal(a);
        let vb = getSortVal(b);
        if (va == null) va = sortKey === 'run_date' ? '' : 0;
        if (vb == null) vb = sortKey === 'run_date' ? '' : 0;
        if (typeof va === 'string') {
          return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
        }
        return sortDir === 'asc' ? va - vb : vb - va;
      });

      const handleSort = (key) => {
        if (sortKey === key) {
          setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
        } else {
          setSortKey(key);
          setSortDir('desc');
        }
      };

      const SortHeader = ({col, label}) => (
        <th onClick={() => handleSort(col)} style={{cursor: 'pointer', userSelect: 'none'}}>
          {label}{sortKey === col ? (sortDir === 'asc' ? ' ▲' : ' ▼') : ''}
        </th>
      );

      const EM_DASH = '\u2014';
      const fmtNum = (n) => (n != null && n > 0) ? n.toLocaleString() : EM_DASH;
      const fmtFloat = (n, d=1) => (n != null) ? n.toFixed(d) : EM_DASH;
      const fmtSig = (n) => {
        if (n == null || n === 0) return EM_DASH;
        if (n >= 1e12) return (n/1e12).toFixed(1) + 'T';
        if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
        if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
        return n.toFixed(0);
      };
      const fmtSigned = (n, d=2) => {
        if (n == null) return EM_DASH;
        const sign = n >= 0 ? '+' : '';
        return sign + n.toFixed(d);
      };
      // FWHM stored in minutes; display as seconds with 1 decimal
      const fmtFwhmSec = (n) => (n != null && n > 0) ? (n * 60).toFixed(1) : EM_DASH;
      // Primary identifications: precursors for DIA, PSMs for DDA
      const primaryIds = (r) => r.mode === 'DDA' ? r.n_psms : r.n_precursors;

      return (
        <div className="card">
          <div style={{display:'flex', gap:'0.75rem', marginBottom:'0.75rem', flexWrap:'wrap', alignItems:'center'}}>
            <input
              type="text"
              placeholder="Search run name or instrument..."
              value={searchTerm}
              onChange={e => setSearchTerm(e.target.value)}
              style={{flex:'1 1 250px', padding:'0.4rem 0.6rem', background:'var(--bg)', color:'var(--text)', border:'1px solid var(--border)', borderRadius:'0.3rem'}}
            />
            <select
              value={dateFilter}
              onChange={e => setDateFilter(e.target.value)}
              style={{padding:'0.4rem 0.6rem', background:'var(--bg)', color:'var(--text)', border:'1px solid var(--border)', borderRadius:'0.3rem'}}
            >
              <option value="all">All time</option>
              <option value="today">Today</option>
              <option value="week">This week</option>
              <option value="month">This month</option>
              <option value="year">This year</option>
              <option value="past">Past years</option>
            </select>
            <label style={{display:'inline-flex', alignItems:'center', gap:'0.3rem', fontSize:'0.8rem', color:'var(--muted)'}}>
              <input type="checkbox" checked={hideFailed}
                     onChange={e => setHideFailed(e.target.checked)} />
              Hide failed
            </label>
            <label style={{display:'inline-flex', alignItems:'center', gap:'0.3rem', fontSize:'0.8rem', color:'var(--muted)'}}>
              <input type="checkbox" checked={showHidden}
                     onChange={e => setShowHidden(e.target.checked)} />
              Show hidden
            </label>
            <span style={{color:'var(--muted)', fontSize:'0.85rem'}}>
              {filtered.length} / {runs.length} runs
            </span>
          </div>
          <div style={{overflowX: 'auto'}}>
            <table>
              <thead><tr>
                <SortHeader col="run_name" label="Run" />
                {/* v0.2.185: replaced Instrument with File # (Bruker
                    sequential number parsed from the run_name tail) so
                    the run number is always visible without truncation */}
                <SortHeader col="file_number" label="File #" />
                <SortHeader col="mode" label="Mode" />
                <SortHeader col="ips_score" label="IPS" />
                <SortHeader col="peg_class" label="PEG" />
                <SortHeader col="drift_class" label="Drift" />
                <SortHeader col="primary_ids" label="Precursors / PSMs" />
                <SortHeader col="n_peptides" label="Peptides" />
                <SortHeader col="n_proteins" label="Proteins" />
                <SortHeader col="ms1_signal" label="MS1 Signal" />
                <SortHeader col="fwhm_rt_min" label="FWHM (s)" />
                <SortHeader col="median_mass_acc_ms1_ppm" label="Mass Acc ppm" />
                <SortHeader col="run_date" label="Date" />
                <th>Hide</th>
              </tr></thead>
              <tbody>
                {filtered.map(r => {
                  const ids = primaryIds(r);
                  const idsLabel = r.mode === 'DDA' ? 'PSMs' : 'Prec';
                  const failed = isFailedRun(r);
                  const isHidden = !!r.hidden;
                  // Dim hidden rows (visible only when "Show hidden"
                  // toggle is on) and subtly red-tint failed rows.
                  const rowStyle = {
                    cursor: 'pointer',
                    opacity: isHidden ? 0.5 : 1,

                    background: failed && !isHidden ? 'rgba(239,68,68,0.07)' : undefined,
                  };
                  return (
                    <tr key={r.id} onClick={() => setSelectedRun(r)} style={rowStyle}
                        title={isHidden ? `Hidden: ${r.hidden_reason || '(no reason given)'}` : (failed ? 'Near-zero result — flagged as failed run' : undefined)}>
                      <td style={{maxWidth:'280px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}
                          title={r.run_name}>
                        {failed && !isHidden && (
                          <span title="Failed run (below community-gate threshold)"
                                style={{display:'inline-block', width:'0.5rem', height:'0.5rem',
                                        background:'#ef4444', borderRadius:'50%',
                                        marginRight:'0.4rem', verticalAlign:'middle'}} />
                        )}
                        {r.run_name}
                      </td>
                      <td title={r.instrument || ''}>{fileNumber(r.run_name)}</td>
                      <td>{r.mode}</td>
                      <td><IpsBadge run={r} /></td>

                        {fmtNum(ids)} <span style={{color:'var(--muted)', fontSize:'0.7rem'}}>{ids > 0 ? idsLabel : ''}</span>
                      </td>
                      <td>{fmtNum(r.n_peptides)}</td>

                      <td>{fmtFwhmSec(r.fwhm_rt_min)}</td>
