<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STAN - Know Your Instrument</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #011a3a; --surface: #022851; --border: #1e3a5f;
      --text: #e2e8f0; --muted: #a0b4cc; --accent: #DAAA00;
      --pass: #22c55e; --warn: #eab308; --fail: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 0; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header h1 span { color: var(--accent); }
    .version { color: var(--muted); font-size: 0.85rem; }
    .tabs { display: flex; gap: 0.25rem; margin-bottom: 1.5rem; }
    .tab { padding: 0.5rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 0.5rem; cursor: pointer; color: var(--muted); font-size: 0.9rem; transition: all 0.15s; }
    .tab:hover { color: var(--text); }
    .tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.25rem; margin-bottom: 1rem; }
    .card h3 { font-size: 1rem; margin-bottom: 0.75rem; color: var(--accent); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .metric { display: flex; justify-content: space-between; padding: 0.35rem 0; border-bottom: 1px solid var(--border); }
    .metric:last-child { border: none; }
    .metric-label { color: var(--muted); font-size: 0.85rem; }
    .metric-value { font-weight: 600; font-variant-numeric: tabular-nums; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.75rem; font-weight: 700; }
    .badge-pass { background: var(--pass); color: #052e16; }
    .badge-warn { background: var(--warn); color: #422006; }
    .badge-fail { background: var(--fail); color: #450a0a; }
    .badge-grs { background: var(--accent); color: var(--bg); min-width: 2.5rem; text-align: center; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; padding: 0.5rem; color: var(--muted); border-bottom: 2px solid var(--border); font-weight: 600; }
    td { padding: 0.5rem; border-bottom: 1px solid var(--border); }
    tr:hover { background: rgba(56, 189, 248, 0.05); }
    .empty { text-align: center; color: var(--muted); padding: 3rem; }
    .diagnosis { font-size: 0.85rem; color: var(--warn); margin-top: 0.5rem; font-style: italic; }
    textarea { width: 100%; min-height: 300px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.75rem; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.85rem; resize: vertical; }
    button { padding: 0.5rem 1rem; background: var(--accent); color: var(--bg); border: none; border-radius: 0.5rem; font-weight: 600; cursor: pointer; }
    button:hover { opacity: 0.9; }
    .status-msg { margin-top: 0.5rem; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- Global JS error capture — sends unhandled errors to /api/dashboard-error
       so they show up in the Hive mirror logs for remote debugging. Also keeps
       the last 10 errors in a visible diagnostic panel toggled by triple-clicking
       the version badge in the header. -->
  <script>
    window.__dashErrors = [];
    window.onerror = function(msg, src, line, col, err) {
      var entry = {ts: new Date().toISOString(), msg: String(msg), src: src, line: line, col: col, stack: err && err.stack ? err.stack : ''};
      window.__dashErrors.push(entry);
      if (window.__dashErrors.length > 20) window.__dashErrors.shift();
      // Fire-and-forget POST to the dashboard server
      try {
        fetch('/api/dashboard-error', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(entry)}).catch(function(){});
      } catch(e) {}
    };
    window.onunhandledrejection = function(ev) {
      var msg = ev.reason ? (ev.reason.stack || ev.reason.message || String(ev.reason)) : 'unhandled promise rejection';
      window.onerror(msg, '', 0, 0, ev.reason);
    };
  </script>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    const API = '';

    function useFetch(url, deps = []) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const reload = useCallback(() => {
        setLoading(true);
        fetch(API + url)
          .then(r => {
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            return r.json();
          })
          .then(d => { setData(d); setError(null); setLoading(false); })
          .catch(e => { setError(e.message || String(e)); setLoading(false); });
      }, [url]);
      useEffect(() => { reload(); }, deps);
      return { data, loading, error, reload };
    }

    /* Catch any unhandled React render error and show a readable message
       instead of a blank page. Dashboard bugs don't take down the whole
       page — only the failing panel. */
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { err: null };
      }
      static getDerivedStateFromError(err) {
        return { err };
      }
      componentDidCatch(err, info) {
        console.error('Dashboard render error:', err, info);
      }
      render() {
        if (this.state.err) {
          return (
            <div className="card" style={{borderColor:'var(--fail)', color:'var(--fail)'}}>
              <strong>Dashboard error</strong>
              <div style={{fontSize:'0.85rem', marginTop:'0.3rem', fontFamily:'monospace', whiteSpace:'pre-wrap'}}>
                {String(this.state.err && (this.state.err.stack || this.state.err.message || this.state.err))}
              </div>
              <button
                style={{marginTop:'0.5rem'}}
                onClick={() => this.setState({err: null})}
              >
                Dismiss
              </button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    function GrsBadge({ score }) {
      if (score == null) return null;
      return <span className="badge badge-grs">GRS {score}</span>;
    }

    /* ── IPS tooltip: shows the 3-component breakdown on hover ──────
       Recomputes on the fly from the run's raw metrics + embedded
       cohort reference tables. No schema change needed. */
    const IPS_REFS = {
      'Exploris 480': { deep: [26974,31698,35425,23845,28545,32111,3373,3993,4195],
                        medium: [19159,25259,29874,17550,23020,27081,2539,3104,3478],
                        '*': [19159,25908,31036,17550,23474,28321,2539,3166,3775] },
      'Lumos':        { deep: [31423,39149,56834,29066,35762,50551,3982,4510,5509],
                        medium: [16705,27251,37839,15452,24847,33727,2657,3614,4347],
                        '*': [18519,30522,47340,16941,27907,43154,2965,3917,4906] },
      'timsTOF HT':   { fast: [32305,42778,48757,28864,38195,43578,4300,4768,5104],
                        medium: [36153,45262,50142,32779,40531,44574,4730,4972,5160],
                        ultra: [25203,37051,45731,23722,33106,40851,3940,4509,4945],
                        '*': [30003,40364,47857,26423,36155,42531,4141,4703,5068] },
      '_global':      { '*': [19000,35000,48000,17000,31000,42000,2900,4200,5100] },
    };
    const IPS_DDA_REFS = {
      'Exploris 480': { '*': [13705,18565,22165,11335,16630,19589,2730,3420,3815] },
      'timsTOF HT':   { '*': [27005,27310,42141,24596,24950,37620,3917,4074,4853] },
      '_fallback':    { '*': [15000,40000,80000,12000,25000,45000,2500,3800,5000] },
    };

    function ipsBreakdown(run) {
      const isDDA = (run.mode || '').toLowerCase().includes('dda');
      const fam = run.instrument_family || run.instrument || '';
      const spd = run.spd || 0;
      const bucket = spd <= 0 ? 'medium' : spd <= 15 ? 'deep' : spd <= 40 ? 'medium' : spd <= 80 ? 'fast' : 'ultra';

      let refs;
      if (isDDA) {
        const famRef = IPS_DDA_REFS[fam] || IPS_DDA_REFS['_fallback'];
        refs = famRef[bucket] || famRef['*'] || IPS_DDA_REFS['_fallback']['*'];
      } else {
        const famRef = IPS_REFS[fam] || IPS_REFS['_global'];
        refs = famRef[bucket] || famRef['*'] || IPS_REFS['_global']['*'];
      }
      // refs = [p10_prec, p50_prec, p90_prec, p10_pep, p50_pep, p90_pep, p10_pro, p50_pro, p90_pro]
      function score(val, p10, p50, p90) {
        if (!val || val <= 0 || p10 <= 0) return 0;
        if (val <= p10) return 30 * val / p10;
        if (val <= p50) return 30 + 30 * (val - p10) / (p50 - p10);
        if (val <= p90) return 60 + 30 * (val - p50) / (p90 - p50);
        const excess = Math.min((val - p90) / (0.5 * p90), 1);
        return 90 + 10 * excess;
      }

      const depthVal = isDDA ? (run.n_psms || 0) : (run.n_precursors || 0);
      const depthLabel = isDDA ? 'PSMs' : 'Precursors';
      const s_depth = score(depthVal, refs[0], refs[1], refs[2]);
      const s_pep   = score(run.n_peptides || 0, refs[3], refs[4], refs[5]);
      const s_pro   = score(run.n_proteins || 0, refs[6], refs[7], refs[8]);

      const total = Math.round(0.5 * s_depth + 0.3 * s_pep + 0.2 * s_pro);
      return {
        total,
        components: [
          { label: depthLabel, val: depthVal, score: Math.round(s_depth * 0.5), max: 50, ref: refs[1] },
          { label: 'Peptides', val: run.n_peptides || 0, score: Math.round(s_pep * 0.3), max: 30, ref: refs[4] },
          { label: 'Proteins', val: run.n_proteins || 0, score: Math.round(s_pro * 0.2), max: 20, ref: refs[7] },
        ],
      };
    }

    function IpsBadge({ run }) {
      if (run.ips_score == null) return <span>{'\u2014'}</span>;
      const bd = ipsBreakdown(run);
      const color = run.ips_score >= 80 ? 'var(--green,#22c55e)' : run.ips_score >= 60 ? 'var(--accent,#eab308)' : '#ef4444';
      const tip = bd.components.map(c =>
        `${c.label}: ${c.score}/${c.max} (${c.val?.toLocaleString()} vs ref ${c.ref?.toLocaleString()})`
      ).join('\n');
      return (
        <span title={`IPS ${bd.total}/100\n${'━'.repeat(20)}\n${tip}`}
              style={{cursor:'help', fontWeight:600, color}}>
          {run.ips_score}
        </span>
      );
    }

    function GateBadge({ result }) {
      if (!result) return null;
      const cls = result === 'pass' ? 'badge-pass' : result === 'warn' ? 'badge-warn' : 'badge-fail';
      return <span className={`badge ${cls}`}>{result.toUpperCase()}</span>;
    }

    // PEG contamination badge. class ∈ {clean, trace, moderate, heavy}.
    // Green/gray/yellow/red coloring; hover shows score + ion count +
    // intensity percentage. v0.2.147: click opens the breakdown modal
    // with a lollipop chart of the detected PEG ions. Badges fall back
    // to hover-only (no click) when the run has no peg data.
    function PegBadge({ run, source="runs" }) {
      const cls = run?.peg_class;
      if (!cls) return <span style={{color:'var(--muted)', fontSize:'0.7rem'}}>—</span>;
      // v0.2.168: show the numeric score (0-100) instead of the 4-class
      // label. Brett 2026-04-22: score gives more nuance than "trace"
      // vs "moderate" (both could be 45-60) and lets operators see
      // small trends over time. Class still drives the color.
      const score = run.peg_score;
      const label = score != null
        ? (score < 10 ? score.toFixed(1) : Math.round(score).toString())
        : { clean: 'CLN', trace: 'TRC', moderate: 'MOD', heavy: 'PEG' }[cls] || '—';
      const color = {
        clean:    '#6b7280',    // gray — uninteresting, don't draw the eye
        trace:    '#a8a29e',    // warm gray — background contamination
        moderate: '#eab308',    // yellow — fix sample prep
        heavy:    '#dc2626',    // red — hold from community
      }[cls] || '#6b7280';
      const title =
        `PEG ${cls} — click for ion breakdown\n` +
        `score: ${run.peg_score != null ? run.peg_score.toFixed(1) : '—'}\n` +
        `ions detected: ${run.peg_n_ions_detected ?? '—'}\n` +
        `% of MS1 TIC: ${run.peg_intensity_pct != null ? run.peg_intensity_pct.toFixed(2) + '%' : '—'}`;
      const onClick = () => {
        const rid = run?.id || run?.run_id;
        if (!rid) return;
        window.dispatchEvent(new CustomEvent('stan:openBreakdown', {
          detail: { kind: 'peg', runId: rid, source },
        }));
      };
      return (
        <span title={title}
              onClick={onClick}
              style={{display:'inline-block', padding:'0.05rem 0.3rem',
                      fontSize:'0.65rem', fontWeight:700,
                      color:'#fff', background:color,
                      borderRadius:'0.2rem', cursor:'pointer',
                      userSelect:'none'}}>
          {label}
        </span>
      );
    }

    // DIA window drift badge. class ∈ {ok, warn, drifted, unknown}.
    // Hover shows coverage % + median and p90 drift in 1/K0 units.
    // v0.2.147: click opens the per-window scatter chart.
    // v0.2.184: drift score 0-100 derived from p90 |drift|.
    //   p90=0    → 0   (perfectly centered on windows)
    //   p90=0.04 → 40
    //   p90=0.07 → 70  (legacy ok/warn boundary)
    //   p90=0.09 → 90  (legacy warn/drifted boundary)
    //   p90≥0.10 → 100 (catastrophically drifted)
    // Convention matches PEG: 0 = healthy, 100 = worst. Color class
    // still driven by server-side drift_class so the new detector's
    // severity-fraction-based classification is authoritative.
    function driftScore(run) {
      const p90 = Number(run?.drift_p90_abs_im);
      if (!isFinite(p90)) return null;
      return Math.round(Math.max(0, Math.min(100, p90 * 1000)));
    }

    function DriftBadge({ run, source="runs" }) {
      const cls = run?.drift_class;
      if (!cls || cls === 'unknown') {
        return <span style={{color:'var(--muted)', fontSize:'0.7rem'}}>—</span>;
      }
      const score = driftScore(run);
      const label = score != null ? String(score)
        : { ok: 'OK', warn: 'WARN', drifted: 'DRFT' }[cls] || '?';
      const color = {
        ok:      '#16a34a',
        warn:    '#eab308',
        drifted: '#dc2626',
      }[cls] || '#6b7280';
      const cov = run.drift_coverage != null
        ? (run.drift_coverage * 100).toFixed(1) + '%'
        : '—';
      const md = run.drift_median_im != null
        ? (run.drift_median_im >= 0 ? '+' : '') + run.drift_median_im.toFixed(3)
        : '—';
      const p90 = run.drift_p90_abs_im != null ? run.drift_p90_abs_im.toFixed(3) : '—';
      const title =
        `DIA window drift score: ${score != null ? score : '—'}/100 (${cls})\n` +
        `click for per-window chart\n` +
        `coverage: ${cov}\n` +
        `median drift: ${md} /K0 (signed)\n` +
        `p90 |drift|: ${p90} /K0`;
      const onClick = () => {
        const rid = run?.id || run?.run_id;
        if (!rid) return;
        window.dispatchEvent(new CustomEvent('stan:openBreakdown', {
          detail: { kind: 'drift', runId: rid, source },
        }));
      };
      return (
        <span title={title}
              onClick={onClick}
              style={{display:'inline-block', padding:'0.05rem 0.3rem',
                      fontSize:'0.65rem', fontWeight:700,
                      color:'#fff', background:color,
                      borderRadius:'0.2rem', cursor:'pointer',
                      userSelect:'none'}}>
          {label}
        </span>
      );
    }

    /* ── PEG / Drift breakdown modal (v0.2.147) ──────────────────
       Listens for window 'stan:openBreakdown' events (dispatched by
       PegBadge / DriftBadge onClick) and opens a centered modal with
       the appropriate chart. Lives at the App root so any badge
       anywhere in the tree can trigger it without prop-drilling. */

    function BreakdownModal() {
      const [open, setOpen] = useState(false);
      const [target, setTarget] = useState(null);  // { kind, runId, source }
      const [data, setData] = useState(null);
      const [error, setError] = useState(null);

      useEffect(() => {
        function onOpen(e) {
          setTarget(e.detail);
          setData(null);
          setError(null);
          setOpen(true);
        }
        function onKey(e) {
          if (e.key === 'Escape') setOpen(false);
        }
        window.addEventListener('stan:openBreakdown', onOpen);
        window.addEventListener('keydown', onKey);
        return () => {
          window.removeEventListener('stan:openBreakdown', onOpen);
          window.removeEventListener('keydown', onKey);
        };
      }, []);

      useEffect(() => {
        if (!open || !target) return;
        const { kind, runId, source } = target;
        const url = API + `/api/runs/${encodeURIComponent(runId)}/${kind}` +
                    `?source=${encodeURIComponent(source || 'runs')}`;
        fetch(url)
          .then(r => r.ok ? r.json() : Promise.reject(r.status))
          .then(setData)
          .catch(err => setError(`Failed to load: ${err}`));
      }, [open, target]);

      if (!open) return null;

      return (
        <div onClick={() => setOpen(false)}
             style={{
               position:'fixed', inset:0, background:'rgba(0,0,0,0.7)',
               zIndex:1000, display:'flex', alignItems:'center',
               justifyContent:'center', padding:'2rem',
             }}>
          <div onClick={e => e.stopPropagation()}
               style={{
                 background:'var(--card)', border:'1px solid var(--border)',
                 borderRadius:'0.5rem', padding:'1.25rem',
                 maxWidth:'1000px', width:'100%', maxHeight:'90vh',
                 overflowY:'auto',
               }}>
            <div style={{display:'flex', justifyContent:'space-between',
                         alignItems:'center', marginBottom:'0.75rem'}}>
              <h3 style={{margin:0}}>
                {target?.kind === 'peg' ? 'PEG ion breakdown' : 'DIA window drift breakdown'}
              </h3>
              <button onClick={() => setOpen(false)} style={{
                background:'transparent', border:'1px solid var(--border)',
                color:'var(--text)', cursor:'pointer',
                borderRadius:'0.25rem', padding:'0.25rem 0.6rem',
                fontSize:'0.85rem',
              }}>Close (Esc)</button>
            </div>
            {error && <div style={{color:'var(--fail)'}}>{error}</div>}
            {!error && !data &&
              <div style={{color:'var(--muted)'}}>Loading…</div>}
            {data && target?.kind === 'peg' && <PegChart payload={data} />}
            {data && target?.kind === 'drift' && <DriftChart payload={data} />}
          </div>
        </div>
      );
    }

    // PEG ion lollipop chart. x = m/z, y = intensity (log), marker
    // colored by adduct, faint polyline connects runs of the same
    // adduct so the 44 Da repeat spacing is visible.
    // v0.2.181: PEG view toggle — matches drift modal UX. 'ladder' = m/z
    // lollipop showing the 44 Da ladder. 'peak_areas' = Skyline-style
    // grouped bars by oligomer size n (requested 2026-04-23).
    function PegChart({ payload }) {
      const [view, setView] = useState("ladder");
      const summary = payload?.summary || {};
      const hits = payload?.hits || [];

      const toggle = (
        <div style={{display:'inline-flex', gap:'0.3rem', marginBottom:'0.5rem'}}>
          {[['ladder', 'Ladder (m/z)'], ['peak_areas', 'Peak areas']].map(([k, lab]) => (
            <button key={k} onClick={() => setView(k)} style={{
              padding:'0.2rem 0.55rem', fontSize:'0.75rem',
              background: view === k ? 'var(--accent)' : 'var(--bg)',
              color: view === k ? '#000' : 'var(--text)',
              border:'1px solid var(--border)', borderRadius:'0.25rem',
              cursor:'pointer',
            }}>{lab}</button>
          ))}
        </div>
      );

      if (hits.length === 0) {
        return (
          <div>
            <div style={{color:'var(--muted)', fontSize:'0.85rem', marginBottom:'0.6rem'}}>
              Run: <strong>{summary.run_name || payload.run_id}</strong>
            </div>
            <div style={{color:'var(--muted)'}}>
              No per-ion breakdown stored for this run. Re-run{' '}
              <code>stan backfill-peg --force</code> (v0.2.147+) to populate.
            </div>
          </div>
        );
      }

      const ADDUCT_COLORS = {
        '+H':   '#2563eb',   // blue (darker for white bg)
        '+Na':  '#d97706',   // amber (darker)
        '+NH4': '#9333ea',   // purple (darker)
        '+K':   '#0891b2',   // teal (darker)
      };

      const width = 920, height = 380;
      const padding = { l: 64, r: 20, t: 20, b: 46 };
      const w = width - padding.l - padding.r;
      const h = height - padding.t - padding.b;

      const mzs = hits.map(x => x.mz);
      const mzMin = Math.min(...mzs);
      const mzMax = Math.max(...mzs);
      const mzRange = (mzMax - mzMin) || 1;

      // Log scale on intensity so a single giant hit doesn't flatten
      // the small ones.
      const ints = hits.map(x => Math.max(1, x.observed_intensity));
      const lmin = Math.log10(Math.min(...ints));
      const lmax = Math.log10(Math.max(...ints));
      const lrange = (lmax - lmin) || 1;

      const xFor = mz => padding.l + ((mz - mzMin) / mzRange) * w;
      const yFor = inten => padding.t + h -
        ((Math.log10(Math.max(1, inten)) - lmin) / lrange) * h;

      // Group by adduct for connecting polylines (sorted by mz so the
      // line traces the 44 Da spacing cleanly). Avoid shadowing the
      // outer `h` (chart height) with the loop variable.
      const byAdduct = {};
      for (const ion of hits) {
        (byAdduct[ion.adduct] = byAdduct[ion.adduct] || []).push(ion);
      }
      for (const k in byAdduct) byAdduct[k].sort((a, b) => a.mz - b.mz);

      const adductsPresent = Object.keys(byAdduct);

      const header = (
        <div style={{fontSize:'0.8rem', color:'var(--muted)', marginBottom:'0.4rem'}}>
          Run: <strong style={{color:'var(--text)'}}>{summary.run_name || payload.run_id}</strong>
          {' · '}class <strong style={{color:'var(--text)'}}>{summary.peg_class || '—'}</strong>
          {' · '}score <strong style={{color:'var(--text)'}}>
            {summary.peg_score != null ? summary.peg_score.toFixed(1) : '—'}
          </strong>
          {' · '}{hits.length} ions detected
          {summary.peg_intensity_pct != null && (
            <>{' · '}<strong style={{color:'var(--text)'}}>
              {summary.peg_intensity_pct.toFixed(2)}%</strong> of MS1 TIC
            </>
          )}
        </div>
      );

      // ── Peak areas view ────────────────────────────────────────────
      // Skyline-style: grouped bars by oligomer size n, one bar per
      // adduct within each group, side-by-side. White plot background
      // to match v0.2.180 drift cloud aesthetic.
      if (view === "peak_areas") {
        // Group ions by repeat_n then adduct.
        const byN = new Map();
        for (const ion of hits) {
          if (!byN.has(ion.repeat_n)) byN.set(ion.repeat_n, {});
          byN.get(ion.repeat_n)[ion.adduct] = ion;
        }
        const ns = [...byN.keys()].sort((a, b) => a - b);
        const adductsPresentPA = [...new Set(hits.map(x => x.adduct))];
        // Stable adduct order for bar positioning
        const ADDUCT_ORDER = ['+H', '+Na', '+NH4', '+K'];
        const adductOrder = ADDUCT_ORDER.filter(a => adductsPresentPA.includes(a))
          .concat(adductsPresentPA.filter(a => !ADDUCT_ORDER.includes(a)));
        const intsPA = hits.map(x => Math.max(1, x.observed_intensity));
        const lminPA = Math.log10(Math.min(...intsPA));
        const lmaxPA = Math.log10(Math.max(...intsPA));
        const lrangePA = (lmaxPA - lminPA) || 1;
        const yForPA = i => padding.t + h - ((Math.log10(Math.max(1, i)) - lminPA) / lrangePA) * h;
        const groupW = w / Math.max(1, ns.length);
        const barW = Math.min(12, (groupW - 6) / adductOrder.length);
        return (
          <div>
            {toggle}
            {header}
            <svg viewBox={`0 0 ${width} ${height}`} style={{width:'100%', height:'auto'}}>
              <rect x={padding.l} y={padding.t} width={w} height={h}
                    fill="#ffffff" stroke="#cbd5e1" strokeWidth="0.5" />
              {/* y-axis log ticks */}
              {[lminPA, lminPA + lrangePA * 0.25, lminPA + lrangePA * 0.5, lminPA + lrangePA * 0.75, lmaxPA].map((lv, i) => {
                const y = padding.t + h - ((lv - lminPA) / lrangePA) * h;
                return (
                  <g key={`yt-pa-${i}`}>
                    <line x1={padding.l} y1={y} x2={width - padding.r} y2={y}
                          stroke="#e5e7eb" strokeDasharray="2,3" strokeWidth="0.5" />
                    <text x={padding.l - 6} y={y + 3} fill="var(--muted)"
                          fontSize="10" textAnchor="end">
                      {`10^${lv.toFixed(1)}`}
                    </text>
                  </g>
                );
              })}
              {/* Grouped bars */}
              {ns.map((n, gi) => {
                const gx0 = padding.l + gi * groupW + (groupW - barW * adductOrder.length) / 2;
                return (
                  <g key={`grp-${n}`}>
                    {adductOrder.map((ad, ai) => {
                      const ion = byN.get(n)[ad];
                      if (!ion) return null;
                      const bx = gx0 + ai * barW;
                      const by = yForPA(ion.observed_intensity);
                      const bh = (padding.t + h) - by;
                      const c = ADDUCT_COLORS[ad] || '#94a3b8';
                      const tip = `n=${n} [M${ad}]${ion.charge > 1 ? '^'+ion.charge+'+' : '⁺'}\n` +
                                  `m/z ${ion.mz.toFixed(4)}\n` +
                                  `intensity ${Number(ion.observed_intensity).toExponential(2)}` +
                                  (ion.ppm_error != null ? `\nΔ ${ion.ppm_error.toFixed(2)} ppm` : '');
                      return (
                        <rect key={`bar-${n}-${ad}`} x={bx} y={by}
                              width={Math.max(1, barW - 1)} height={Math.max(0.5, bh)}
                              fill={c} stroke="#1f2937" strokeWidth="0.4">
                          <title>{tip}</title>
                        </rect>
                      );
                    })}
                    {/* x tick label (oligomer n) */}
                    <text x={padding.l + gi * groupW + groupW / 2}
                          y={padding.t + h + 14} fill="var(--muted)"
                          fontSize="10" textAnchor="middle">{n}</text>
                  </g>
                );
              })}
              <text x={width / 2} y={height - 6} fill="var(--muted)"
                    fontSize="11" textAnchor="middle">PEG oligomer size (n)</text>
              <text x={12} y={padding.t + h / 2} fill="var(--muted)"
                    fontSize="11" transform={`rotate(-90 12 ${padding.t + h / 2})`}
                    textAnchor="middle">intensity (log)</text>
            </svg>
            <div style={{display:'flex', gap:'1rem', flexWrap:'wrap',
                         fontSize:'0.75rem', color:'var(--muted)',
                         marginTop:'0.4rem', paddingLeft:'1rem'}}>
              {adductOrder.map(ad => (
                <span key={`leg-pa-${ad}`}
                      style={{display:'inline-flex', alignItems:'center', gap:'0.3rem'}}>
                  <span style={{width:'0.8rem', height:'0.8rem',
                                background: ADDUCT_COLORS[ad] || '#94a3b8',
                                display:'inline-block'}} />
                  [M{ad}]⁺
                </span>
              ))}
            </div>
          </div>
        );
      }

      // ── Ladder view (m/z lollipop) ─────────────────────────────────
      return (
        <div>
          {toggle}
          {header}
          <svg viewBox={`0 0 ${width} ${height}`} style={{width:'100%', height:'auto'}}>
            {/* White plot background for Bruker-style parity */}
            <rect x={padding.l} y={padding.t} width={w} height={h}
                  fill="#ffffff" stroke="#cbd5e1" strokeWidth="0.5" />
            {/* y-axis log-scale ticks */}
            {[lmin, lmin + lrange * 0.25, lmin + lrange * 0.5, lmin + lrange * 0.75, lmax].map((lv, i) => {
              const y = padding.t + h - ((lv - lmin) / lrange) * h;
              return (
                <g key={`yt-${i}`}>
                  <line x1={padding.l} y1={y} x2={width - padding.r} y2={y}
                        stroke="#e5e7eb" strokeDasharray="2,3" strokeWidth="0.5" />
                  <text x={padding.l - 6} y={y + 3} fill="var(--muted)"
                        fontSize="10" textAnchor="end">
                    {`10^${lv.toFixed(1)}`}
                  </text>
                </g>
              );
            })}
            {/* x-axis m/z ticks */}
            {Array.from({length: 6}, (_, i) => {
              const mz = mzMin + (i / 5) * mzRange;
              const x = padding.l + (i / 5) * w;
              return (
                <g key={`xt-${i}`}>
                  <line x1={x} y1={padding.t + h} x2={x} y2={padding.t + h + 4}
                        stroke="var(--muted)" strokeWidth="0.5" />
                  <text x={x} y={padding.t + h + 16} fill="var(--muted)"
                        fontSize="10" textAnchor="middle">
                    {mz.toFixed(0)}
                  </text>
                </g>
              );
            })}
            <text x={width / 2} y={height - 6} fill="var(--muted)"
                  fontSize="11" textAnchor="middle">m/z</text>
            <text x={12} y={padding.t + h / 2} fill="var(--muted)"
                  fontSize="11" transform={`rotate(-90 12 ${padding.t + h / 2})`}
                  textAnchor="middle">intensity (log)</text>

            {/* Per-adduct connecting polyline (faint) */}
            {adductsPresent.map(ad => {
              const c = ADDUCT_COLORS[ad] || '#94a3b8';
              const pts = byAdduct[ad].map(ion =>
                `${xFor(ion.mz).toFixed(1)},${yFor(ion.observed_intensity).toFixed(1)}`
              ).join(' ');
              return (
                <polyline key={`line-${ad}`} points={pts} fill="none"
                          stroke={c} strokeWidth="0.8" opacity="0.45" />
              );
            })}

            {/* Lollipop lines + dots per ion */}
            {hits.map((ion, i) => {
              const x = xFor(ion.mz);
              const y = yFor(ion.observed_intensity);
              const yFloor = padding.t + h;
              const c = ADDUCT_COLORS[ion.adduct] || '#94a3b8';
              const tip = `m/z ${ion.mz.toFixed(4)} [${ion.adduct}]` +
                          (ion.charge > 1 ? `^${ion.charge}+` : '') +
                          `\nrepeat n=${ion.repeat_n}\n` +
                          `intensity ${Number(ion.observed_intensity).toExponential(2)}` +
                          (ion.ppm_error != null ? `\nΔ ${ion.ppm_error.toFixed(2)} ppm` : '');
              return (
                <g key={`ion-${i}`}>
                  <line x1={x} y1={yFloor} x2={x} y2={y}
                        stroke={c} strokeWidth="1.1" opacity="0.85" />
                  <circle cx={x} cy={y} r="3.2" fill={c}
                          stroke="#000" strokeWidth="0.5">
                    <title>{tip}</title>
                  </circle>
                </g>
              );
            })}
          </svg>
          {/* Adduct legend */}
          <div style={{display:'flex', gap:'1rem', flexWrap:'wrap',
                       fontSize:'0.75rem', color:'var(--muted)',
                       marginTop:'0.4rem', paddingLeft:'1rem'}}>
            {adductsPresent.map(ad => (
              <span key={`leg-${ad}`}
                    style={{display:'inline-flex', alignItems:'center', gap:'0.3rem'}}>
                <span style={{width:'0.8rem', height:'0.8rem',
                              background: ADDUCT_COLORS[ad] || '#94a3b8',
                              borderRadius:'50%', display:'inline-block'}} />
                [M{ad}]⁺ ({byAdduct[ad].length})
              </span>
            ))}
          </div>
        </div>
      );
    }

    // DIA window drift scatter. x = window index, y = observed 1/K0 mode
    // minus window-center (so "drift from expected" is directly readable).
    // Band around 0 shows the expected range; dots colored by coverage.
    // v0.2.173: Bruker-DataAnalysis-style ion-cloud view.
    // x = m/z, y = 1/K0, point color = log10 intensity.
    // Overlaid rectangles = expected DIA windows, colored by drift class:
    //   green = drift_im within +-0.02 (ok)
    //   amber = drift_im within +-0.05
    //   red   = drift_im outside +-0.05 (drifted)
    function DriftCloudSvg({ cloud, windows, summary, runId }) {
      if (!cloud || !cloud.mz || !cloud.mz.length) {
        return (
          <div style={{color:'var(--muted)'}}>
            No cloud data stored for this run. Re-run{' '}
            <code>stan backfill-window-drift --force</code> (v0.2.173+).
          </div>
        );
      }
      const width = 920, height = 440;
      const padding = { l: 56, r: 14, t: 24, b: 46 };
      const w = width - padding.l - padding.r;
      const h = height - padding.t - padding.b;

      // Axis ranges — fit to data with small padding.
      const mzMin = Math.max(150, Math.min(...cloud.mz) - 20);
      const mzMax = Math.min(1600, Math.max(...cloud.mz) + 20);
      const imMin = Math.max(0.4, Math.min(...cloud.im) - 0.05);
      const imMax = Math.min(1.8, Math.max(...cloud.im) + 0.05);
      const mzRange = mzMax - mzMin || 1;
      const imRange = imMax - imMin || 1;
      const xFor = m => padding.l + ((m - mzMin) / mzRange) * w;
      const yFor = k => padding.t + h - ((k - imMin) / imRange) * h;

      // v0.2.180: Bruker-DataAnalysis-style vis — white background, dark
      // heatmap ramp (light gray → blue → dark purple/magenta at high
      // intensity). Previous dark-navy+cyan ramp washed out on dark dashboard
      // and made the ridge hard to read.
      const lis = cloud.log_intensity || [];
      const liMin = Math.min(...lis);
      const liMax = Math.max(...lis);
      const liRange = (liMax - liMin) || 1;
      function colorFor(li) {
        const t = (li - liMin) / liRange;  // 0..1
        // Three-stop ramp designed to read on white:
        //   t=0.0  light blue-gray  rgb(210,220,235)
        //   t=0.5  mid indigo       rgb(80, 80, 180)
        //   t=1.0  dark magenta     rgb(90, 10, 90)
        let r, g, b;
        if (t < 0.5) {
          const u = t / 0.5;
          r = Math.round(210 + u * (80 - 210));
          g = Math.round(220 + u * (80 - 220));
          b = Math.round(235 + u * (180 - 235));
        } else {
          const u = (t - 0.5) / 0.5;
          r = Math.round(80 + u * (90 - 80));
          g = Math.round(80 + u * (10 - 80));
          b = Math.round(180 + u * (90 - 180));
        }
        return `rgb(${r},${g},${b})`;
      }

      // Window rectangle color by drift class — slightly darker strokes
      // and lighter fills tuned for white background readability.
      // v0.2.182: windows flagged in_peptide_zone=0 were not evaluated
      // (tails, high-m/z low-peptide-density). Render as neutral gray so
      // Brett's Bruker-DA comparison shows the FULL DIA method layout.
      function winColor(wd) {
        if (wd && wd.in_peptide_zone === 0) {
          return { stroke: '#94a3b8', fill: 'rgba(148,163,184,0.06)' };
        }
        const a = Math.abs(wd ? wd.drift_im : 0);
        if (a < 0.02) return { stroke: '#16a34a', fill: 'rgba(34,197,94,0.08)' };
        if (a < 0.05) return { stroke: '#ca8a04', fill: 'rgba(234,179,8,0.10)' };
        return               { stroke: '#b91c1c', fill: 'rgba(220,38,38,0.10)' };
      }

      return (
        <div>
          <div style={{fontSize:'0.8rem', color:'var(--muted)', marginBottom:'0.4rem'}}>
            Run: <strong style={{color:'var(--text)'}}>{summary?.run_name || runId}</strong>
            {' . '}class <strong style={{color:'var(--text)'}}>{summary?.drift_class || '-'}</strong>
            {' . '}coverage <strong style={{color:'var(--text)'}}>
              {summary?.drift_coverage != null
                ? (summary.drift_coverage * 100).toFixed(1) + '%' : '-'}
            </strong>
            {' . '}{cloud.n_points} points
          </div>
          <svg viewBox={`0 0 ${width} ${height}`} style={{width:'100%', height:'auto'}}>
            {/* v0.2.180: white plot area for Bruker-DataAnalysis parity */}
            <rect x={padding.l} y={padding.t} width={w} height={h}
                  fill="#ffffff" stroke="#cbd5e1" strokeWidth="0.5" />
            {/* Ion cloud — slightly bigger dots for readability on white */}
            {cloud.mz.map((mz, i) => {
              const x = xFor(mz);
              const y = yFor(cloud.im[i]);
              const c = colorFor(cloud.log_intensity[i]);
              return <circle key={`p-${i}`} cx={x} cy={y} r="1.1" fill={c} opacity="0.7" />;
            })}
            {/* Expected DIA windows on top of the cloud */}
            {(windows || []).map((wd, wi) => {
              const x0 = xFor(wd.mz_low);
              const x1 = xFor(wd.mz_high);
              const y0 = yFor(wd.im_high);
              const y1 = yFor(wd.im_low);
              const col = winColor(wd);
              const outOfZone = wd.in_peptide_zone === 0;
              const tip = `window ${wd.window_idx}\n` +
                          `m/z ${wd.mz_low.toFixed(1)}-${wd.mz_high.toFixed(1)}\n` +
                          `expected 1/K0: ${wd.im_low.toFixed(3)}-${wd.im_high.toFixed(3)}\n` +
                          (outOfZone
                            ? `(not evaluated: outside peptide zone 0.70-1.15)`
                            : `observed mode: ${wd.im_mode.toFixed(3)}\n` +
                              `drift: ${(wd.drift_im >= 0 ? '+' : '') + wd.drift_im.toFixed(3)}\n` +
                              `coverage: ${(wd.coverage * 100).toFixed(1)}%`);
              return (
                <g key={`w-${wi}`}>
                  <rect x={x0} y={y0} width={Math.max(1, x1 - x0)} height={Math.max(1, y1 - y0)}
                        fill={col.fill} stroke={col.stroke} strokeWidth="0.6"
                        strokeDasharray={outOfZone ? "2,2" : undefined}>
                    <title>{tip}</title>
                  </rect>
                </g>
              );
            })}
            {/* Axes */}
            {Array.from({length: 6}, (_, i) => {
              const mz = mzMin + (i / 5) * mzRange;
              const x = padding.l + (i / 5) * w;
              return (
                <g key={`xt-${i}`}>
                  <line x1={x} y1={padding.t + h} x2={x} y2={padding.t + h + 4}
                        stroke="var(--muted)" strokeWidth="0.5" />
                  <text x={x} y={padding.t + h + 16} fill="var(--muted)"
                        fontSize="10" textAnchor="middle">{mz.toFixed(0)}</text>
                </g>
              );
            })}
            {Array.from({length: 5}, (_, i) => {
              const im = imMin + (i / 4) * imRange;
              const y = yFor(im);
              return (
                <g key={`yt-${i}`}>
                  <line x1={padding.l - 4} y1={y} x2={padding.l} y2={y}
                        stroke="var(--muted)" strokeWidth="0.5" />
                  <text x={padding.l - 6} y={y + 3} fill="var(--muted)"
                        fontSize="10" textAnchor="end">{im.toFixed(2)}</text>
                </g>
              );
            })}
            <text x={padding.l + w / 2} y={height - 6} fill="var(--muted)"
                  fontSize="11" textAnchor="middle">m/z</text>
            <text x={12} y={padding.t + h / 2} fill="var(--muted)" fontSize="11"
                  transform={`rotate(-90 12 ${padding.t + h / 2})`}
                  textAnchor="middle">1/K0 (mobility)</text>
          </svg>
          <div style={{display:'flex', gap:'0.9rem', flexWrap:'wrap',
                       fontSize:'0.72rem', color:'var(--muted)',
                       marginTop:'0.3rem', paddingLeft:'1rem'}}>
            <span>Points = MS1 peaks (color = log intensity)</span>
            <span style={{display:'inline-flex', alignItems:'center', gap:'0.3rem'}}>
              <span style={{width:'0.9rem', height:'0.6rem', background:'rgba(34,197,94,0.12)',
                            border:'1px solid #22c55e', display:'inline-block'}} />
              expected window (ok, |drift|&lt;0.02)
            </span>
            <span style={{display:'inline-flex', alignItems:'center', gap:'0.3rem'}}>
              <span style={{width:'0.9rem', height:'0.6rem', background:'rgba(234,179,8,0.12)',
                            border:'1px solid #eab308', display:'inline-block'}} />
              warn (0.02-0.05)
            </span>
            <span style={{display:'inline-flex', alignItems:'center', gap:'0.3rem'}}>
              <span style={{width:'0.9rem', height:'0.6rem', background:'rgba(220,38,38,0.10)',
                            border:'1px solid #b91c1c', display:'inline-block'}} />
              drifted (&gt;0.05)
            </span>
            <span style={{display:'inline-flex', alignItems:'center', gap:'0.3rem'}}>
              <span style={{width:'0.9rem', height:'0.6rem', background:'rgba(148,163,184,0.06)',
                            border:'1px dashed #94a3b8', display:'inline-block'}} />
              not evaluated (outside peptide zone)
            </span>
          </div>
        </div>
      );
    }

    function DriftChart({ payload }) {
      const summary = payload?.summary || {};
      const windows = payload?.windows || [];
      // v0.2.173: toggle between two views:
      //   "summary"  = per-window scatter (drift_im vs window index)
      //   "cloud"    = m/z x 1/K0 heatmap + expected-window overlay
      //                (matches the Bruker DataAnalysis view)
      const [view, setView] = useState("summary");
      const [cloud, setCloud] = useState(null);
      const runId = payload?.run_id;
      const source = payload?.source || "runs";

      useEffect(() => {
        if (view !== "cloud" || !runId) return;
        if (cloud && cloud._run_id === runId) return;
        fetch(API + `/api/runs/${encodeURIComponent(runId)}/drift-cloud?source=${source}`)
          .then(r => r.json())
          .then(d => setCloud({ ...(d.cloud || {}), _run_id: runId }))
          .catch(() => setCloud({ _run_id: runId }));
      }, [view, runId, source]);

      const toggle = (
        <div style={{display:'inline-flex', gap:'0.3rem', marginBottom:'0.5rem'}}>
          {[['summary', 'Window summary'], ['cloud', 'Ion cloud']].map(([k, lab]) => (
            <button key={k} onClick={() => setView(k)} style={{
              padding:'0.2rem 0.55rem', fontSize:'0.75rem',
              background: view === k ? 'var(--accent)' : 'var(--bg)',
              color: view === k ? '#000' : 'var(--text)',
              border:'1px solid var(--border)', borderRadius:'0.25rem',
              cursor:'pointer',
            }}>{lab}</button>
          ))}
        </div>
      );

      if (windows.length === 0) {
        return (
          <div>
            <div style={{color:'var(--muted)', fontSize:'0.85rem', marginBottom:'0.6rem'}}>
              Run: <strong>{summary.run_name || payload.run_id}</strong>
            </div>
            <div style={{color:'var(--muted)'}}>
              No per-window breakdown stored for this run. Re-run{' '}
              <code>stan backfill-window-drift --force</code> (v0.2.147+) to populate.
            </div>
          </div>
        );
      }

      if (view === "cloud") {
        if (!cloud) {
          return <div>{toggle}<div style={{color:'var(--muted)'}}>Loading cloud...</div></div>;
        }
        return <div>{toggle}<DriftCloudSvg cloud={cloud} windows={windows} summary={summary} runId={runId} /></div>;
      }
      // else fall through to the summary scatter below

      const width = 920, height = 360;
      const padding = { l: 64, r: 20, t: 24, b: 46 };
      const w = width - padding.l - padding.r;
      const h = height - padding.t - padding.b;

      const drifts = windows.map(x => x.drift_im);
      const absMax = Math.max(0.05, ...drifts.map(Math.abs));
      // Symmetric y-axis centered on 0 so no drift = middle of chart.
      const yRange = absMax * 1.15 * 2;
      const yMid = padding.t + h / 2;
      const yFor = v => yMid - (v / yRange) * h;

      const n = windows.length;
      const xFor = i => padding.l + ((n > 1 ? i / (n - 1) : 0.5)) * w;

      // Coverage → color ramp (red below 0.5, amber 0.5–0.75, green above).
      const covColor = c => c >= 0.75 ? '#22c55e'
                          : c >= 0.5  ? '#eab308'
                          : '#ef4444';

      // Expected band: ±0.03 /K0 is a rough "drift-free noise" envelope
      // for timsTOF diaPASEF, calibrated against clean Astral HeLa runs.
      const bandHi = yFor(0.03);
      const bandLo = yFor(-0.03);

      return (
        <div>
          {toggle}
          <div style={{fontSize:'0.8rem', color:'var(--muted)', marginBottom:'0.4rem'}}>
            Run: <strong style={{color:'var(--text)'}}>{summary.run_name || payload.run_id}</strong>
            {' · '}class <strong style={{color:'var(--text)'}}>{summary.drift_class || '—'}</strong>
            {' · '}coverage <strong style={{color:'var(--text)'}}>
              {summary.drift_coverage != null ? (summary.drift_coverage * 100).toFixed(1) + '%' : '—'}
            </strong>
            {' · '}median drift <strong style={{color:'var(--text)'}}>
              {summary.drift_median_im != null
                ? (summary.drift_median_im >= 0 ? '+' : '') + summary.drift_median_im.toFixed(3)
                : '—'} /K0
            </strong>
            {' · '}{n} windows
          </div>
          <svg viewBox={`0 0 ${width} ${height}`} style={{width:'100%', height:'auto'}}>
            {/* Expected-band (drift-free envelope) */}
            <rect x={padding.l} y={bandHi} width={w} height={bandLo - bandHi}
                  fill="#22c55e" opacity="0.10" />
            {/* Zero line */}
            <line x1={padding.l} y1={yMid} x2={padding.l + w} y2={yMid}
                  stroke="var(--muted)" strokeDasharray="3,3" strokeWidth="0.8" />
            {/* y-axis ticks */}
            {[-absMax, -absMax * 0.5, 0, absMax * 0.5, absMax].map((v, i) => {
              const y = yFor(v);
              return (
                <g key={`yt-${i}`}>
                  <line x1={padding.l} y1={y} x2={width - padding.r} y2={y}
                        stroke="var(--border)" strokeDasharray="2,3" strokeWidth="0.4" />
                  <text x={padding.l - 6} y={y + 3} fill="var(--muted)"
                        fontSize="10" textAnchor="end">
                    {v >= 0 ? '+' : ''}{v.toFixed(3)}
                  </text>
                </g>
              );
            })}
            {/* x-axis ticks (window index) */}
            {Array.from({length: Math.min(6, n)}, (_, i) => {
              const idx = Math.round((i / Math.max(1, Math.min(5, n - 1))) * (n - 1));
              const x = xFor(idx);
              return (
                <g key={`xt-${i}`}>
                  <line x1={x} y1={padding.t + h} x2={x} y2={padding.t + h + 4}
                        stroke="var(--muted)" strokeWidth="0.5" />
                  <text x={x} y={padding.t + h + 16} fill="var(--muted)"
                        fontSize="10" textAnchor="middle">
                    {windows[idx]?.window_idx ?? idx}
                  </text>
                </g>
              );
            })}
            <text x={width / 2} y={height - 6} fill="var(--muted)"
                  fontSize="11" textAnchor="middle">DIA window index</text>
            <text x={12} y={yMid} fill="var(--muted)" fontSize="11"
                  transform={`rotate(-90 12 ${yMid})`}
                  textAnchor="middle">drift from expected (1/K0)</text>

            {/* Window dots */}
            {windows.map((w_, i) => {
              const x = xFor(i);
              const y = yFor(w_.drift_im);
              const c = covColor(w_.coverage);
              const tip =
                `Window ${w_.window_idx}\n` +
                `m/z ${w_.mz_low.toFixed(1)}–${w_.mz_high.toFixed(1)}\n` +
                `expected 1/K0: ${w_.im_center.toFixed(3)}\n` +
                `observed mode: ${w_.im_mode.toFixed(3)}\n` +
                `drift: ${(w_.drift_im >= 0 ? '+' : '') + w_.drift_im.toFixed(3)}\n` +
                `coverage: ${(w_.coverage * 100).toFixed(1)}%`;
              return (
                <circle key={`w-${i}`} cx={x} cy={y} r="3.2" fill={c}
                        stroke="#000" strokeWidth="0.5" opacity="0.9">
                  <title>{tip}</title>
                </circle>
              );
            })}
          </svg>
          <div style={{display:'flex', gap:'1rem', flexWrap:'wrap',
                       fontSize:'0.75rem', color:'var(--muted)',
                       marginTop:'0.4rem', paddingLeft:'1rem'}}>
            <span style={{display:'inline-flex', alignItems:'center', gap:'0.3rem'}}>
              <span style={{width:'0.8rem', height:'0.8rem', background:'#22c55e',
                            borderRadius:'50%', display:'inline-block'}} />
              coverage ≥75%
            </span>
            <span style={{display:'inline-flex', alignItems:'center', gap:'0.3rem'}}>
              <span style={{width:'0.8rem', height:'0.8rem', background:'#eab308',
                            borderRadius:'50%', display:'inline-block'}} />
              50–75%
            </span>
            <span style={{display:'inline-flex', alignItems:'center', gap:'0.3rem'}}>
              <span style={{width:'0.8rem', height:'0.8rem', background:'#ef4444',
                            borderRadius:'50%', display:'inline-block'}} />
              &lt;50%
            </span>
            <span style={{display:'inline-flex', alignItems:'center', gap:'0.3rem'}}>
              <span style={{width:'1rem', height:'0.6rem', background:'#22c55e',
                            opacity:0.25, display:'inline-block'}} />
              expected band (±0.03 /K0)
            </span>
          </div>
        </div>
      );
    }

    /* ── Gas Gauge: 3-second instrument health at a glance ──────── */

    function GasGauge({ value, min, max, mean, sd, label }) {
      // SVG inline gauge: 220 x 40. v0.2.151: added min/max scale labels
      // at the bar endpoints and removed the right-side abbreviated value
      // span — Brett reported that "27.1k" next to a triangle-in-the-middle
      // read as "bar max is 27.1k" when it was actually the current value.
      // The bar's range (= this instrument's historical min..max) is now
      // visible, and the current value lives only in the span BELOW the
      // gauge (via toLocaleString in QuickStatus), not duplicated.
      const W = 220, H = 40, BAR_Y = 14, BAR_H = 12;
      const range = max - min || 1;
      const pct = v => Math.max(0, Math.min(1, (v - min) / range));

      // Zone boundaries as fractions of the bar
      const meanPct = pct(mean);
      const lo1 = pct(mean - sd),   hi1 = pct(mean + sd);
      const lo2 = pct(mean - 2*sd), hi2 = pct(mean + 2*sd);
      const valPct = pct(value);

      // Decide overall color for the label badge
      const z = Math.abs(value - mean) / (sd || 1);
      const statusColor = z < 1 ? 'var(--pass)' : z < 2 ? 'var(--warn)' : 'var(--fail)';

      // Triangle x position
      const tx = 4 + valPct * (W - 8);
      // Mean line x
      const mx = 4 + meanPct * (W - 8);

      return (
        <div style={{display:'inline-flex', alignItems:'center', gap:'0.4rem'}}>
          <span style={{color:'var(--muted)', fontSize:'0.72rem', width:'52px', textAlign:'right', flexShrink:0}}>{label}</span>
          <svg width={W} height={H} style={{display:'block'}}>
            {/* Full range background */}
            <rect x={4} y={BAR_Y} width={W-8} height={BAR_H} rx={3} fill="#1e293b" />
            {/* Red zones (beyond 2σ) */}
            <rect x={4} y={BAR_Y} width={(lo2)*(W-8)} height={BAR_H} rx={3} fill="rgba(239,68,68,0.25)" />
            <rect x={4 + hi2*(W-8)} y={BAR_Y} width={(1-hi2)*(W-8)} height={BAR_H} rx={3} fill="rgba(239,68,68,0.25)" />
            {/* Amber zones (1-2σ) */}
            <rect x={4 + lo2*(W-8)} y={BAR_Y} width={(lo1-lo2)*(W-8)} height={BAR_H} fill="rgba(234,179,8,0.2)" />
            <rect x={4 + hi1*(W-8)} y={BAR_Y} width={(hi2-hi1)*(W-8)} height={BAR_H} fill="rgba(234,179,8,0.2)" />
            {/* Green zone (within 1σ) */}
            <rect x={4 + lo1*(W-8)} y={BAR_Y} width={(hi1-lo1)*(W-8)} height={BAR_H} fill="rgba(34,197,94,0.2)" />
            {/* Mean dashed line */}
            <line x1={mx} x2={mx} y1={BAR_Y-2} y2={BAR_Y+BAR_H+2} stroke="var(--muted)" strokeWidth={1} strokeDasharray="2,2" />
            {/* Value triangle pointer — large, outlined for visibility against dark bars */}
            <polygon points={`${tx-9},${BAR_Y-10} ${tx+9},${BAR_Y-10} ${tx},${BAR_Y-1}`}
                     fill={statusColor} stroke="#000" strokeWidth={1} strokeLinejoin="round" />
            <polygon points={`${tx-9},${BAR_Y+BAR_H+10} ${tx+9},${BAR_Y+BAR_H+10} ${tx},${BAR_Y+BAR_H+1}`}
                     fill={statusColor} stroke="#000" strokeWidth={1} strokeLinejoin="round" />
            {/* v0.2.151: numeric scale labels at bar endpoints — so the
                reader sees "this bar spans 22k..32k" instead of guessing. */}
            <text x={4} y={BAR_Y+BAR_H+11} fill="var(--muted)" fontSize="9"
                  textAnchor="start" fontVariantNumeric="tabular-nums">
              {min >= 1000 ? (min/1000).toFixed(1)+'k' : min?.toFixed?.(0) || ''}
            </text>
            <text x={W-4} y={BAR_Y+BAR_H+11} fill="var(--muted)" fontSize="9"
                  textAnchor="end" fontVariantNumeric="tabular-nums">
              {max >= 1000 ? (max/1000).toFixed(1)+'k' : max?.toFixed?.(0) || ''}
            </text>
          </svg>
        </div>
      );
    }

    /* ── GaugesView ──────────────────────────────────────────────────
       Top-of-LiveRuns snapshot view. Extracted from the old
       QuickStatus component (same visuals, same SVG gauges).
       Part of the v0.2.106 front-page view selector: rendered when
       `prefs.front_page_view === 'gauges'`. Takes the same in-memory
       `runs` array that WeeklyTableView and MetricMatrixView consume,
       so switching views is zero-network. */
    function GaugesView({ runs }) {
      // Show the most recent 5 runs with gas gauges for 3 key metrics.
      // Stats (min/max/mean/sd) are computed from ALL runs for the same
      // instrument so the gauge reflects that instrument's own history.
      if (!runs || runs.length === 0) {
        return (
          <div className="card" style={{marginBottom:'1.5rem', color:'var(--muted)'}}>
            No QC runs in the selected window. Try expanding "Since" or
            switching instrument filter.
          </div>
        );
      }

      // Build per-instrument stats from all available runs
      const byInst = {};
      for (const r of runs) {
        if (!byInst[r.instrument]) byInst[r.instrument] = [];
        byInst[r.instrument].push(r);
      }
      function stats(arr) {
        if (!arr.length) return { min:0, max:1, mean:0.5, sd:0.1 };
        const min = Math.min(...arr), max = Math.max(...arr);
        const mean = arr.reduce((a,b)=>a+b,0)/arr.length;
        const sd = Math.sqrt(arr.reduce((a,v)=>a+(v-mean)**2,0)/Math.max(1,arr.length-1));
        return { min, max, mean, sd: sd || mean*0.1 || 1 };
      }
      const instStats = {};
      for (const [inst, instRuns] of Object.entries(byInst)) {
        instStats[inst] = {
          peptides: stats(instRuns.map(r => r.n_peptides || r.n_peptides_dda || 0).filter(v=>v>0)),
          proteins: stats(instRuns.map(r => r.n_proteins || 0).filter(v=>v>0)),
          precursors: stats(instRuns.map(r => r.n_precursors || r.n_psms || 0).filter(v=>v>0)),
        };
      }

      // Most recent 5 runs
      const recent = runs.slice(0, 5);

      return (
        <div className="card" style={{marginBottom:'1.5rem'}}>
          <h3 style={{marginBottom:'0.75rem'}}>
            Quick Health Check
            <span style={{fontWeight:400, fontSize:'0.8rem', color:'var(--muted)', marginLeft:'0.75rem'}}>
              Last {recent.length} runs vs. instrument history
            </span>
          </h3>
          <div style={{display:'flex', flexDirection:'column', gap:'0.5rem'}}>
            {recent.map((r, i) => {
              const s = instStats[r.instrument] || {};
              const depth = r.n_precursors || r.n_psms || 0;
              const pep = r.n_peptides || r.n_peptides_dda || 0;
              const pro = r.n_proteins || 0;
              const depthLabel = r.n_precursors ? 'Prec' : 'PSMs';
              const z_depth = s.precursors ? Math.abs(depth - s.precursors.mean) / (s.precursors.sd || 1) : 0;
              const z_pep = s.peptides ? Math.abs(pep - s.peptides.mean) / (s.peptides.sd || 1) : 0;
              const z_pro = s.proteins ? Math.abs(pro - s.proteins.mean) / (s.proteins.sd || 1) : 0;
              const worst = Math.max(z_depth, z_pep, z_pro);
              const rowColor = worst < 1 ? 'rgba(34,197,94,0.06)' : worst < 2 ? 'rgba(234,179,8,0.06)' : 'rgba(239,68,68,0.08)';

              return (
                <div key={i} style={{
                  display:'flex', flexDirection:'column', gap:'0.3rem', padding:'0.5rem 0.75rem',
                  background: rowColor, borderRadius:'0.5rem',
                }}>
                  <div style={{display:'flex', alignItems:'center', gap:'0.5rem', flexWrap:'wrap'}}>
                    {/* Gate badge removed 2026-04-20 — gating wasn't
                        functional (always PASS on threshold gaps);
                        IpsBadge carries the health signal instead. */}
                    <span title={r.run_name} style={{fontSize:'0.85rem', fontWeight:500, flex:'1 1 auto', wordBreak:'break-all'}}>
                      {r.run_name}
                    </span>
                    <span title={new Date(r.run_date).toLocaleString()} style={{fontSize:'0.7rem', color:'var(--muted)', whiteSpace:'nowrap'}}>
                      {r.instrument} &middot; {new Date(r.run_date).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}
                    </span>
                  </div>
                  <div style={{display:'flex', gap:'1.5rem', flexWrap:'wrap', alignItems:'flex-start'}}>
                    {s.precursors && (
                      <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:'0.2rem'}}>
                        <GasGauge value={depth} {...s.precursors} label={depthLabel} />
                        <span style={{fontSize:'0.75rem', fontWeight:600}}>{depth.toLocaleString()}</span>
                      </div>
                    )}
                    {s.peptides && (
                      <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:'0.2rem'}}>
                        <GasGauge value={pep} {...s.peptides} label="Pep" />
                        <span style={{fontSize:'0.75rem', fontWeight:600}}>{pep.toLocaleString()}</span>
                      </div>
                    )}
                    {s.proteins && (
                      <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:'0.2rem'}}>
                        <GasGauge value={pro} {...s.proteins} label="Pro" />
                        <span style={{fontSize:'0.75rem', fontWeight:600}}>{pro.toLocaleString()}</span>
                      </div>
                    )}
                    {r.ips_score != null && (
                      <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:'0.2rem', marginLeft:'auto'}}>
                        <span style={{fontSize:'0.7rem', color:'var(--muted)'}}>IPS</span>
                        <IpsBadge run={r} />
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{marginTop:'0.5rem', fontSize:'0.72rem', color:'var(--muted)'}}>
            Gauges: green = within 1&sigma; of instrument mean &middot; amber = 1-2&sigma; &middot; red = &gt;2&sigma;
            &nbsp;&middot;&nbsp; Dashed line = mean &nbsp;&middot;&nbsp; Triangles = this run
          </div>
        </div>
      );
    }

    /* ── Last QC Badge ─────────────────────────────────────────────── */

    function LastQcBadge({ instrument }) {
      const { data } = useFetch(`/api/instruments/${encodeURIComponent(instrument)}/last-qc`, [instrument]);
      if (!data || data.hours_ago == null) return <span style={{fontSize:'0.75rem', color:'var(--muted)'}}>No QC data</span>;

      const h = data.hours_ago;
      let label, color, suffix;
      if (h < 24) {
        label = h < 1 ? '<1h ago' : `${Math.round(h)}h ago`;
        color = 'var(--pass)';
        suffix = '';
      } else if (h < 72) {
        label = `${Math.round(h)}h ago`;
        color = 'var(--warn)';
        suffix = ' — OVERDUE';
      } else {
        const days = Math.round(h / 24);
        label = `${days} days ago`;
        color = 'var(--fail)';
        suffix = ' — CRITICAL';
      }

      return (
        <span style={{
          display:'inline-block', padding:'0.15rem 0.5rem', borderRadius:'999px',
          fontSize:'0.72rem', fontWeight:700, background:color,
          color: color === 'var(--pass)' ? '#052e16' : color === 'var(--warn)' ? '#422006' : '#450a0a',
        }}>
          {label}{suffix}
        </span>
      );
    }

    /* ── Column Lifetime Badge ─────────────────────────────────────── */

    function ColumnLifeBadge({ instrument }) {
      const { data } = useFetch(`/api/instruments/${encodeURIComponent(instrument)}/column-life`, [instrument]);
      if (!data || (!data.days_on_column && !data.total_injections_on_column && !data.qc_runs_since_change))
        return <span style={{fontSize:'0.75rem', color:'var(--muted)'}}>No column data</span>;

      const parts = [];
      // Bruker-style: show injection count
      if (data.total_injections_on_column != null) {
        parts.push(`${data.total_injections_on_column.toLocaleString()} injections`);
      }
      if (data.days_on_column > 0) {
        parts.push(`${data.days_on_column} days`);
      }
      // Thermo-style: show trend if available
      let trendStr = '';
      if (data.depth_trend_pct_per_week != null) {
        const sign = data.depth_trend_pct_per_week >= 0 ? '+' : '';
        trendStr = `, trend: ${sign}${data.depth_trend_pct_per_week.toFixed(1)}%/week`;
      }

      const label = parts.length ? parts.join(' (') + (parts.length > 1 ? ')' : '') : `${data.qc_runs_since_change} QC runs`;
      const trendColor = data.depth_trend_pct_per_week != null && data.depth_trend_pct_per_week < -3
        ? 'var(--warn)' : 'var(--muted)';

      return (
        <div style={{fontSize:'0.75rem', color:'var(--muted)'}}>
          <span style={{fontWeight:600, color:'var(--accent)'}}>Column:</span>{' '}
          {label}{trendStr && <span style={{color:trendColor}}>{trendStr}</span>}
          {data.column_model && <span style={{marginLeft:'0.3rem'}}>({data.column_model})</span>}
        </div>
      );
    }

    /* ── Maintenance Event Log Button ──────────────────────────────── */

    function LogEventButton({ instrument, onSaved }) {
      const [open, setOpen] = useState(false);
      const [eventType, setEventType] = useState('column_change');
      const [eventDate, setEventDate] = useState(new Date().toISOString().slice(0, 10));
      const [notes, setNotes] = useState('');
      const [operator, setOperator] = useState('');
      const [colVendor, setColVendor] = useState('');
      const [colModel, setColModel] = useState('');
      const [colSerial, setColSerial] = useState('');
      const [status, setStatus] = useState('');

      const eventTypes = [
        { value: 'column_change', label: 'Column Change' },
        { value: 'source_clean', label: 'Source Clean' },
        { value: 'calibration', label: 'Calibration' },
        { value: 'pm', label: 'PM (Preventive Maintenance)' },
        { value: 'lc_service', label: 'LC service' },
        { value: 'other', label: 'Other' },
      ];

      async function submit() {
        setStatus('Saving...');
        const payload = {
          event_type: eventType,
          event_date: eventDate ? eventDate + 'T12:00:00Z' : null,
          notes,
          operator,
        };
        if (eventType === 'column_change') {
          payload.column_vendor = colVendor || null;
          payload.column_model = colModel || null;
          payload.column_serial = colSerial || null;
        }
        try {
          const r = await fetch(API + `/api/instruments/${encodeURIComponent(instrument)}/events`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          if (r.ok) {
            setStatus('Logged.');
            setNotes('');
            setOperator('');
            setColVendor('');
            setColModel('');
            setColSerial('');
            setEventDate(new Date().toISOString().slice(0, 10));
            if (onSaved) onSaved();
            setTimeout(() => { setStatus(''); setOpen(false); }, 1200);
          } else {
            const err = await r.json();
            setStatus(`Error: ${err.detail || 'Unknown error'}`);
          }
        } catch (e) {
          setStatus(`Error: ${e.message}`);
        }
      }

      const inputStyle = {
        width: '100%', padding: '0.35rem 0.5rem', background: 'var(--bg)',
        color: 'var(--text)', border: '1px solid var(--border)', borderRadius: '0.35rem',
        fontSize: '0.8rem', marginTop: '0.25rem',
      };
      const selectStyle = { ...inputStyle, cursor: 'pointer' };

      return (
        <div style={{marginTop:'0.5rem'}}>
          <button onClick={() => setOpen(!open)} style={{
            padding:'0.25rem 0.6rem', fontSize:'0.72rem', background:'var(--surface)',
            color:'var(--accent)', border:'1px solid var(--border)', borderRadius:'0.35rem',
            cursor:'pointer', fontWeight:600,
          }}>
            {open ? 'Cancel' : 'Log event'}
          </button>
          {open && (
            <div style={{marginTop:'0.5rem', padding:'0.75rem', background:'var(--bg)', borderRadius:'0.5rem', border:'1px solid var(--border)'}}>
              <div style={{display:'flex', gap:'0.4rem', marginBottom:'0.4rem'}}>
                <div style={{flex:2}}>
                  <label style={{fontSize:'0.75rem', color:'var(--muted)'}}>Event type</label>
                  <select value={eventType} onChange={e => setEventType(e.target.value)} style={selectStyle}>
                    {eventTypes.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}
                  </select>
                </div>
                <div style={{flex:1}}>
                  <label style={{fontSize:'0.75rem', color:'var(--muted)'}}>Date</label>
                  <input type="date" value={eventDate} onChange={e => setEventDate(e.target.value)} style={inputStyle} />
                </div>
              </div>
              {eventType === 'column_change' && (
                <div style={{display:'flex', gap:'0.4rem', marginBottom:'0.4rem', flexWrap:'wrap'}}>
                  <div style={{flex:'1 1 120px'}}>
                    <label style={{fontSize:'0.75rem', color:'var(--muted)'}}>Column vendor</label>
                    <input value={colVendor} onChange={e => setColVendor(e.target.value)} placeholder="e.g. IonOpticks" style={inputStyle} />
                  </div>
                  <div style={{flex:'1 1 120px'}}>
                    <label style={{fontSize:'0.75rem', color:'var(--muted)'}}>Column model</label>
                    <input value={colModel} onChange={e => setColModel(e.target.value)} placeholder="e.g. Aurora 25cm" style={inputStyle} />
                  </div>
                  <div style={{flex:'1 1 120px'}}>
                    <label style={{fontSize:'0.75rem', color:'var(--muted)'}}>Column serial</label>
                    <input value={colSerial} onChange={e => setColSerial(e.target.value)} placeholder="Optional" style={inputStyle} />
                  </div>
                </div>
              )}
              <div style={{marginBottom:'0.4rem'}}>
                <label style={{fontSize:'0.75rem', color:'var(--muted)'}}>Operator</label>
                <input value={operator} onChange={e => setOperator(e.target.value)} placeholder="Your name" style={inputStyle} />
              </div>
              <div style={{marginBottom:'0.5rem'}}>
                <label style={{fontSize:'0.75rem', color:'var(--muted)'}}>Notes</label>
                <input value={notes} onChange={e => setNotes(e.target.value)} placeholder="Details..." style={inputStyle} />
              </div>
              <button onClick={submit} style={{padding:'0.3rem 0.75rem', fontSize:'0.8rem'}}>Save</button>
              {status && <span style={{marginLeft:'0.5rem', fontSize:'0.8rem', color: status.startsWith('Error') ? 'var(--fail)' : 'var(--pass)'}}>{status}</span>}
            </div>
          )}
        </div>
      );
    }

    /* ── Mini sparkline: last N runs of the primary metric for an instrument ── */
    function MiniSparkline({ allRuns, instrument, currentMode, n = 30 }) {
      if (!Array.isArray(allRuns)) return null;
      const metricKey = currentMode === 'DDA' ? 'n_psms' : 'n_precursors';
      const metricLabel = currentMode === 'DDA' ? 'PSMs' : 'Precursors';
      // Most recent N runs for this instrument, ordered ascending for plotting
      const instRuns = allRuns
        .filter(r => r.instrument === instrument && (r[metricKey] || 0) > 0)
        .slice(0, n)
        .reverse();
      if (instRuns.length < 2) {
        return (
          <div style={{fontSize:'0.7rem', color:'var(--muted)', marginTop:'0.5rem'}}>
            Not enough history for trend
          </div>
        );
      }
      const values = instRuns.map(r => r[metricKey] || 0);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = max - min || 1;
      const W = 240, H = 36, PAD = 3;
      const w = W - 2*PAD, h = H - 2*PAD;
      const points = values.map((v, i) => {
        const x = PAD + (values.length === 1 ? w/2 : (i / (values.length - 1)) * w);
        const y = PAD + h - ((v - min) / range) * h;
        return [x, y];
      });
      const pathD = points.map(([x, y], i) => `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
      const last = values[values.length - 1];
      const first = values[0];
      const delta = first > 0 ? ((last - first) / first) * 100 : 0;
      const trendColor = delta > 5 ? 'var(--pass)' : delta < -5 ? 'var(--fail)' : 'var(--muted)';
      const sign = delta >= 0 ? '+' : '';
      return (
        <div style={{marginTop:'0.5rem', paddingTop:'0.5rem', borderTop:'1px solid var(--border)'}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', fontSize:'0.7rem', color:'var(--muted)', marginBottom:'0.2rem'}}>
            <span>{metricLabel} · last {values.length}</span>
            <span style={{color: trendColor, fontWeight:600}}>{sign}{delta.toFixed(1)}%</span>
          </div>
          <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%', height:`${H}px`, display:'block'}}>
            <path d={pathD} fill="none" stroke="#60a5fa" strokeWidth="1.5" />
            {points.map(([x, y], i) => (
              <circle key={i} cx={x} cy={y} r="1.5" fill="#60a5fa">
                <title>{instRuns[i].run_name}: {values[i].toLocaleString()}</title>
              </circle>
            ))}
          </svg>
        </div>
      );
    }

    /* ── Front-page view selector (v0.2.106) ─────────────────────────
       Shared config + helpers + hook + UI for the three-way toggle at
       the top of the "This Week's QCs" tab. Lets operators pick the
       way they want to scan the week's QC runs — gauges (snapshot),
       weekly table (numbers), or metric matrix (decoupling).

       The three views are interchangeable widgets occupying the same
       slot; they all consume the same in-memory `runs` array so
       switching is instant with no refetch. See
       STAN Brainstorming/SPEC_front_page_view_selector.md. */

    // Shared metric config: the four operator-facing metrics on the
    // front page are fixed (Proteins, Peptides, Precursors, MS1 AUC).
    // `ddaFallback` lets a DDA run populate a "Precursors"/"Peptides"
    // column from PSM/DDA-peptide counts without renaming the column.
    const METRIC_CONFIG = [
      { key: 'n_proteins',   label: 'Proteins' },
      { key: 'n_peptides',   label: 'Peptides',   ddaFallback: 'n_peptides_dda' },
      { key: 'n_precursors', label: 'Precursors', ddaFallback: 'n_psms' },
      { key: 'tic_auc',      label: 'MS1 AUC' },
    ];

    // Tint thresholds: deviation from baseline in percent.
    // ±4/±12 per the spec; single source of truth so tuning is one edit.
    const TINT_THRESHOLDS = { amber_neg: -4, red_neg: -12, green_pos: 4 };

    // HeLa-only narrower regex for the "Sample" filter on the front
    // page. See SPEC §7 — stricter than `stan/watcher/qc_filter.py`
    // because mixing load-test dilutions into the QC trend looks like
    // drift but isn't. Matches HeLa, HeLa200, Hela5, he12, etc.
    const HELA_ONLY_REGEX = /(?:^|[^a-z])he(?:l[a5\d]|\d)/i;

    function isHelaRun(run) {
      const s = `${run.run_name || ''} ${run.sample || ''}`;
      return HELA_ONLY_REGEX.test(s);
    }

    // MS1 AUC formatter. Small values stay sci (most MS1 TIC AUCs are
    // 1e9 .. 5e11 so sci is how people read them). `short` collapses
    // to 86.0B / 1.2T for dense tables.
    function formatMs1(val, fmt) {
      if (val == null || !isFinite(val) || val === 0) return '—';
      if (fmt === 'short') {
        const abs = Math.abs(val);
        if (abs >= 1e12) return (val / 1e12).toFixed(2) + 'T';
        if (abs >= 1e9)  return (val / 1e9).toFixed(1) + 'B';
        if (abs >= 1e6)  return (val / 1e6).toFixed(1) + 'M';
        return val.toFixed(0);
      }
      // default: scientific, 1 decimal.
      return val.toExponential(1).replace('e+', 'e').replace('e0', 'e');
    }

    function formatMetric(key, val, ms1Fmt) {
      if (val == null || val === 0) return '—';
      if (key === 'tic_auc') return formatMs1(val, ms1Fmt);
      return Number(val).toLocaleString();
    }

    // Read a run's value for a given METRIC_CONFIG entry, falling back
    // to the DDA-specific column when the primary is missing/zero.
    function readMetric(run, mcfg) {
      const v = run?.[mcfg.key];
      if (v != null && v !== 0) return { value: v, viaFallback: false };
      if (mcfg.ddaFallback) {
        const vf = run?.[mcfg.ddaFallback];
        if (vf != null) return { value: vf, viaFallback: true };
      }
      return { value: null, viaFallback: false };
    }

    // Compute baseline per instrument × metric as the median of the
    // last N QC runs for that instrument. Simpler than wiring up the
    // Python-side baseline — the UI only needs "is this run drifting"
    // colorization, not an authoritative number. Recomputed on every
    // render from the in-memory runs; cheap for N<=500.
    function computeBaselines(allRuns, window = 30) {
      const byInst = {};
      for (const r of allRuns || []) {
        if (!byInst[r.instrument]) byInst[r.instrument] = [];
        byInst[r.instrument].push(r);
      }
      const out = {};
      for (const [inst, rs] of Object.entries(byInst)) {
        rs.sort((a, b) => new Date(b.run_date) - new Date(a.run_date));
        const recent = rs.slice(0, window);
        out[inst] = {};
        for (const m of METRIC_CONFIG) {
          const vals = recent
            .map(r => readMetric(r, m).value)
            .filter(v => v != null && v > 0);
          if (!vals.length) { out[inst][m.key] = null; continue; }
          vals.sort((a, b) => a - b);
          const mid = Math.floor(vals.length / 2);
          out[inst][m.key] = vals.length % 2
            ? vals[mid]
            : (vals[mid - 1] + vals[mid]) / 2;
        }
      }
      return out;
    }

    // Return a background tint for a metric cell based on pct deviation
    // from the instrument's baseline. ≤-12% red, -12..-4% amber,
    // ≥+4% green, otherwise no tint. Null baseline → no tint.
    function tintFor(pct) {
      if (pct == null) return 'transparent';
      if (pct <= TINT_THRESHOLDS.red_neg)  return 'rgba(239,68,68,0.18)';
      if (pct <= TINT_THRESHOLDS.amber_neg) return 'rgba(234,179,8,0.18)';
      if (pct >= TINT_THRESHOLDS.green_pos) return 'rgba(34,197,94,0.18)';
      return 'transparent';
    }

    function pctFromBaseline(val, baseline) {
      if (val == null || !baseline || baseline <= 0) return null;
      return ((val - baseline) / baseline) * 100;
    }

    /* usePreferences — per-browser UI prefs with localStorage backing
       and a lab-wide /api/ui-prefs fallback. Single key so it's easy
       to clear for support ("delete stan.ui.prefs and reload"). */
    const PREFS_STORAGE_KEY = 'stan.ui.prefs';
    const DEFAULT_PREFS = {
      front_page_view: 'gauges',     // preserves today's behavior for existing users
      matrix_bar_scale: 'week_range',
      ms1_format: 'sci',
    };

    function usePreferences() {
      const [prefs, setPrefs] = useState(DEFAULT_PREFS);
      const [loaded, setLoaded] = useState(false);

      useEffect(() => {
        let cancelled = false;
        // 1) Try localStorage first — most common path, avoids a
        //    network round-trip on every dashboard load.
        let local = null;
        try {
          const raw = window.localStorage.getItem(PREFS_STORAGE_KEY);
          if (raw) local = JSON.parse(raw);
        } catch (_) {}
        if (local && typeof local === 'object') {
          setPrefs({ ...DEFAULT_PREFS, ...local });
          setLoaded(true);
          return;
        }
        // 2) Otherwise fetch the lab-wide default from the server.
        //    404 is expected when no ui_prefs.yml exists — treat as
        //    "use built-in defaults".
        fetch(API + '/api/ui-prefs')
          .then(r => (r.ok ? r.json() : null))
          .then(server => {
            if (cancelled) return;
            if (server && typeof server === 'object') {
