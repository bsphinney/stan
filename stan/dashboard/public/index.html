<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STAN - Know Your Instrument</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #011a3a; --surface: #022851; --border: #1e3a5f;
      --text: #e2e8f0; --muted: #a0b4cc; --accent: #DAAA00;
      --pass: #22c55e; --warn: #eab308; --fail: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 0; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header h1 span { color: var(--accent); }
    .version { color: var(--muted); font-size: 0.85rem; }
    .tabs { display: flex; gap: 0.25rem; margin-bottom: 1.5rem; }
    .tab { padding: 0.5rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 0.5rem; cursor: pointer; color: var(--muted); font-size: 0.9rem; transition: all 0.15s; }
    .tab:hover { color: var(--text); }
    .tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.25rem; margin-bottom: 1rem; }
    .card h3 { font-size: 1rem; margin-bottom: 0.75rem; color: var(--accent); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .metric { display: flex; justify-content: space-between; padding: 0.35rem 0; border-bottom: 1px solid var(--border); }
    .metric:last-child { border: none; }
    .metric-label { color: var(--muted); font-size: 0.85rem; }
    .metric-value { font-weight: 600; font-variant-numeric: tabular-nums; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.75rem; font-weight: 700; }
    .badge-pass { background: var(--pass); color: #052e16; }
    .badge-warn { background: var(--warn); color: #422006; }
    .badge-fail { background: var(--fail); color: #450a0a; }
    .badge-grs { background: var(--accent); color: var(--bg); min-width: 2.5rem; text-align: center; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; padding: 0.5rem; color: var(--muted); border-bottom: 2px solid var(--border); font-weight: 600; }
    td { padding: 0.5rem; border-bottom: 1px solid var(--border); }
    tr:hover { background: rgba(56, 189, 248, 0.05); }
    .empty { text-align: center; color: var(--muted); padding: 3rem; }
    .diagnosis { font-size: 0.85rem; color: var(--warn); margin-top: 0.5rem; font-style: italic; }
    textarea { width: 100%; min-height: 300px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.75rem; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.85rem; resize: vertical; }
    button { padding: 0.5rem 1rem; background: var(--accent); color: var(--bg); border: none; border-radius: 0.5rem; font-weight: 600; cursor: pointer; }
    button:hover { opacity: 0.9; }
    .status-msg { margin-top: 0.5rem; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- Global JS error capture — sends unhandled errors to /api/dashboard-error
       so they show up in the Hive mirror logs for remote debugging. Also keeps
       the last 10 errors in a visible diagnostic panel toggled by triple-clicking
       the version badge in the header. -->
  <script>
    window.__dashErrors = [];
    window.onerror = function(msg, src, line, col, err) {
      var entry = {ts: new Date().toISOString(), msg: String(msg), src: src, line: line, col: col, stack: err && err.stack ? err.stack : ''};
      window.__dashErrors.push(entry);
      if (window.__dashErrors.length > 20) window.__dashErrors.shift();
      // Fire-and-forget POST to the dashboard server
      try {
        fetch('/api/dashboard-error', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(entry)}).catch(function(){});
      } catch(e) {}
    };
    window.onunhandledrejection = function(ev) {
      var msg = ev.reason ? (ev.reason.stack || ev.reason.message || String(ev.reason)) : 'unhandled promise rejection';
      window.onerror(msg, '', 0, 0, ev.reason);
    };
  </script>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    const API = '';

    function useFetch(url, deps = []) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const reload = useCallback(() => {
        setLoading(true);
        fetch(API + url)
          .then(r => {
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            return r.json();
          })
          .then(d => { setData(d); setError(null); setLoading(false); })
          .catch(e => { setError(e.message || String(e)); setLoading(false); });
      }, [url]);
      useEffect(() => { reload(); }, deps);
      return { data, loading, error, reload };
    }

    /* Catch any unhandled React render error and show a readable message
       instead of a blank page. Dashboard bugs don't take down the whole
       page — only the failing panel. */
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { err: null };
      }
      static getDerivedStateFromError(err) {
        return { err };
      }
      componentDidCatch(err, info) {
        console.error('Dashboard render error:', err, info);
      }
      render() {
        if (this.state.err) {
          return (
            <div className="card" style={{borderColor:'var(--fail)', color:'var(--fail)'}}>
              <strong>Dashboard error</strong>
              <div style={{fontSize:'0.85rem', marginTop:'0.3rem', fontFamily:'monospace', whiteSpace:'pre-wrap'}}>
                {String(this.state.err && (this.state.err.stack || this.state.err.message || this.state.err))}
              </div>
              <button
                style={{marginTop:'0.5rem'}}
                onClick={() => this.setState({err: null})}
              >
                Dismiss
              </button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    function GrsBadge({ score }) {
      if (score == null) return null;
      return <span className="badge badge-grs">GRS {score}</span>;
    }

    /* ── IPS tooltip: shows the 3-component breakdown on hover ──────
       Recomputes on the fly from the run's raw metrics + embedded
       cohort reference tables. No schema change needed. */
    const IPS_REFS = {
      'Exploris 480': { deep: [26974,31698,35425,23845,28545,32111,3373,3993,4195],
                        medium: [19159,25259,29874,17550,23020,27081,2539,3104,3478],
                        '*': [19159,25908,31036,17550,23474,28321,2539,3166,3775] },
      'Lumos':        { deep: [31423,39149,56834,29066,35762,50551,3982,4510,5509],
                        medium: [16705,27251,37839,15452,24847,33727,2657,3614,4347],
                        '*': [18519,30522,47340,16941,27907,43154,2965,3917,4906] },
      'timsTOF HT':   { fast: [32305,42778,48757,28864,38195,43578,4300,4768,5104],
                        medium: [36153,45262,50142,32779,40531,44574,4730,4972,5160],
                        ultra: [25203,37051,45731,23722,33106,40851,3940,4509,4945],
                        '*': [30003,40364,47857,26423,36155,42531,4141,4703,5068] },
      '_global':      { '*': [19000,35000,48000,17000,31000,42000,2900,4200,5100] },
    };
    const IPS_DDA_REFS = {
      'Exploris 480': { '*': [13705,18565,22165,11335,16630,19589,2730,3420,3815] },
      'timsTOF HT':   { '*': [27005,27310,42141,24596,24950,37620,3917,4074,4853] },
      '_fallback':    { '*': [15000,40000,80000,12000,25000,45000,2500,3800,5000] },
    };

    function ipsBreakdown(run) {
      const isDDA = (run.mode || '').toLowerCase().includes('dda');
      const fam = run.instrument_family || run.instrument || '';
      const spd = run.spd || 0;
      const bucket = spd <= 0 ? 'medium' : spd <= 15 ? 'deep' : spd <= 40 ? 'medium' : spd <= 80 ? 'fast' : 'ultra';

      let refs;
      if (isDDA) {
        const famRef = IPS_DDA_REFS[fam] || IPS_DDA_REFS['_fallback'];
        refs = famRef[bucket] || famRef['*'] || IPS_DDA_REFS['_fallback']['*'];
      } else {
        const famRef = IPS_REFS[fam] || IPS_REFS['_global'];
        refs = famRef[bucket] || famRef['*'] || IPS_REFS['_global']['*'];
      }
      // refs = [p10_prec, p50_prec, p90_prec, p10_pep, p50_pep, p90_pep, p10_pro, p50_pro, p90_pro]
      function score(val, p10, p50, p90) {
        if (!val || val <= 0 || p10 <= 0) return 0;
        if (val <= p10) return 30 * val / p10;
        if (val <= p50) return 30 + 30 * (val - p10) / (p50 - p10);
        if (val <= p90) return 60 + 30 * (val - p50) / (p90 - p50);
        const excess = Math.min((val - p90) / (0.5 * p90), 1);
        return 90 + 10 * excess;
      }

      const depthVal = isDDA ? (run.n_psms || 0) : (run.n_precursors || 0);
      const depthLabel = isDDA ? 'PSMs' : 'Precursors';
      const s_depth = score(depthVal, refs[0], refs[1], refs[2]);
      const s_pep   = score(run.n_peptides || 0, refs[3], refs[4], refs[5]);
      const s_pro   = score(run.n_proteins || 0, refs[6], refs[7], refs[8]);

      const total = Math.round(0.5 * s_depth + 0.3 * s_pep + 0.2 * s_pro);
      return {
        total,
        components: [
          { label: depthLabel, val: depthVal, score: Math.round(s_depth * 0.5), max: 50, ref: refs[1] },
          { label: 'Peptides', val: run.n_peptides || 0, score: Math.round(s_pep * 0.3), max: 30, ref: refs[4] },
          { label: 'Proteins', val: run.n_proteins || 0, score: Math.round(s_pro * 0.2), max: 20, ref: refs[7] },
        ],
      };
    }

    function IpsBadge({ run }) {
      if (run.ips_score == null) return <span>{'\u2014'}</span>;
      const bd = ipsBreakdown(run);
      const color = run.ips_score >= 80 ? 'var(--green,#22c55e)' : run.ips_score >= 60 ? 'var(--accent,#eab308)' : '#ef4444';
      const tip = bd.components.map(c =>
        `${c.label}: ${c.score}/${c.max} (${c.val?.toLocaleString()} vs ref ${c.ref?.toLocaleString()})`
      ).join('\n');
      return (
        <span title={`IPS ${bd.total}/100\n${'━'.repeat(20)}\n${tip}`}
              style={{cursor:'help', fontWeight:600, color}}>
          {run.ips_score}
        </span>
      );
    }

    function GateBadge({ result }) {
      if (!result) return null;
      const cls = result === 'pass' ? 'badge-pass' : result === 'warn' ? 'badge-warn' : 'badge-fail';
      return <span className={`badge ${cls}`}>{result.toUpperCase()}</span>;
    }

    // PEG contamination badge. class ∈ {clean, trace, moderate, heavy}.
    // Green/gray/yellow/red coloring; hover shows score + ion count +
    // intensity percentage. Renders compact (2-3 letters) because the
    // QC History row is already wide.
    function PegBadge({ run }) {
      const cls = run?.peg_class;
      if (!cls) return <span style={{color:'var(--muted)', fontSize:'0.7rem'}}>—</span>;
      const label = { clean: 'CLN', trace: 'TRC', moderate: 'MOD', heavy: 'PEG' }[cls] || '—';
      const color = {
        clean:    '#6b7280',    // gray — uninteresting, don't draw the eye
        trace:    '#a8a29e',    // warm gray — background contamination
        moderate: '#eab308',    // yellow — fix sample prep
        heavy:    '#dc2626',    // red — hold from community
      }[cls] || '#6b7280';
      const title =
        `PEG ${cls}\n` +
        `score: ${run.peg_score != null ? run.peg_score.toFixed(1) : '—'}\n` +
        `ions detected: ${run.peg_n_ions_detected ?? '—'}\n` +
        `% of MS1 TIC: ${run.peg_intensity_pct != null ? run.peg_intensity_pct.toFixed(2) + '%' : '—'}`;
      return (
        <span title={title}
              style={{display:'inline-block', padding:'0.05rem 0.3rem',
                      fontSize:'0.65rem', fontWeight:700,
                      color:'#fff', background:color,
                      borderRadius:'0.2rem', cursor:'help'}}>
          {label}
        </span>
      );
    }

    // DIA window drift badge. class ∈ {ok, warn, drifted, unknown}.
    // Hover shows coverage % + median and p90 drift in 1/K0 units.
    function DriftBadge({ run }) {
      const cls = run?.drift_class;
      if (!cls || cls === 'unknown') {
        return <span style={{color:'var(--muted)', fontSize:'0.7rem'}}>—</span>;
      }
      const label = { ok: 'OK', warn: 'WARN', drifted: 'DRFT' }[cls] || '?';
      const color = {
        ok:      '#16a34a',
        warn:    '#eab308',
        drifted: '#dc2626',
      }[cls] || '#6b7280';
      const cov = run.drift_coverage != null
        ? (run.drift_coverage * 100).toFixed(1) + '%'
        : '—';
      const md = run.drift_median_im != null
        ? (run.drift_median_im >= 0 ? '+' : '') + run.drift_median_im.toFixed(3)
        : '—';
      const p90 = run.drift_p90_abs_im != null ? run.drift_p90_abs_im.toFixed(3) : '—';
      const title =
        `DIA window drift: ${cls}\n` +
        `coverage: ${cov}\n` +
        `median drift: ${md} /K0\n` +
        `p90 |drift|: ${p90} /K0`;
      return (
        <span title={title}
              style={{display:'inline-block', padding:'0.05rem 0.3rem',
                      fontSize:'0.65rem', fontWeight:700,
                      color:'#fff', background:color,
                      borderRadius:'0.2rem', cursor:'help'}}>
          {label}
        </span>
      );
    }

    /* ── Gas Gauge: 3-second instrument health at a glance ──────── */

    function GasGauge({ value, min, max, mean, sd, label }) {
      // SVG inline gauge: 200 x 28. Shows a bar from min→max with zone
      // coloring (green near mean, amber ±2σ, red beyond) and a white
      // triangle pointer at `value`.
      const W = 200, H = 28, BAR_Y = 8, BAR_H = 12;
      const range = max - min || 1;
      const pct = v => Math.max(0, Math.min(1, (v - min) / range));

      // Zone boundaries as fractions of the bar
      const meanPct = pct(mean);
      const lo1 = pct(mean - sd),   hi1 = pct(mean + sd);
      const lo2 = pct(mean - 2*sd), hi2 = pct(mean + 2*sd);
      const valPct = pct(value);

      // Decide overall color for the label badge
      const z = Math.abs(value - mean) / (sd || 1);
      const statusColor = z < 1 ? 'var(--pass)' : z < 2 ? 'var(--warn)' : 'var(--fail)';

      // Triangle x position
      const tx = 4 + valPct * (W - 8);
      // Mean line x
      const mx = 4 + meanPct * (W - 8);

      return (
        <div style={{display:'inline-flex', alignItems:'center', gap:'0.4rem'}}>
          <span style={{color:'var(--muted)', fontSize:'0.72rem', width:'52px', textAlign:'right', flexShrink:0}}>{label}</span>
          <svg width={W} height={H} style={{display:'block'}}>
            {/* Full range background */}
            <rect x={4} y={BAR_Y} width={W-8} height={BAR_H} rx={3} fill="#1e293b" />
            {/* Red zones (beyond 2σ) */}
            <rect x={4} y={BAR_Y} width={(lo2)*(W-8)} height={BAR_H} rx={3} fill="rgba(239,68,68,0.25)" />
            <rect x={4 + hi2*(W-8)} y={BAR_Y} width={(1-hi2)*(W-8)} height={BAR_H} rx={3} fill="rgba(239,68,68,0.25)" />
            {/* Amber zones (1-2σ) */}
            <rect x={4 + lo2*(W-8)} y={BAR_Y} width={(lo1-lo2)*(W-8)} height={BAR_H} fill="rgba(234,179,8,0.2)" />
            <rect x={4 + hi1*(W-8)} y={BAR_Y} width={(hi2-hi1)*(W-8)} height={BAR_H} fill="rgba(234,179,8,0.2)" />
            {/* Green zone (within 1σ) */}
            <rect x={4 + lo1*(W-8)} y={BAR_Y} width={(hi1-lo1)*(W-8)} height={BAR_H} fill="rgba(34,197,94,0.2)" />
            {/* Mean dashed line */}
            <line x1={mx} x2={mx} y1={BAR_Y-1} y2={BAR_Y+BAR_H+1} stroke="var(--muted)" strokeWidth={1} strokeDasharray="2,2" />
            {/* Value triangle pointer */}
            <polygon points={`${tx-5},${BAR_Y-1} ${tx+5},${BAR_Y-1} ${tx},${BAR_Y+4}`} fill={statusColor} />
            <polygon points={`${tx-5},${BAR_Y+BAR_H+1} ${tx+5},${BAR_Y+BAR_H+1} ${tx},${BAR_Y+BAR_H-4}`} fill={statusColor} />
          </svg>
          <span style={{color:statusColor, fontSize:'0.75rem', fontWeight:700, width:'50px', fontVariantNumeric:'tabular-nums'}}>
            {value >= 1e6 ? (value/1e6).toFixed(1)+'M' : value >= 1000 ? (value/1000).toFixed(1)+'k' : value?.toFixed?.(0) || '—'}
          </span>
        </div>
      );
    }

    function QuickStatus({ runs }) {
      // Show the most recent 5 runs with gas gauges for 3 key metrics.
      // Stats (min/max/mean/sd) are computed from ALL runs for the same
      // instrument so the gauge reflects that instrument's own history.
      if (!runs || runs.length === 0) return null;

      // Build per-instrument stats from all available runs
      const byInst = {};
      for (const r of runs) {
        if (!byInst[r.instrument]) byInst[r.instrument] = [];
        byInst[r.instrument].push(r);
      }
      function stats(arr) {
        if (!arr.length) return { min:0, max:1, mean:0.5, sd:0.1 };
        const min = Math.min(...arr), max = Math.max(...arr);
        const mean = arr.reduce((a,b)=>a+b,0)/arr.length;
        const sd = Math.sqrt(arr.reduce((a,v)=>a+(v-mean)**2,0)/Math.max(1,arr.length-1));
        return { min, max, mean, sd: sd || mean*0.1 || 1 };
      }
      const instStats = {};
      for (const [inst, instRuns] of Object.entries(byInst)) {
        instStats[inst] = {
          peptides: stats(instRuns.map(r => r.n_peptides || r.n_peptides_dda || 0).filter(v=>v>0)),
          proteins: stats(instRuns.map(r => r.n_proteins || 0).filter(v=>v>0)),
          precursors: stats(instRuns.map(r => r.n_precursors || r.n_psms || 0).filter(v=>v>0)),
        };
      }

      // Most recent 5 runs
      const recent = runs.slice(0, 5);

      return (
        <div className="card" style={{marginBottom:'1.5rem'}}>
          <h3 style={{marginBottom:'0.75rem'}}>
            Quick Health Check
            <span style={{fontWeight:400, fontSize:'0.8rem', color:'var(--muted)', marginLeft:'0.75rem'}}>
              Last {recent.length} runs vs. instrument history
            </span>
          </h3>
          <div style={{display:'flex', flexDirection:'column', gap:'0.5rem'}}>
            {recent.map((r, i) => {
              const s = instStats[r.instrument] || {};
              const depth = r.n_precursors || r.n_psms || 0;
              const pep = r.n_peptides || r.n_peptides_dda || 0;
              const pro = r.n_proteins || 0;
              const depthLabel = r.n_precursors ? 'Prec' : 'PSMs';
              const z_depth = s.precursors ? Math.abs(depth - s.precursors.mean) / (s.precursors.sd || 1) : 0;
              const z_pep = s.peptides ? Math.abs(pep - s.peptides.mean) / (s.peptides.sd || 1) : 0;
              const z_pro = s.proteins ? Math.abs(pro - s.proteins.mean) / (s.proteins.sd || 1) : 0;
              const worst = Math.max(z_depth, z_pep, z_pro);
              const rowColor = worst < 1 ? 'rgba(34,197,94,0.06)' : worst < 2 ? 'rgba(234,179,8,0.06)' : 'rgba(239,68,68,0.08)';

              return (
                <div key={i} style={{
                  display:'flex', flexDirection:'column', gap:'0.3rem', padding:'0.5rem 0.75rem',
                  background: rowColor, borderRadius:'0.5rem',
                }}>
                  <div style={{display:'flex', alignItems:'center', gap:'0.5rem', flexWrap:'wrap'}}>
                    {/* Gate badge removed 2026-04-20 — gating wasn't
                        functional (always PASS on threshold gaps);
                        IpsBadge carries the health signal instead. */}
                    <span title={r.run_name} style={{fontSize:'0.85rem', fontWeight:500, flex:'1 1 auto', wordBreak:'break-all'}}>
                      {r.run_name}
                    </span>
                    <span title={new Date(r.run_date).toLocaleString()} style={{fontSize:'0.7rem', color:'var(--muted)', whiteSpace:'nowrap'}}>
                      {r.instrument} &middot; {new Date(r.run_date).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}
                    </span>
                  </div>
                  <div style={{display:'flex', gap:'1.5rem', flexWrap:'wrap', alignItems:'flex-start'}}>
                    {s.precursors && (
                      <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:'0.2rem'}}>
                        <GasGauge value={depth} {...s.precursors} label={depthLabel} />
                        <span style={{fontSize:'0.75rem', fontWeight:600}}>{depth.toLocaleString()}</span>
                      </div>
                    )}
                    {s.peptides && (
                      <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:'0.2rem'}}>
                        <GasGauge value={pep} {...s.peptides} label="Pep" />
                        <span style={{fontSize:'0.75rem', fontWeight:600}}>{pep.toLocaleString()}</span>
                      </div>
                    )}
                    {s.proteins && (
                      <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:'0.2rem'}}>
                        <GasGauge value={pro} {...s.proteins} label="Pro" />
                        <span style={{fontSize:'0.75rem', fontWeight:600}}>{pro.toLocaleString()}</span>
                      </div>
                    )}
                    {r.ips_score != null && (
                      <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:'0.2rem', marginLeft:'auto'}}>
                        <span style={{fontSize:'0.7rem', color:'var(--muted)'}}>IPS</span>
                        <IpsBadge run={r} />
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{marginTop:'0.5rem', fontSize:'0.72rem', color:'var(--muted)'}}>
            Gauges: green = within 1&sigma; of instrument mean &middot; amber = 1-2&sigma; &middot; red = &gt;2&sigma;
            &nbsp;&middot;&nbsp; Dashed line = mean &nbsp;&middot;&nbsp; Triangles = this run
          </div>
        </div>
      );
    }

    /* ── Last QC Badge ─────────────────────────────────────────────── */

    function LastQcBadge({ instrument }) {
      const { data } = useFetch(`/api/instruments/${encodeURIComponent(instrument)}/last-qc`, [instrument]);
      if (!data || data.hours_ago == null) return <span style={{fontSize:'0.75rem', color:'var(--muted)'}}>No QC data</span>;

      const h = data.hours_ago;
      let label, color, suffix;
      if (h < 24) {
        label = h < 1 ? '<1h ago' : `${Math.round(h)}h ago`;
        color = 'var(--pass)';
        suffix = '';
      } else if (h < 72) {
        label = `${Math.round(h)}h ago`;
        color = 'var(--warn)';
        suffix = ' — OVERDUE';
      } else {
        const days = Math.round(h / 24);
        label = `${days} days ago`;
        color = 'var(--fail)';
        suffix = ' — CRITICAL';
      }

      return (
        <span style={{
          display:'inline-block', padding:'0.15rem 0.5rem', borderRadius:'999px',
          fontSize:'0.72rem', fontWeight:700, background:color,
          color: color === 'var(--pass)' ? '#052e16' : color === 'var(--warn)' ? '#422006' : '#450a0a',
        }}>
          {label}{suffix}
        </span>
      );
    }

    /* ── Column Lifetime Badge ─────────────────────────────────────── */

    function ColumnLifeBadge({ instrument }) {
      const { data } = useFetch(`/api/instruments/${encodeURIComponent(instrument)}/column-life`, [instrument]);
      if (!data || (!data.days_on_column && !data.total_injections_on_column && !data.qc_runs_since_change))
        return <span style={{fontSize:'0.75rem', color:'var(--muted)'}}>No column data</span>;

      const parts = [];
      // Bruker-style: show injection count
      if (data.total_injections_on_column != null) {
        parts.push(`${data.total_injections_on_column.toLocaleString()} injections`);
      }
      if (data.days_on_column > 0) {
        parts.push(`${data.days_on_column} days`);
      }
      // Thermo-style: show trend if available
      let trendStr = '';
      if (data.depth_trend_pct_per_week != null) {
        const sign = data.depth_trend_pct_per_week >= 0 ? '+' : '';
        trendStr = `, trend: ${sign}${data.depth_trend_pct_per_week.toFixed(1)}%/week`;
      }

      const label = parts.length ? parts.join(' (') + (parts.length > 1 ? ')' : '') : `${data.qc_runs_since_change} QC runs`;
      const trendColor = data.depth_trend_pct_per_week != null && data.depth_trend_pct_per_week < -3
        ? 'var(--warn)' : 'var(--muted)';

      return (
        <div style={{fontSize:'0.75rem', color:'var(--muted)'}}>
          <span style={{fontWeight:600, color:'var(--accent)'}}>Column:</span>{' '}
          {label}{trendStr && <span style={{color:trendColor}}>{trendStr}</span>}
          {data.column_model && <span style={{marginLeft:'0.3rem'}}>({data.column_model})</span>}
        </div>
      );
    }

    /* ── Maintenance Event Log Button ──────────────────────────────── */

    function LogEventButton({ instrument, onSaved }) {
      const [open, setOpen] = useState(false);
      const [eventType, setEventType] = useState('column_change');
      const [eventDate, setEventDate] = useState(new Date().toISOString().slice(0, 10));
      const [notes, setNotes] = useState('');
      const [operator, setOperator] = useState('');
      const [colVendor, setColVendor] = useState('');
      const [colModel, setColModel] = useState('');
      const [colSerial, setColSerial] = useState('');
      const [status, setStatus] = useState('');

      const eventTypes = [
        { value: 'column_change', label: 'Column Change' },
        { value: 'source_clean', label: 'Source Clean' },
        { value: 'calibration', label: 'Calibration' },
        { value: 'pm', label: 'PM (Preventive Maintenance)' },
        { value: 'lc_service', label: 'LC service' },
        { value: 'other', label: 'Other' },
      ];

      async function submit() {
        setStatus('Saving...');
        const payload = {
          event_type: eventType,
          event_date: eventDate ? eventDate + 'T12:00:00Z' : null,
          notes,
          operator,
        };
        if (eventType === 'column_change') {
          payload.column_vendor = colVendor || null;
          payload.column_model = colModel || null;
          payload.column_serial = colSerial || null;
        }
        try {
          const r = await fetch(API + `/api/instruments/${encodeURIComponent(instrument)}/events`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          if (r.ok) {
            setStatus('Logged.');
            setNotes('');
            setOperator('');
            setColVendor('');
            setColModel('');
            setColSerial('');
            setEventDate(new Date().toISOString().slice(0, 10));
            if (onSaved) onSaved();
            setTimeout(() => { setStatus(''); setOpen(false); }, 1200);
          } else {
            const err = await r.json();
            setStatus(`Error: ${err.detail || 'Unknown error'}`);
          }
        } catch (e) {
          setStatus(`Error: ${e.message}`);
        }
      }

      const inputStyle = {
        width: '100%', padding: '0.35rem 0.5rem', background: 'var(--bg)',
        color: 'var(--text)', border: '1px solid var(--border)', borderRadius: '0.35rem',
        fontSize: '0.8rem', marginTop: '0.25rem',
      };
      const selectStyle = { ...inputStyle, cursor: 'pointer' };

      return (
        <div style={{marginTop:'0.5rem'}}>
          <button onClick={() => setOpen(!open)} style={{
            padding:'0.25rem 0.6rem', fontSize:'0.72rem', background:'var(--surface)',
            color:'var(--accent)', border:'1px solid var(--border)', borderRadius:'0.35rem',
            cursor:'pointer', fontWeight:600,
          }}>
            {open ? 'Cancel' : 'Log event'}
          </button>
          {open && (
            <div style={{marginTop:'0.5rem', padding:'0.75rem', background:'var(--bg)', borderRadius:'0.5rem', border:'1px solid var(--border)'}}>
              <div style={{display:'flex', gap:'0.4rem', marginBottom:'0.4rem'}}>
                <div style={{flex:2}}>
                  <label style={{fontSize:'0.75rem', color:'var(--muted)'}}>Event type</label>
                  <select value={eventType} onChange={e => setEventType(e.target.value)} style={selectStyle}>
                    {eventTypes.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}
                  </select>
                </div>
                <div style={{flex:1}}>
                  <label style={{fontSize:'0.75rem', color:'var(--muted)'}}>Date</label>
                  <input type="date" value={eventDate} onChange={e => setEventDate(e.target.value)} style={inputStyle} />
                </div>
              </div>
              {eventType === 'column_change' && (
                <div style={{display:'flex', gap:'0.4rem', marginBottom:'0.4rem', flexWrap:'wrap'}}>
                  <div style={{flex:'1 1 120px'}}>
                    <label style={{fontSize:'0.75rem', color:'var(--muted)'}}>Column vendor</label>
                    <input value={colVendor} onChange={e => setColVendor(e.target.value)} placeholder="e.g. IonOpticks" style={inputStyle} />
                  </div>
                  <div style={{flex:'1 1 120px'}}>
                    <label style={{fontSize:'0.75rem', color:'var(--muted)'}}>Column model</label>
                    <input value={colModel} onChange={e => setColModel(e.target.value)} placeholder="e.g. Aurora 25cm" style={inputStyle} />
                  </div>
                  <div style={{flex:'1 1 120px'}}>
                    <label style={{fontSize:'0.75rem', color:'var(--muted)'}}>Column serial</label>
                    <input value={colSerial} onChange={e => setColSerial(e.target.value)} placeholder="Optional" style={inputStyle} />
                  </div>
                </div>
              )}
              <div style={{marginBottom:'0.4rem'}}>
                <label style={{fontSize:'0.75rem', color:'var(--muted)'}}>Operator</label>
                <input value={operator} onChange={e => setOperator(e.target.value)} placeholder="Your name" style={inputStyle} />
              </div>
              <div style={{marginBottom:'0.5rem'}}>
                <label style={{fontSize:'0.75rem', color:'var(--muted)'}}>Notes</label>
                <input value={notes} onChange={e => setNotes(e.target.value)} placeholder="Details..." style={inputStyle} />
              </div>
              <button onClick={submit} style={{padding:'0.3rem 0.75rem', fontSize:'0.8rem'}}>Save</button>
              {status && <span style={{marginLeft:'0.5rem', fontSize:'0.8rem', color: status.startsWith('Error') ? 'var(--fail)' : 'var(--pass)'}}>{status}</span>}
            </div>
          )}
        </div>
      );
    }

    /* ── Mini sparkline: last N runs of the primary metric for an instrument ── */
    function MiniSparkline({ allRuns, instrument, currentMode, n = 30 }) {
      if (!Array.isArray(allRuns)) return null;
      const metricKey = currentMode === 'DDA' ? 'n_psms' : 'n_precursors';
      const metricLabel = currentMode === 'DDA' ? 'PSMs' : 'Precursors';
      // Most recent N runs for this instrument, ordered ascending for plotting
      const instRuns = allRuns
        .filter(r => r.instrument === instrument && (r[metricKey] || 0) > 0)
        .slice(0, n)
        .reverse();
      if (instRuns.length < 2) {
        return (
          <div style={{fontSize:'0.7rem', color:'var(--muted)', marginTop:'0.5rem'}}>
            Not enough history for trend
          </div>
        );
      }
      const values = instRuns.map(r => r[metricKey] || 0);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = max - min || 1;
      const W = 240, H = 36, PAD = 3;
      const w = W - 2*PAD, h = H - 2*PAD;
      const points = values.map((v, i) => {
        const x = PAD + (values.length === 1 ? w/2 : (i / (values.length - 1)) * w);
        const y = PAD + h - ((v - min) / range) * h;
        return [x, y];
      });
      const pathD = points.map(([x, y], i) => `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
      const last = values[values.length - 1];
      const first = values[0];
      const delta = first > 0 ? ((last - first) / first) * 100 : 0;
      const trendColor = delta > 5 ? 'var(--pass)' : delta < -5 ? 'var(--fail)' : 'var(--muted)';
      const sign = delta >= 0 ? '+' : '';
      return (
        <div style={{marginTop:'0.5rem', paddingTop:'0.5rem', borderTop:'1px solid var(--border)'}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', fontSize:'0.7rem', color:'var(--muted)', marginBottom:'0.2rem'}}>
            <span>{metricLabel} · last {values.length}</span>
            <span style={{color: trendColor, fontWeight:600}}>{sign}{delta.toFixed(1)}%</span>
          </div>
          <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%', height:`${H}px`, display:'block'}}>
            <path d={pathD} fill="none" stroke="#60a5fa" strokeWidth="1.5" />
            {points.map(([x, y], i) => (
              <circle key={i} cx={x} cy={y} r="1.5" fill="#60a5fa">
                <title>{instRuns[i].run_name}: {values[i].toLocaleString()}</title>
              </circle>
            ))}
          </svg>
        </div>
      );
    }

    function LiveRuns() {
      const { data: allRuns, loading, reload, error } = useFetch('/api/runs?limit=200');
      useEffect(() => { const t = setInterval(reload, 15000); return () => clearInterval(t); }, [reload]);

      if (loading && !allRuns) return <div className="empty">Loading...</div>;
      // Defensive: /api/runs should return an array but a server error may
      // return {detail:"…"}. Treat anything non-array as "no runs yet".
      if (!Array.isArray(allRuns) || allRuns.length === 0) {
        return <div className="empty">No QC runs yet. Start the watcher to begin monitoring.</div>;
      }

      // Filter to runs from the last 7 days. Was "today only" pre-v0.2.143
      // but a lab that runs QC a few times a week saw an empty tab on most
      // days; week-window keeps the panel useful without drowning it in
      // history (QC History tab is for deeper review).
      const weekAgo = new Date(Date.now() - 7 * 86400000);
      const runs = allRuns.filter(r => new Date(r.run_date) >= weekAgo);

      // Show most recent per instrument (always, even if not today)
      const byInstrument = {};
      for (const r of allRuns) {
        if (!byInstrument[r.instrument]) byInstrument[r.instrument] = r;
      }

      return (
        <div>
          {runs.length > 0 ? (
            <QuickStatus runs={runs} />
          ) : (
            <div className="card" style={{marginBottom:'1.5rem'}}>
              <div style={{color:'var(--muted)'}}>No QC runs in the last 7 days. Showing most recent per instrument below.</div>
            </div>
          )}
          <div className="grid">
            {Object.entries(byInstrument).map(([name, run]) => (
              <div className="card" key={name}>
                <h3 style={{display:'flex', alignItems:'center', gap:'0.5rem', flexWrap:'wrap'}}>
                  {name}
                  <LastQcBadge instrument={name} />
                </h3>
                <ColumnLifeBadge instrument={name} />
                <div className="metric"><span className="metric-label">Last run</span><span className="metric-value" title={run.run_name} style={{maxWidth:'60%', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{run.run_name}</span></div>
                <div className="metric"><span className="metric-label">Mode</span><span className="metric-value">{run.mode}</span></div>
                {/* Gate metric removed 2026-04-20 — gating wasn't functional */}
                <div className="metric"><span className="metric-label">IPS</span><span className="badge badge-grs">IPS {run.ips_score || '—'}</span></div>
                <div className="metric">
                  <span className="metric-label">PEG / Drift</span>
                  <span style={{display:'inline-flex', gap:'0.3rem'}}>
                    <PegBadge run={run} /><DriftBadge run={run} />
                  </span>
                </div>
                {run.mode === 'DIA' && <div className="metric"><span className="metric-label">Precursors</span><span className="metric-value">{run.n_precursors?.toLocaleString()}</span></div>}
                {run.mode === 'DDA' && <div className="metric"><span className="metric-label">PSMs</span><span className="metric-value">{run.n_psms?.toLocaleString()}</span></div>}
                <div className="metric"><span className="metric-label">Time</span><span className="metric-value" title={new Date(run.run_date).toLocaleString()}>{new Date(run.run_date).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</span></div>
                <MiniSparkline allRuns={allRuns} instrument={name} currentMode={run.mode} />
                {run.diagnosis && <div className="diagnosis">{run.diagnosis}</div>}
                <LogEventButton instrument={name} />
              </div>
            ))}
          </div>
          <TodayTicOverlay />
        </div>
      );
    }

    // Today's QC TIC overlay — every QC run from today overlaid on one
    // chart, colored light→dark by time of day so the operator can see
    // the day's gradient shape at a glance. When an LC issue starts
    // mid-day it shows up as divergence in the later (darker) traces.
    //
    // Scope note: QC-only for now. Spec's Sample/Blank facets require
    // joining sample_health to a future tic-for-health-rows table.
    // That's Ship B follow-up work; the MVP is the QC overlay because
    // it uses data we already extract in baseline.py.
    function TodayTicOverlay() {
      const [data, setData] = useState(null);
      const [normalize, setNormalize] = useState(true);

      useEffect(() => {
        fetch(API + '/api/today/tic-overview')
          .then(r => r.json())
          .then(setData)
          .catch(() => setData({ runs: [], n_runs: 0, n_with_tic: 0 }));
      }, []);

      if (!data) {
        return (
          <div className="card" style={{marginTop:'1rem'}}>
            <h3>Today's TIC overlay</h3>
            <div style={{color:'var(--muted)'}}>Loading…</div>
          </div>
        );
      }
      // v0.2.132+ returns three faceted buckets. Older API responses
      // only had data.runs (QC) — fall back to that shape so a stale
      // backend doesn't break the UI.
      const facets = data.facets || { qc: data.runs || [], sample: [], blank: [] };
      const totalRuns = (facets.qc?.length || 0)
                      + (facets.sample?.length || 0)
                      + (facets.blank?.length || 0);
      if (totalRuns === 0) {
        return null;  // QuickStatus already says "no runs today"
      }
      const totalWithTic =
        (facets.qc?.filter(r => r.has_tic).length || 0)
        + (facets.sample?.filter(r => r.has_tic).length || 0)
        + (facets.blank?.filter(r => r.has_tic).length || 0);
      if (totalWithTic === 0) {
        return (
          <div className="card" style={{marginTop:'1rem'}}>
            <h3>Today's TIC overlay</h3>
            <div style={{color:'var(--muted)', fontSize:'0.85rem'}}>
              {totalRuns} run{totalRuns === 1 ? '' : 's'} today but none have
              a TIC trace in the DB. Run <code>stan backfill-tic</code> to
              populate traces for existing runs, or wait for the next baseline.
            </div>
          </div>
        );
      }

      // Build a "Instrument: Column (installed Xd ago)" subtitle from
      // the /api/today endpoint's columns payload so the operator can
      // see at a glance which column is producing today's traces.
      const colEntries = Object.entries(data.columns || {})
        .filter(([, c]) => c && (c.vendor || c.model));
      const columnSubtitle = colEntries.length === 0 ? null : (
        <div style={{fontSize:'0.75rem', color:'var(--muted)', margin:'0 0 0.25rem 0'}}>
          {colEntries.map(([inst, c], i) => {
            const label = [c.vendor, c.model].filter(Boolean).join(' ');
            const ageStr = c.days_ago == null ? ''
              : c.days_ago === 0 ? ' (installed today)'
              : ` (installed ${c.days_ago}d ago)`;
            return (
              <span key={`col-${inst}`}>
                {i > 0 && <span style={{margin:'0 0.5rem'}}>·</span>}
                <strong>{inst}:</strong> {label || 'unnamed column'}{ageStr}
              </span>
            );
          })}
        </div>
      );

      // Per-facet color ramps so the operator can tell QC apart from
      // Sample apart from Blank at a glance even when overlaid in
      // adjacent panels.
      const FACET_RAMPS = {
        qc:     { from: [207, 231, 255], to: [30, 64, 175] },   // light → deep blue
        sample: { from: [233, 213, 255], to: [88, 28, 135] },   // light → deep purple
        blank:  { from: [229, 231, 235], to: [55, 65, 81] },    // light → deep gray
      };

      return (
        <div className="card" style={{marginTop:'1rem'}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:'0.5rem'}}>
            <h3 style={{margin:0}}>
              Today's TIC overlay ({totalWithTic} trace{totalWithTic === 1 ? '' : 's'})
            </h3>
            <label style={{display:'inline-flex', alignItems:'center', gap:'0.3rem', fontSize:'0.8rem', color:'var(--muted)'}}>
              <input type="checkbox" checked={normalize}
                     onChange={e => setNormalize(e.target.checked)} />
              Normalize (0–1 per trace)
            </label>
          </div>
          {columnSubtitle}
          <p style={{fontSize:'0.75rem', color:'var(--muted)', margin:'0.25rem 0 0.5rem 0'}}>
            Three panels: QC (blue), Sample (purple), Blank (gray). Light = earliest
            run of the day, dark = most recent. Divergence = LC or spray issue
            appearing mid-day. Triangles at the bottom of QC = cIRT anchor peptide
            RTs for the most recent QC run (green &lt;0.5 min drift, yellow &lt;1.5,
            red ≥1.5).
          </p>
          {['qc', 'sample', 'blank'].map(cls => {
            const items = facets[cls] || [];
            const withTic = items.filter(r => r.has_tic);
            const label = cls === 'qc' ? 'QC' : cls === 'sample' ? 'Sample' : 'Blank';
            return (
              <FacetPanel key={cls}
                          label={label} items={items} withTic={withTic}
                          ramp={FACET_RAMPS[cls]} normalize={normalize}
                          showCirtMarkers={cls === 'qc'} />
            );
          })}
        </div>
      );
    }

    // One panel within the 3-facet TIC overlay. Renders a TicOverlaySvg
    // (when there are TIC traces) or a one-line stub (when items
    // exist but none have a stored TIC).
    function FacetPanel({ label, items, withTic, ramp, normalize, showCirtMarkers }) {
      if (items.length === 0) return null;
      return (
        <div style={{marginTop:'0.5rem', paddingTop:'0.5rem', borderTop:'1px solid var(--border)'}}>
          <div style={{display:'flex', alignItems:'baseline', gap:'0.5rem',
                       fontSize:'0.85rem', fontWeight:500}}>
            <span>{label}</span>
            <span style={{color:'var(--muted)', fontSize:'0.7rem', fontWeight:'normal'}}>
              {items.length} run{items.length === 1 ? '' : 's'} ·
              {' '}{withTic.length} with TIC
            </span>
          </div>
          {withTic.length > 0
            ? <TicOverlaySvg runs={withTic} normalize={normalize}
                             ramp={ramp} showCirtMarkers={showCirtMarkers} />
            : <div style={{color:'var(--muted)', fontSize:'0.75rem', padding:'0.4rem 0'}}>
                No TIC traces yet for these runs.
                {label !== 'QC' && (
                  <> Sample/Blank traces start populating after v0.2.132 —
                     older sample_health rows have no TIC in the DB.</>)}
              </div>}
        </div>
      );
    }

    // Blend two RGB triples by t∈[0,1]. Used for a light→dark time-of-day ramp.
    function _blend(c0, c1, t) {
      return [
        Math.round(c0[0] + (c1[0] - c0[0]) * t),
        Math.round(c0[1] + (c1[1] - c0[1]) * t),
        Math.round(c0[2] + (c1[2] - c0[2]) * t),
      ];
    }
    function timeOfDayColor(i, n, ramp) {
      // Light → deep ramp interpolated linearly. Default = the original
      // pale-to-deep blue from Ship B; per-facet ramps override it so
      // QC stays blue, Sample is purple, Blank is gray. Keeps early
      // runs visible without washing them out and pushes the most
      // recent runs forward, which is what the operator cares about.
      const r = ramp || { from: [207, 231, 255], to: [30, 64, 175] };
      const t = n > 1 ? i / (n - 1) : 1;
      const rgb = _blend(r.from, r.to, t);
      return `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
    }

    function TicOverlaySvg({ runs, normalize, height=260, ramp,
                              showCirtMarkers=true }) {
      // Convert each run's rt_min[] + intensity[] into (x, y) path points.
      // Shared x-axis = max RT across all runs. Shared y-axis = either
      // normalized per-trace (0-1, useful for shape comparison) or raw
      // absolute intensity (useful for signal comparison).
      const width = 900;
      const padding = 30;
      const w = width - padding * 2;
      const h = height - padding * 2;

      const series = useMemo(() => runs.map(r => {
        const rt = r.tic?.rt_min || [];
        const intensity = r.tic?.intensity || [];
        if (rt.length < 2 || rt.length !== intensity.length) return null;
        let yvals = intensity.slice();
        if (normalize) {
          const mx = Math.max(...yvals);
          if (mx > 0) yvals = yvals.map(v => v / mx);
        }
        return { run: r, rt, y: yvals };
      }).filter(Boolean), [runs, normalize]);

      if (series.length === 0) {
        return <div style={{color:'var(--muted)'}}>No renderable traces.</div>;
      }

      const rtMax = Math.max(...series.map(s => Math.max(...s.rt)));
      const rtMin = Math.min(...series.map(s => Math.min(...s.rt)));
      const rtRange = (rtMax - rtMin) || 1;

      const yMax = normalize ? 1 : Math.max(...series.flatMap(s => s.y));
      const yMin = normalize ? 0 : Math.min(0, ...series.flatMap(s => s.y));
      const yRange = (yMax - yMin) || 1;

      return (
        <div>
          <svg viewBox={`0 0 ${width} ${height}`} style={{width:'100%', height:`${height}px`}}>
            {/* RT axis tick marks */}
            {Array.from({length: 6}, (_, i) => {
              const rt = rtMin + (i / 5) * rtRange;
              const x = padding + (i / 5) * w;
              return (
                <g key={`xt-${i}`}>
                  <line x1={x} y1={height-padding} x2={x} y2={height-padding+4}
                        stroke="var(--muted)" strokeWidth="0.5" />
                  <text x={x} y={height-padding+15} fill="var(--muted)"
                        fontSize="10" textAnchor="middle">
                    {rt.toFixed(1)}
                  </text>
                </g>
              );
            })}
            <text x={width/2} y={height-2} fill="var(--muted)" fontSize="10"
                  textAnchor="middle">RT (min)</text>
            <text x={padding-22} y={padding+4} fill="var(--muted)" fontSize="10"
                  textAnchor="start">
              {normalize ? 'Intensity (normalized)' : 'Intensity (raw)'}
            </text>

            {/* TIC lines — reverse-iterate so earliest runs draw first and
                recent (darker, higher-contrast) runs draw on top */}
            {series.map((s, si) => {
              const c = timeOfDayColor(si, series.length, ramp);
              const pts = s.rt.map((t, i) => {
                const x = padding + ((t - rtMin) / rtRange) * w;
                const y = padding + h - ((s.y[i] - yMin) / yRange) * h;
                return `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`;
              }).join(' ');
              const dt = new Date(s.run.run_date);
              const timeStr = dt.toLocaleString([], {hour:'2-digit', minute:'2-digit'});
              const ids = s.run.mode === 'DDA' ? s.run.n_psms : s.run.n_precursors;
              const idsLabel = s.run.mode === 'DDA' ? 'PSMs' : 'precursors';
              const tip = `${s.run.run_name}\n${timeStr} · ${s.run.instrument}\n` +
                          `IPS ${s.run.ips_score || '—'} · ${ids ? ids.toLocaleString() : '—'} ${idsLabel}`;
              return (
                <path key={`tic-${s.run.run_id}`} d={pts} fill="none"
                      stroke={c} strokeWidth="1.5" opacity="0.85">
                  <title>{tip}</title>
                </path>
              );
            })}

            {/* cIRT anchor markers for the MOST RECENT run only — drawn
                as small downward triangles at the bottom of the chart.
                Showing every run's markers (10 peptides × 5 runs = 50
                triangles) would be unreadable; the latest run is what
                the operator cares about. Trend across the day is in
                the dedicated Trends → cIRT card. Only QC panels render
                these — Sample/Blank don't go through DIA-NN. */}
            {showCirtMarkers && (() => {
              const latest = series[series.length - 1];
              const markers = latest?.run?.cirt_markers || [];
              if (!markers.length) return null;
              const MARKER_COLORS = {
                green:   '#16a34a',
                yellow:  '#eab308',
                red:     '#dc2626',
                unknown: '#94a3b8',
              };
              const yBase = height - padding;  // bottom of chart area
              return markers.map((m, mi) => {
                if (m.observed_rt_min == null) return null;
                const x = padding + ((m.observed_rt_min - rtMin) / rtRange) * w;
                if (x < padding || x > width - padding) return null;
                const c = MARKER_COLORS[m.deviation_class] || MARKER_COLORS.unknown;
                const devStr = m.deviation_min != null
                  ? (m.deviation_min >= 0 ? '+' : '') + m.deviation_min.toFixed(3) + ' min'
                  : 'n/a';
                const refStr = m.reference_rt_min != null
                  ? m.reference_rt_min.toFixed(2) + ' min'
                  : 'n/a';
                const tip =
                  `${m.peptide}\n` +
                  `Observed: ${m.observed_rt_min.toFixed(3)} min\n` +
                  `Reference: ${refStr}\n` +
                  `Δ: ${devStr}  (${m.deviation_class})`;
                // Downward-pointing triangle, apex at x, base above yBase
                const tri = `${x.toFixed(1)},${yBase.toFixed(1)} ` +
                            `${(x-4).toFixed(1)},${(yBase-7).toFixed(1)} ` +
                            `${(x+4).toFixed(1)},${(yBase-7).toFixed(1)}`;
                // Thin dotted vertical guide from the triangle up into
                // the chart so the operator can eyeball which part of
                // the TIC the peptide anchors to.
                return (
                  <g key={`cirt-${mi}`}>
                    <line x1={x} y1={padding} x2={x} y2={yBase-7}
                          stroke={c} strokeDasharray="2,3"
                          strokeWidth="0.6" opacity="0.35" />
                    <polygon points={tri} fill={c} stroke="#fff" strokeWidth="0.5">
                      <title>{tip}</title>
                    </polygon>
                  </g>
                );
              });
            })()}
          </svg>
          <div style={{display:'flex', gap:'0.8rem', flexWrap:'wrap',
                       fontSize:'0.7rem', color:'var(--muted)',
                       marginTop:'0.3rem', paddingLeft:'1rem'}}>
            {series.map((s, si) => {
              const c = timeOfDayColor(si, series.length, ramp);
              const dt = new Date(s.run.run_date);
              const timeStr = dt.toLocaleString([], {hour:'2-digit', minute:'2-digit'});
              return (
                <span key={`leg-${s.run.run_id}`}
                      style={{display:'inline-flex', alignItems:'center', gap:'0.3rem'}}>
                  <span style={{width:'1rem', height:'2px', background:c,
                                display:'inline-block'}} />
                  {timeStr}
                  <span style={{opacity:0.7}}>{s.run.instrument}</span>
                </span>
              );
            })}
          </div>
        </div>
      );
    }

    // Classify a run as "failed" — near-zero results indicate a broken
    // injection, empty file, or failed search rather than just a weak
    // sample. Mirrors the stan.community.validate.HARD_GATES thresholds
    // so the dashboard and the community-submission gate agree on what
    // counts as a failed run (n_precursors<5000 for DIA, n_psms<5000
    // for DDA). Used for the "hide failed" filter toggle and the red
    // failure badge on rows that escape the filter (e.g. when toggle is off).
    function isFailedRun(r) {
      if (!r) return false;
      const mode = (r.mode || '').toUpperCase();
      if (mode === 'DDA') {
        return (r.n_psms || 0) < 5000;
      }
      // Default to DIA rules for anything non-DDA (diaPASEF, DIA, etc.)
      return (r.n_precursors || 0) < 5000;
    }

    function RunHistory() {
      // Fetch with include_hidden=true so we can show/hide client-side
      // via a toggle without refetching. Hidden rows are filtered out
      // by default; the "Show hidden" toggle restores them with dim
      // styling so the operator can review or unhide.
      const { data: runs, loading, reload } = useFetch(
        '/api/runs?limit=1000&include_hidden=true'
      );
      const [sortKey, setSortKey] = useState('run_date');
      const [sortDir, setSortDir] = useState('desc');
      const [dateFilter, setDateFilter] = useState('all');
      const [searchTerm, setSearchTerm] = useState('');
      const [selectedRun, setSelectedRun] = useState(null);
      // Default: hide failed runs (near-zero results — see isFailedRun)
      // AND hide soft-deleted rows (hidden=1). Operator toggles them
      // back on with the controls at the top of the table.
      const [hideFailed, setHideFailed] = useState(true);
      const [showHidden, setShowHidden] = useState(false);

      if (loading) return <div className="empty">Loading...</div>;
      // Defensive: treat any non-array response as "no runs".
      if (!Array.isArray(runs) || runs.length === 0) {
        return <div className="empty">No runs recorded yet.</div>;
      }

      async function hideRun(run_id, current, runName) {
        const nowHidden = !current;
        let reason = '';
        if (nowHidden) {
          reason = window.prompt(
            `Hide "${runName}" from QC history?\n\n` +
            `Optional reason (saved with the row for later review):`,
            ''
          );
          if (reason === null) return;  // cancel
        }
        try {
          const res = await fetch(API + `/api/runs/${encodeURIComponent(run_id)}/hide`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ hidden: nowHidden, reason: reason || '' }),
          });
          if (!res.ok) {
            const text = await res.text();
            alert(`Hide failed: ${res.status} ${text}`);
            return;
          }
          reload();
        } catch (e) {
          alert(`Hide failed: ${e}`);
        }
      }

      // Filter by date range
      const now = new Date();
      const filterDate = (runDate) => {
        const d = new Date(runDate);
        if (dateFilter === 'all') return true;
        if (dateFilter === 'today') {
          return d.toDateString() === now.toDateString();
        }
        if (dateFilter === 'week') {
          const weekAgo = new Date(now.getTime() - 7 * 86400000);
          return d >= weekAgo;
        }
        if (dateFilter === 'month') {
          return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        }
        if (dateFilter === 'year') {
          return d.getFullYear() === now.getFullYear();
        }
        if (dateFilter === 'past') {
          return d.getFullYear() < now.getFullYear();
        }
        return true;
      };

      // Filter + sort
      let filtered = runs.filter(r => filterDate(r.run_date));
      // Hidden-row filter (hidden=1 means operator soft-deleted it)
      if (!showHidden) {
        filtered = filtered.filter(r => !r.hidden);
      }
      // Failed-run filter (near-zero precursors/PSMs)
      if (hideFailed) {
        filtered = filtered.filter(r => !isFailedRun(r));
      }
      if (searchTerm) {
        const term = searchTerm.toLowerCase();
        filtered = filtered.filter(r =>
          (r.run_name || '').toLowerCase().includes(term) ||
          (r.instrument || '').toLowerCase().includes(term)
        );
      }
      const getSortVal = (r) => {
        if (sortKey === 'primary_ids') return (r.mode === 'DDA' ? r.n_psms : r.n_precursors) || 0;
        return r[sortKey];
      };
      filtered.sort((a, b) => {
        let va = getSortVal(a);
        let vb = getSortVal(b);
        if (va == null) va = sortKey === 'run_date' ? '' : 0;
        if (vb == null) vb = sortKey === 'run_date' ? '' : 0;
        if (typeof va === 'string') {
          return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
        }
        return sortDir === 'asc' ? va - vb : vb - va;
      });

      const handleSort = (key) => {
        if (sortKey === key) {
          setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
        } else {
          setSortKey(key);
          setSortDir('desc');
        }
      };

      const SortHeader = ({col, label}) => (
        <th onClick={() => handleSort(col)} style={{cursor: 'pointer', userSelect: 'none'}}>
          {label}{sortKey === col ? (sortDir === 'asc' ? ' ▲' : ' ▼') : ''}
        </th>
      );

      const EM_DASH = '\u2014';
      const fmtNum = (n) => (n != null && n > 0) ? n.toLocaleString() : EM_DASH;
      const fmtFloat = (n, d=1) => (n != null) ? n.toFixed(d) : EM_DASH;
      const fmtSig = (n) => {
        if (n == null || n === 0) return EM_DASH;
        if (n >= 1e12) return (n/1e12).toFixed(1) + 'T';
        if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
        if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
        return n.toFixed(0);
      };
      const fmtSigned = (n, d=2) => {
        if (n == null) return EM_DASH;
        const sign = n >= 0 ? '+' : '';
        return sign + n.toFixed(d);
      };
      // FWHM stored in minutes; display as seconds with 1 decimal
      const fmtFwhmSec = (n) => (n != null && n > 0) ? (n * 60).toFixed(1) : EM_DASH;
      // Primary identifications: precursors for DIA, PSMs for DDA
      const primaryIds = (r) => r.mode === 'DDA' ? r.n_psms : r.n_precursors;

      return (
        <div className="card">
          <div style={{display:'flex', gap:'0.75rem', marginBottom:'0.75rem', flexWrap:'wrap', alignItems:'center'}}>
            <input
              type="text"
              placeholder="Search run name or instrument..."
              value={searchTerm}
              onChange={e => setSearchTerm(e.target.value)}
              style={{flex:'1 1 250px', padding:'0.4rem 0.6rem', background:'var(--bg)', color:'var(--text)', border:'1px solid var(--border)', borderRadius:'0.3rem'}}
            />
            <select
              value={dateFilter}
              onChange={e => setDateFilter(e.target.value)}
              style={{padding:'0.4rem 0.6rem', background:'var(--bg)', color:'var(--text)', border:'1px solid var(--border)', borderRadius:'0.3rem'}}
            >
              <option value="all">All time</option>
              <option value="today">Today</option>
              <option value="week">This week</option>
              <option value="month">This month</option>
              <option value="year">This year</option>
              <option value="past">Past years</option>
            </select>
            <label style={{display:'inline-flex', alignItems:'center', gap:'0.3rem', fontSize:'0.8rem', color:'var(--muted)'}}>
              <input type="checkbox" checked={hideFailed}
                     onChange={e => setHideFailed(e.target.checked)} />
              Hide failed
            </label>
            <label style={{display:'inline-flex', alignItems:'center', gap:'0.3rem', fontSize:'0.8rem', color:'var(--muted)'}}>
              <input type="checkbox" checked={showHidden}
                     onChange={e => setShowHidden(e.target.checked)} />
              Show hidden
            </label>
            <span style={{color:'var(--muted)', fontSize:'0.85rem'}}>
              {filtered.length} / {runs.length} runs
            </span>
          </div>
          <div style={{overflowX: 'auto'}}>
            <table>
              <thead><tr>
                <SortHeader col="run_name" label="Run" />
                <SortHeader col="instrument" label="Instrument" />
                <SortHeader col="mode" label="Mode" />
                <SortHeader col="ips_score" label="IPS" />
                <SortHeader col="peg_class" label="PEG" />
                <SortHeader col="drift_class" label="Drift" />
                <SortHeader col="primary_ids" label="Precursors / PSMs" />
                <SortHeader col="n_peptides" label="Peptides" />
                <SortHeader col="n_proteins" label="Proteins" />
                <SortHeader col="ms1_signal" label="MS1 Signal" />
                <SortHeader col="fwhm_rt_min" label="FWHM (s)" />
                <SortHeader col="median_mass_acc_ms1_ppm" label="Mass Acc ppm" />
                <SortHeader col="run_date" label="Date" />
                <th>Hide</th>
              </tr></thead>
              <tbody>
                {filtered.map(r => {
                  const ids = primaryIds(r);
                  const idsLabel = r.mode === 'DDA' ? 'PSMs' : 'Prec';
                  const failed = isFailedRun(r);
                  const isHidden = !!r.hidden;
                  // Dim hidden rows (visible only when "Show hidden"
                  // toggle is on) and subtly red-tint failed rows.
                  const rowStyle = {
                    cursor: 'pointer',
                    opacity: isHidden ? 0.5 : 1,
                    textDecoration: isHidden ? 'line-through' : 'none',
                    background: failed && !isHidden ? 'rgba(239,68,68,0.07)' : undefined,
                  };
                  return (
                    <tr key={r.id} onClick={() => setSelectedRun(r)} style={rowStyle}
                        title={isHidden ? `Hidden: ${r.hidden_reason || '(no reason given)'}` : (failed ? 'Near-zero result — flagged as failed run' : undefined)}>
                      <td style={{maxWidth:'280px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                        {failed && !isHidden && (
                          <span title="Failed run (below community-gate threshold)"
                                style={{display:'inline-block', width:'0.5rem', height:'0.5rem',
                                        background:'#ef4444', borderRadius:'50%',
                                        marginRight:'0.4rem', verticalAlign:'middle'}} />
                        )}
                        {r.run_name}
                      </td>
                      <td>{r.instrument}</td>
                      <td>{r.mode}</td>
                      <td><IpsBadge run={r} /></td>
                      <td><PegBadge run={r} /></td>
                      <td><DriftBadge run={r} /></td>
                      <td title={`${idsLabel}: ${ids != null ? ids.toLocaleString() : EM_DASH}`}>
                        {fmtNum(ids)} <span style={{color:'var(--muted)', fontSize:'0.7rem'}}>{ids > 0 ? idsLabel : ''}</span>
                      </td>
                      <td>{fmtNum(r.n_peptides)}</td>
                      <td>{fmtNum(r.n_proteins)}</td>
                      <td>{fmtSig(r.ms1_signal)}</td>
                      <td>{fmtFwhmSec(r.fwhm_rt_min)}</td>
                      <td>{fmtSigned(r.median_mass_acc_ms1_ppm, 2)}</td>
                      <td>{new Date(r.run_date).toLocaleString([], {year:'2-digit', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</td>
                      <td>
                        <button
                          onClick={(e) => { e.stopPropagation(); hideRun(r.id, isHidden, r.run_name); }}
                          title={isHidden ? 'Restore this run to the QC history' : 'Hide this run from the QC history (reversible)'}
                          style={{
                            padding:'0.15rem 0.45rem', fontSize:'0.7rem',
                            background:'var(--bg)', color:'var(--text)',
                            border:'1px solid var(--border)', borderRadius:'0.25rem',
                            cursor:'pointer',
                          }}>
                          {isHidden ? '↺ Restore' : '× Hide'}
                        </button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          {selectedRun && (
            <TicViewer
              runId={selectedRun.id}
              runName={selectedRun.run_name}
              instrument={selectedRun.instrument}
              spd={selectedRun.spd}
              onClose={() => setSelectedRun(null)}
            />
          )}
        </div>
      );
    }

    /* ── TIC Viewer Modal ──────────────────────────────────────────── */

    function TicViewer({ runId, runName, instrument, spd, onClose }) {
      const [tic, setTic] = useState(null);
      const [communityTic, setCommunityTic] = useState(null);
      const [loading, setLoading] = useState(true);
      const [showCommunity, setShowCommunity] = useState(true);

      useEffect(() => {
        fetch(API + `/api/runs/${runId}/tic`)
          .then(r => r.ok ? r.json() : null)
          .then(setTic)
          .catch(() => setTic(null))
          .finally(() => setLoading(false));
      }, [runId]);

      useEffect(() => {
        if (!instrument || !spd) return;
        // Infer instrument family
        const family = instrument.toLowerCase().includes('tims') ? 'timsTOF' :
                       instrument.toLowerCase().includes('astral') ? 'Astral' :
                       instrument.toLowerCase().includes('exploris') ? 'Exploris' :
                       instrument.toLowerCase().includes('lumos') || instrument.toLowerCase().includes('fusion') ? 'Fusion Lumos' :
                       'Orbitrap';
        // Try common cohort ID patterns
        const cohortIds = [
          `${family}_${spd}spd_low`,
          `${family}_${spd}spd`,
        ];
        (async () => {
          for (const cid of cohortIds) {
            try {
              const r = await fetch(`https://brettsp-stan.hf.space/api/cohorts/${encodeURIComponent(cid)}/tic`);
              if (r.ok) {
                const data = await r.json();
                if (data && data.median_tic) {
                  setCommunityTic(data);
                  return;
                }
              }
            } catch (e) {}
          }
        })();
      }, [instrument, spd]);

      if (loading) {
        return (
          <div style={{position:'fixed', top:0, left:0, right:0, bottom:0, background:'rgba(0,0,0,0.7)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000}}>
            <div className="card">Loading TIC...</div>
          </div>
        );
      }
      if (!tic) {
        return (
          <div style={{position:'fixed', top:0, left:0, right:0, bottom:0, background:'rgba(0,0,0,0.7)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000}} onClick={onClose}>
            <div className="card" style={{maxWidth:'500px'}}>
              <h3>No TIC data for this run</h3>
              <p>Re-run baseline with 0.2.40+ to extract TIC data.</p>
              <button onClick={onClose} style={{padding:'0.5rem 1rem', marginTop:'0.5rem'}}>Close</button>
            </div>
          </div>
        );
      }

      // Build SVG TIC plot
      const width = 900, height = 400, pad = 50;
      const rt = tic.rt_min;
      const intensity = tic.intensity;
      const rtMin = Math.min(...rt);
      const rtMax = Math.max(...rt);
      const maxInt = Math.max(...intensity);

      // Normalize run's TIC
      const runPoints = rt.map((r, i) => {
        const x = pad + ((r - rtMin) / (rtMax - rtMin)) * (width - 2*pad);
        const y = height - pad - (intensity[i] / maxInt) * (height - 2*pad);
        return [x, y];
      });
      const runPath = runPoints.map(([x,y],i) => `${i===0?'M':'L'}${x.toFixed(1)},${y.toFixed(1)}`).join(' ');

      // Community median trace (if available and toggle on)
      let commPath = null;
      if (showCommunity && communityTic && communityTic.median_tic) {
        const cRt = communityTic.median_tic.rt;
        const cInt = communityTic.median_tic.intensity;
        const cMax = Math.max(...cInt);
        if (cMax > 0 && cRt.length > 1) {
          const cPoints = cRt.map((r, i) => {
            const x = pad + ((r - rtMin) / (rtMax - rtMin)) * (width - 2*pad);
            const y = height - pad - (cInt[i] / cMax) * (height - 2*pad);
            return [x, y];
          });
          commPath = cPoints.map(([x,y],i) => `${i===0?'M':'L'}${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
        }
      }

      return (
        <div style={{position:'fixed', top:0, left:0, right:0, bottom:0, background:'rgba(0,0,0,0.85)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000, padding:'1rem'}} onClick={onClose}>
          <div className="card" style={{maxWidth:'1000px', width:'100%', maxHeight:'90vh', overflow:'auto'}} onClick={e => e.stopPropagation()}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'1rem'}}>
              <div>
                <h3 style={{margin:0, wordBreak:'break-all'}}>{runName}</h3>
                <div style={{color:'var(--muted)', fontSize:'0.85rem', marginTop:'0.25rem'}}>
                  {instrument} · SPD {spd || '?'}
                </div>
              </div>
              <button onClick={onClose} style={{padding:'0.4rem 0.8rem', background:'var(--bg)', color:'var(--text)', border:'1px solid var(--border)', borderRadius:'0.3rem', cursor:'pointer'}}>✕ Close</button>
            </div>
            {communityTic && (
              <label style={{display:'inline-flex', alignItems:'center', gap:'0.4rem', marginBottom:'0.5rem', fontSize:'0.85rem', cursor:'pointer'}}>
                <input type="checkbox" checked={showCommunity} onChange={e => setShowCommunity(e.target.checked)} />
                Show community median ({communityTic.n_traces || 0} traces)
              </label>
            )}
            <svg viewBox={`0 0 ${width} ${height}`} style={{width:'100%', height:'auto', background:'var(--bg)', borderRadius:'0.3rem'}}>
              {/* Axes */}
              <line x1={pad} y1={height-pad} x2={width-pad} y2={height-pad} stroke="var(--muted)" strokeWidth="1" />
              <line x1={pad} y1={pad} x2={pad} y2={height-pad} stroke="var(--muted)" strokeWidth="1" />
              {/* Community median (dashed orange) */}
              {commPath && <path d={commPath} fill="none" stroke="#ff6b35" strokeWidth="2.5" strokeDasharray="6,4" />}
              {/* Run TIC (solid blue) */}
              <path d={runPath} fill="none" stroke="#60a5fa" strokeWidth="2" />
              {/* Labels */}
              <text x={width/2} y={height-10} fill="var(--muted)" fontSize="12" textAnchor="middle">Retention Time (min)</text>
              <text x={15} y={height/2} fill="var(--muted)" fontSize="12" textAnchor="middle" transform={`rotate(-90, 15, ${height/2})`}>Intensity</text>
              <text x={pad} y={pad+15} fill="#60a5fa" fontSize="11">━ This run</text>
              {commPath && <text x={pad} y={pad+30} fill="#ff6b35" fontSize="11">┅ Community median</text>}
              <text x={width-pad} y={pad+15} fill="var(--muted)" fontSize="11" textAnchor="end">
                RT: {rtMin.toFixed(1)} - {rtMax.toFixed(1)} min · {rt.length} bins
              </text>
            </svg>
          </div>
        </div>
      );
    }

    /* ── Maintenance Event Marker ──────────────────────────────────── */

    function EventMarker({ event }) {
      const [hover, setHover] = useState(false);
      const typeLabels = {
        column_change: 'Column change',
        source_clean: 'Source clean',
        calibration: 'Calibration',
        pm: 'PM',
        lc_service: 'LC service',
        other: 'Other',
      };
      const typeColors = {
        column_change: 'var(--accent)',
        source_clean: 'var(--pass)',
        calibration: 'var(--warn)',
        pm: '#a78bfa',
        lc_service: '#f472b6',
        other: 'var(--muted)',
      };

      const label = typeLabels[event.event_type] || event.event_type;

      return (
        <div
          onMouseEnter={() => setHover(true)}
          onMouseLeave={() => setHover(false)}
          style={{position:'relative', display:'inline-block'}}
        >
          <div style={{
            width:'2px', height:'100%', minHeight:'1.6rem',
            borderLeft:`2px dashed ${color}`, display:'inline-block', verticalAlign:'middle',
          }} />
          <span style={{
            fontSize:'0.65rem', color, fontWeight:700, marginLeft:'0.2rem',
            verticalAlign:'middle', cursor:'default',
          }}>
            {label}
          </span>
          {hover && (
            <div style={{
              position:'absolute', bottom:'100%', left:0, zIndex:10,
              background:'var(--surface)', border:'1px solid var(--border)',

              <div style={{fontWeight:700, color}}>{label}</div>

              {event.operator && <div style={{color:'var(--muted)'}}>By: {event.operator}</div>}
              {event.notes && <div style={{color:'var(--text)', marginTop:'0.2rem'}}>{event.notes}</div>}
            </div>
