                      const status = cellStatus(cellRuns, cls);
                      const tipHead = `${inst} · ${CLASS_LABELS[cls]} · ${monthDayLabel(d)}`;
                      const tip = cellRuns.length
                        ? `${tipHead}\n${cellRuns.length} run${cellRuns.length === 1 ? '' : 's'}` +
                          (cls === 'qc'
                            ? `\nIPS range: ${Math.min(...cellRuns.map(r => r.ips_score ?? 0))}` +
                              `–${Math.max(...cellRuns.map(r => r.ips_score ?? 0))}`
                            : '')
                        : `${tipHead} · no runs`;
                      return (
                        <div key={`c-${inst}-${cls}-${di}`}
                             title={tip}
                             style={{
                               background: status.color, color: status.text,
                               borderRadius: '0.2rem',
                               textAlign: 'center',
                               padding: '0.25rem 0',
                               fontWeight: 600,
                               minHeight: '1.3rem',
                               display: 'flex',
                               alignItems: 'center',
                               justifyContent: 'center',
                               borderTop: ci === 0 ? '1px solid rgba(148,163,184,0.15)' : 'none',
                             }}>
                          {cellRuns.length || ''}
                        </div>
                      );
                    })}
                  </React.Fragment>
                ))}
              </React.Fragment>
            ))}
          </div>
        </div>
      );
    }

    // Today's QC TIC overlay — every QC run from today overlaid on one
    // chart, colored light→dark by time of day so the operator can see
    // the day's gradient shape at a glance. When an LC issue starts
    // mid-day it shows up as divergence in the later (darker) traces.
    //
    // Scope note: QC-only for now. Spec's Sample/Blank facets require
    // joining sample_health to a future tic-for-health-rows table.
    // That's Ship B follow-up work; the MVP is the QC overlay because
    // it uses data we already extract in baseline.py.
    function TodayTicOverlay() {
      const [data, setData] = useState(null);
      const [normalize, setNormalize] = useState(true);
      // Which facets to render. 'all' keeps the original 3-panel view,
      // 'qc' / 'sample' / 'blank' drill into a single category so the
      // operator can focus. Brett 2026-04-21: default 3-up panels are
      // hard to read when only one category matters.
      const [filter, setFilter] = useState('all');

      useEffect(() => {
        fetch(API + '/api/today/tic-overview')
          .then(r => r.json())
          .then(setData)
          .catch(() => setData({ runs: [], n_runs: 0, n_with_tic: 0 }));
      }, []);

      if (!data) {
        return (
          <div className="card" style={{marginTop:'1rem'}}>
            <h3>This Week's TIC overlay</h3>
            <div style={{color:'var(--muted)'}}>Loading…</div>
          </div>
        );
      }
      // v0.2.132+ returns three faceted buckets. Older API responses
      // only had data.runs (QC) — fall back to that shape so a stale
      // backend doesn't break the UI.
      const facets = data.facets || { qc: data.runs || [], sample: [], blank: [] };
      const totalRuns = (facets.qc?.length || 0)
                      + (facets.sample?.length || 0)
                      + (facets.blank?.length || 0);
      if (totalRuns === 0) {
        return null;  // QuickStatus already says "no runs today"
      }
      const totalWithTic =
        (facets.qc?.filter(r => r.has_tic).length || 0)
        + (facets.sample?.filter(r => r.has_tic).length || 0)
        + (facets.blank?.filter(r => r.has_tic).length || 0);
      if (totalWithTic === 0) {
        return (
          <div className="card" style={{marginTop:'1rem'}}>
            <h3>This Week's TIC overlay</h3>
            <div style={{color:'var(--muted)', fontSize:'0.85rem'}}>
              {totalRuns} run{totalRuns === 1 ? '' : 's'} today but none have
              a TIC trace in the DB. Run <code>stan backfill-tic</code> to
              populate traces for existing runs, or wait for the next baseline.
            </div>
          </div>
        );
      }

      // Build a "Instrument: Column (installed Xd ago)" subtitle from
      // the /api/today endpoint's columns payload so the operator can
      // see at a glance which column is producing today's traces.
      const colEntries = Object.entries(data.columns || {})
        .filter(([, c]) => c && (c.vendor || c.model));
      const columnSubtitle = colEntries.length === 0 ? null : (
        <div style={{fontSize:'0.75rem', color:'var(--muted)', margin:'0 0 0.25rem 0'}}>
          {colEntries.map(([inst, c], i) => {
            const label = [c.vendor, c.model].filter(Boolean).join(' ');
            const ageStr = c.days_ago == null ? ''
              : c.days_ago === 0 ? ' (installed today)'
              : ` (installed ${c.days_ago}d ago)`;
            return (
              <span key={`col-${inst}`}>
                {i > 0 && <span style={{margin:'0 0.5rem'}}>·</span>}
                <strong>{inst}:</strong> {label || 'unnamed column'}{ageStr}
              </span>
            );
          })}
        </div>
      );

      // Per-facet high-contrast palettes. v0.2.146: replaced the
      // light→dark ramp that washed out on the dark dashboard bg
      // (Brett saw near-invisible light-gray sample traces on 4/21).
      // These are mid-tone saturated colors distinct from each other
      // within a facet AND from other facets' palettes. Recency is
      // encoded via line-width in TicOverlaySvg instead of brightness.
      const FACET_PALETTES = {
        qc:     ['#60a5fa', '#22d3ee', '#38bdf8', '#818cf8', '#a78bfa', '#34d399'],  // blues/teals
        sample: ['#f472b6', '#c084fc', '#e879f9', '#fb7185', '#fbbf24', '#facc15'],  // purples/pinks/ambers
        blank:  ['#cbd5e1', '#a3a3a3', '#9ca3af', '#d4d4d8', '#94a3b8', '#71717a'],  // light neutrals on dark
      };

      return (
        <div className="card" style={{marginTop:'1rem'}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:'0.5rem'}}>
            <h3 style={{margin:0}}>
              This Week's TIC overlay ({totalWithTic} trace{totalWithTic === 1 ? '' : 's'})
            </h3>
            <div style={{display:'flex', alignItems:'center', gap:'0.6rem', flexWrap:'wrap'}}>
              {/* Facet filter: All / QC / Sample / Blank */}
              <div style={{display:'inline-flex', gap:'0.2rem'}}>
                {[
                  ['all', 'All'],
                  ['qc', `QC (${facets.qc?.length || 0})`],
                  ['sample', `Sample (${facets.sample?.length || 0})`],
                  ['blank', `Blank (${facets.blank?.length || 0})`],
                ].map(([k, lab]) => (
                  <button key={k} onClick={() => setFilter(k)} style={{
                    padding:'0.2rem 0.55rem', fontSize:'0.75rem',
                    background: filter === k ? 'var(--accent)' : 'var(--bg)',
                    color: filter === k ? '#000' : 'var(--text)',
                    border:'1px solid var(--border)', borderRadius:'0.25rem',
                    cursor:'pointer',
                  }}>{lab}</button>
                ))}
              </div>
              <label style={{display:'inline-flex', alignItems:'center', gap:'0.3rem', fontSize:'0.8rem', color:'var(--muted)'}}>
                <input type="checkbox" checked={normalize}
                       onChange={e => setNormalize(e.target.checked)} />
                Normalize (0–1 per trace)
              </label>
            </div>
          </div>
          {columnSubtitle}
          <p style={{fontSize:'0.75rem', color:'var(--muted)', margin:'0.25rem 0 0.5rem 0'}}>
            Distinct color per trace within each facet · thicker line = more recent run.
            Divergence between traces = LC or spray issue appearing mid-day.
            Triangles at the bottom of QC = cIRT anchor peptide RTs for the most
            recent QC run (green &lt;0.5 min drift, yellow &lt;1.5, red ≥1.5).
          </p>
          {['qc', 'sample', 'blank'].map(cls => {
            if (filter !== 'all' && filter !== cls) return null;
            const items = facets[cls] || [];
            const withTic = items.filter(r => r.has_tic);
            const label = cls === 'qc' ? 'QC' : cls === 'sample' ? 'Sample' : 'Blank';
            return (
              <FacetPanel key={cls}
                          label={label} items={items} withTic={withTic}
                          palette={FACET_PALETTES[cls]} normalize={normalize}
                          showCirtMarkers={cls === 'qc'} />
            );
          })}
        </div>
      );
    }

    // One panel within the 3-facet TIC overlay. Renders a TicOverlaySvg
    // (when there are TIC traces) or a one-line stub (when items
    // exist but none have a stored TIC).
    function FacetPanel({ label, items, withTic, palette, normalize, showCirtMarkers }) {
      if (items.length === 0) return null;
      return (
        <div style={{marginTop:'0.5rem', paddingTop:'0.5rem', borderTop:'1px solid var(--border)'}}>
          <div style={{display:'flex', alignItems:'baseline', gap:'0.5rem',
                       fontSize:'0.85rem', fontWeight:500}}>
            <span>{label}</span>
            <span style={{color:'var(--muted)', fontSize:'0.7rem', fontWeight:'normal'}}>
              {items.length} run{items.length === 1 ? '' : 's'} ·
              {' '}{withTic.length} with TIC
            </span>
          </div>
          {withTic.length > 0
            ? <TicOverlaySvg runs={withTic} normalize={normalize}
                             palette={palette} showCirtMarkers={showCirtMarkers} />
            : <div style={{color:'var(--muted)', fontSize:'0.75rem', padding:'0.4rem 0'}}>
                No TIC traces yet for these runs.
                {label !== 'QC' && (
                  <> Sample/Blank traces start populating after v0.2.132 —
                     older sample_health rows have no TIC in the DB.</>)}
              </div>}
        </div>
      );
    }

    // v0.2.146: per-trace distinct-color palette replaces the old
    // light→dark ramp. Brett: light-end of the ramp disappeared on
    // the dark dashboard. Palette cycles if n > palette.length.
    function traceColor(i, palette) {
      const p = palette || ['#60a5fa', '#22d3ee', '#38bdf8', '#818cf8', '#a78bfa', '#34d399'];
      return p[i % p.length];
    }
    // Line width encodes recency — newest trace is thickest so the
    // operator's eye goes to the current run first.
    function traceWidth(i, n) {
      if (n <= 1) return 2.2;
      const t = i / (n - 1);  // 0 = oldest, 1 = newest
      return 1.2 + t * 1.6;   // 1.2 → 2.8 px
    }

    function TicOverlaySvg({ runs, normalize, height=260, palette,
                              showCirtMarkers=true }) {
      // v0.2.174: 'all' | 'outliers' | 'recent10' view.
      // - all: every trace (old behavior)
      // - outliers: median curve + top-5 most-deviant traces
      // - recent10: newest 10 traces
      // Solves the "50+ trace legend is useless" problem by focusing the
      // chart on the traces worth investigating.
      const [view, setView] = useState('all');
      const [hoverId, setHoverId] = useState(null);
      // Convert each run's rt_min[] + intensity[] into (x, y) path points.
      const width = 900;
      const padding = 30;
      const w = width - padding * 2;
      const h = height - padding * 2;

      const baseSeries = useMemo(() => runs.map(r => {
        const rt = r.tic?.rt_min || [];
        const intensity = r.tic?.intensity || [];
        if (rt.length < 2 || rt.length !== intensity.length) return null;
        let yvals = intensity.slice();
        if (normalize) {
          const mx = Math.max(...yvals);
          if (mx > 0) yvals = yvals.map(v => v / mx);
        }
        return { run: r, rt, y: yvals };
      }).filter(Boolean), [runs, normalize]);

      // Build a common RT grid and interpolate every trace onto it so
      // we can compute a pointwise median and each trace's deviation
      // from it. Used only by the 'outliers' view.
      const { medianCurve, deviations } = useMemo(() => {
        if (baseSeries.length < 3) return { medianCurve: null, deviations: new Map() };
        const rtMx = Math.max(...baseSeries.map(s => Math.max(...s.rt)));
        const rtMn = Math.min(...baseSeries.map(s => Math.min(...s.rt)));
        const N = 120;
        const grid = Array.from({length:N}, (_,i) => rtMn + (i/(N-1)) * (rtMx - rtMn));
        const interp = (rt, y, t) => {
          if (t <= rt[0]) return y[0];
          if (t >= rt[rt.length-1]) return y[rt.length-1];
          let lo = 0, hi = rt.length - 1;
          while (hi - lo > 1) {
            const mid = (lo + hi) >> 1;
            if (rt[mid] <= t) lo = mid; else hi = mid;
          }
          const f = (t - rt[lo]) / (rt[hi] - rt[lo] || 1);
          return y[lo] + f * (y[hi] - y[lo]);
        };
        const matrix = baseSeries.map(s => grid.map(t => interp(s.rt, s.y, t)));
        const med = grid.map((_, j) => {
          const col = matrix.map(row => row[j]).sort((a,b) => a-b);
          return col[Math.floor(col.length/2)];
        });
        const devs = new Map();
        baseSeries.forEach((s, i) => {
          let sum = 0;
          for (let j = 0; j < N; j++) sum += Math.abs(matrix[i][j] - med[j]);
          devs.set(s.run.run_id, sum / N);
        });
        return { medianCurve: { rt: grid, y: med }, deviations: devs };
      }, [baseSeries]);

      // Pick which traces to actually plot based on the view mode.
      const series = useMemo(() => {
        if (view === 'all' || baseSeries.length < 3) return baseSeries;
        if (view === 'recent10') {
          // baseSeries is already oldest→newest; take the last 10.
          return baseSeries.slice(Math.max(0, baseSeries.length - 10));
        }
        // outliers: top 5 by mean-abs-deviation from median
        const scored = baseSeries.map(s => [s, deviations.get(s.run.run_id) || 0]);
        scored.sort((a, b) => b[1] - a[1]);
        return scored.slice(0, 5).map(p => p[0])
          .sort((a, b) => new Date(a.run.run_date) - new Date(b.run.run_date));
      }, [baseSeries, view, deviations]);

      if (series.length === 0) {
        return <div style={{color:'var(--muted)'}}>No renderable traces.</div>;
      }

      const rtMax = Math.max(...series.map(s => Math.max(...s.rt)));
      const rtMin = Math.min(...series.map(s => Math.min(...s.rt)));
      const rtRange = (rtMax - rtMin) || 1;

      const yMax = normalize ? 1 : Math.max(...series.flatMap(s => s.y));
      const yMin = normalize ? 0 : Math.min(0, ...series.flatMap(s => s.y));
      const yRange = (yMax - yMin) || 1;

      const viewBtn = (k, lab) => (
        <button key={k} onClick={() => setView(k)} style={{
          padding:'0.12rem 0.45rem', fontSize:'0.7rem',
          background: view === k ? 'var(--accent)' : 'transparent',
          color: view === k ? '#000' : 'var(--muted)',
          border:'1px solid var(--border)', borderRadius:'0.2rem',
          cursor:'pointer',
        }}>{lab}</button>
      );

      return (
        <div>
          {/* View selector — replaces the unreadable 50-entry legend with a
              focused outliers-only / newest-10 view */}
          <div style={{display:'flex', gap:'0.25rem', marginBottom:'0.3rem',
                       justifyContent:'flex-end', alignItems:'center',
                       fontSize:'0.7rem', color:'var(--muted)'}}>
            <span style={{marginRight:'0.3rem'}}>Show:</span>
            {viewBtn('all', `All (${baseSeries.length})`)}
            {viewBtn('outliers', 'Outliers (top 5 vs median)')}
            {viewBtn('recent10', 'Newest 10')}
          </div>
          <svg viewBox={`0 0 ${width} ${height}`} style={{width:'100%', height:`${height}px`}}>
            {/* RT axis tick marks */}
            {Array.from({length: 6}, (_, i) => {
              const rt = rtMin + (i / 5) * rtRange;
              const x = padding + (i / 5) * w;
              return (
                <g key={`xt-${i}`}>
                  <line x1={x} y1={height-padding} x2={x} y2={height-padding+4}
                        stroke="var(--muted)" strokeWidth="0.5" />
                  <text x={x} y={height-padding+15} fill="var(--muted)"
                        fontSize="10" textAnchor="middle">
                    {rt.toFixed(1)}
                  </text>
                </g>
              );
            })}
            <text x={width/2} y={height-2} fill="var(--muted)" fontSize="10"
                  textAnchor="middle">RT (min)</text>
            <text x={padding-22} y={padding+4} fill="var(--muted)" fontSize="10"
                  textAnchor="start">
              {normalize ? 'Intensity (normalized)' : 'Intensity (raw)'}
            </text>

            {/* Median reference curve — only shown in outliers mode so the
                operator can see what "normal" looks like. Gray dashed. */}
            {view === 'outliers' && medianCurve && (() => {
              const pts = medianCurve.rt.map((t, i) => {
                const x = padding + ((t - rtMin) / rtRange) * w;
                const y = padding + h - ((medianCurve.y[i] - yMin) / yRange) * h;
                return `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`;
              }).join(' ');
              return (
                <path d={pts} fill="none" stroke="#94a3b8"
                      strokeWidth="2" strokeDasharray="6,4" opacity="0.6">
                  <title>Cohort median TIC</title>
                </path>
              );
            })()}

            {/* TIC lines — oldest first so newest (thicker) paints on top */}
            {series.map((s, si) => {
              const c = traceColor(si, palette);
              const lw = traceWidth(si, series.length);
              const isHover = hoverId === s.run.run_id;
              const dim = hoverId && !isHover;
              const pts = s.rt.map((t, i) => {
                const x = padding + ((t - rtMin) / rtRange) * w;
                const y = padding + h - ((s.y[i] - yMin) / yRange) * h;
                return `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`;
              }).join(' ');
              const dt = new Date(s.run.run_date);
              const timeStr = dt.toLocaleString([], {hour:'2-digit', minute:'2-digit'});
              const ids = s.run.mode === 'DDA' ? s.run.n_psms : s.run.n_precursors;
              const idsLabel = s.run.mode === 'DDA' ? 'PSMs' : 'precursors';
              const devStr = deviations.get(s.run.run_id);
              const tip = `${s.run.run_name}\n${timeStr} · ${s.run.instrument}\n` +
                          `IPS ${s.run.ips_score || '—'} · ${ids ? ids.toLocaleString() : '—'} ${idsLabel}` +
                          (devStr != null ? `\ndeviation vs median: ${devStr.toFixed(3)}` : '');
              return (
                <path key={`tic-${s.run.run_id}`} d={pts} fill="none"
                      stroke={c} strokeWidth={isHover ? lw + 1.5 : lw}
                      opacity={dim ? 0.15 : 0.95}
                      onMouseEnter={() => setHoverId(s.run.run_id)}
                      onMouseLeave={() => setHoverId(null)}
                      style={{cursor:'pointer'}}>
                  <title>{tip}</title>
                </path>
              );
            })}

            {/* cIRT anchor markers for the MOST RECENT run only — drawn
                as small downward triangles at the bottom of the chart.
                Showing every run's markers (10 peptides × 5 runs = 50
                triangles) would be unreadable; the latest run is what
                the operator cares about. Trend across the day is in
                the dedicated Trends → cIRT card. Only QC panels render
                these — Sample/Blank don't go through DIA-NN. */}
            {showCirtMarkers && (() => {
              const latest = series[series.length - 1];
              const markers = latest?.run?.cirt_markers || [];
              if (!markers.length) return null;
              const MARKER_COLORS = {
                green:   '#16a34a',
                yellow:  '#eab308',
                red:     '#dc2626',
                unknown: '#94a3b8',
              };
              const yBase = height - padding;  // bottom of chart area
              return markers.map((m, mi) => {
                if (m.observed_rt_min == null) return null;
                const x = padding + ((m.observed_rt_min - rtMin) / rtRange) * w;
                if (x < padding || x > width - padding) return null;
                const c = MARKER_COLORS[m.deviation_class] || MARKER_COLORS.unknown;
                const devStr = m.deviation_min != null
                  ? (m.deviation_min >= 0 ? '+' : '') + m.deviation_min.toFixed(3) + ' min'
                  : 'n/a';
                const refStr = m.reference_rt_min != null
                  ? m.reference_rt_min.toFixed(2) + ' min'
                  : 'n/a';
                const tip =
                  `${m.peptide}\n` +
                  `Observed: ${m.observed_rt_min.toFixed(3)} min\n` +
                  `Reference: ${refStr}\n` +
                  `Δ: ${devStr}  (${m.deviation_class})`;
                // v0.2.146: triangles enlarged 4px→8px wide, 7px→13px tall
                // with a black stroke so they read cleanly on any background.
                const TRI_W = 8, TRI_H = 13;
                const tri = `${x.toFixed(1)},${yBase.toFixed(1)} ` +
                            `${(x-TRI_W).toFixed(1)},${(yBase-TRI_H).toFixed(1)} ` +
                            `${(x+TRI_W).toFixed(1)},${(yBase-TRI_H).toFixed(1)}`;
                // Dotted vertical guide from the triangle up into the
                // chart so the operator can eyeball which part of the
                // TIC the peptide anchors to.
                return (
                  <g key={`cirt-${mi}`}>
                    <line x1={x} y1={padding} x2={x} y2={yBase-TRI_H}
                          stroke={c} strokeDasharray="2,3"
                          strokeWidth="0.9" opacity="0.5" />
                    <polygon points={tri} fill={c} stroke="#000" strokeWidth="1" strokeLinejoin="round">
                      <title>{tip}</title>
                    </polygon>
                  </g>
                );
              });
            })()}
          </svg>
          {/* Legend: one entry per trace with time + full run name.
              v0.2.146: legend now shows run_name (truncated, with full
              name on hover) — Brett pointed out the old legend only
              showed the instrument key which was useless for telling
              traces apart. Swatch width matches the line's thickness
              (recency). */}
          <div style={{display:'flex', flexDirection:'column', gap:'0.2rem',
                       fontSize:'0.72rem', color:'var(--text)',
                       marginTop:'0.4rem', paddingLeft:'1rem'}}>
            {series.map((s, si) => {
              const c = traceColor(si, palette);
              const lw = traceWidth(si, series.length);
              const dt = new Date(s.run.run_date);
              const timeStr = dt.toLocaleString([], {hour:'2-digit', minute:'2-digit'});
              const fullName = s.run.run_name || '—';
              const shortName = fullName.length > 48
                ? fullName.slice(0, 45) + '…'
                : fullName;
              return (
                <span key={`leg-${s.run.run_id}`}
                      title={fullName}
                      style={{display:'inline-flex', alignItems:'center',
                              gap:'0.45rem', fontVariantNumeric:'tabular-nums'}}>
                  <span style={{width:'1.1rem', height:`${lw}px`, background:c,
                                display:'inline-block', borderRadius:'1px',
                                flexShrink:0}} />
                  <span style={{color:'var(--muted)', width:'3.2rem', flexShrink:0}}>
                    {timeStr}
                  </span>
                  <span style={{fontFamily:'ui-monospace, Menlo, monospace',
                                whiteSpace:'nowrap', overflow:'hidden',
                                textOverflow:'ellipsis'}}>
                    {shortName}
                  </span>
                </span>
              );
            })}
          </div>
        </div>
      );
    }

    // Classify a run as "failed" — near-zero results indicate a broken
    // injection, empty file, or failed search rather than just a weak
    // sample. Mirrors the stan.community.validate.HARD_GATES thresholds
    // so the dashboard and the community-submission gate agree on what
    // counts as a failed run (n_precursors<5000 for DIA, n_psms<5000
    // for DDA). Used for the "hide failed" filter toggle and the red
    // failure badge on rows that escape the filter (e.g. when toggle is off).
    function isFailedRun(r) {
      if (!r) return false;
      const mode = (r.mode || '').toUpperCase();
      if (mode === 'DDA') {
        return (r.n_psms || 0) < 5000;
      }
      // Default to DIA rules for anything non-DDA (diaPASEF, DIA, etc.)
      return (r.n_precursors || 0) < 5000;
    }

    function RunHistory() {
      // Fetch with include_hidden=true so we can show/hide client-side
      // via a toggle without refetching. Hidden rows are filtered out
      // by default; the "Show hidden" toggle restores them with dim
      // styling so the operator can review or unhide.
      const { data: runs, loading, reload } = useFetch(
        '/api/runs?limit=1000&include_hidden=true'
      );
      const [sortKey, setSortKey] = useState('run_date');
      const [sortDir, setSortDir] = useState('desc');
      const [dateFilter, setDateFilter] = useState('all');
      const [searchTerm, setSearchTerm] = useState('');
      const [selectedRun, setSelectedRun] = useState(null);
      // Default: hide failed runs (near-zero results — see isFailedRun)
      // AND hide soft-deleted rows (hidden=1). Operator toggles them
      // back on with the controls at the top of the table.
      const [hideFailed, setHideFailed] = useState(true);
      const [showHidden, setShowHidden] = useState(false);

      if (loading) return <div className="empty">Loading...</div>;
      // Defensive: treat any non-array response as "no runs".
      if (!Array.isArray(runs) || runs.length === 0) {
        return <div className="empty">No runs recorded yet.</div>;
      }

      async function hideRun(run_id, current, runName) {
        const nowHidden = !current;
        let reason = '';
        if (nowHidden) {
          reason = window.prompt(
            `Hide "${runName}" from QC history?\n\n` +
            `Optional reason (saved with the row for later review):`,
            ''
          );
          if (reason === null) return;  // cancel
        }
        try {
          const res = await fetch(API + `/api/runs/${encodeURIComponent(run_id)}/hide`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ hidden: nowHidden, reason: reason || '' }),
          });
          if (!res.ok) {
            const text = await res.text();
            alert(`Hide failed: ${res.status} ${text}`);
            return;
          }
          reload();
        } catch (e) {
          alert(`Hide failed: ${e}`);
        }
      }

      // Filter by date range
      const now = new Date();
      const filterDate = (runDate) => {
        const d = new Date(runDate);
        if (dateFilter === 'all') return true;
        if (dateFilter === 'today') {
          return d.toDateString() === now.toDateString();
        }
        if (dateFilter === 'week') {
          const weekAgo = new Date(now.getTime() - 7 * 86400000);
          return d >= weekAgo;
        }
        if (dateFilter === 'month') {
          return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        }
        if (dateFilter === 'year') {
          return d.getFullYear() === now.getFullYear();
        }
        if (dateFilter === 'past') {
          return d.getFullYear() < now.getFullYear();
        }
        return true;
      };

      // Filter + sort
      let filtered = runs.filter(r => filterDate(r.run_date));
      // Hidden-row filter (hidden=1 means operator soft-deleted it)
      if (!showHidden) {
        filtered = filtered.filter(r => !r.hidden);
      }
      // Failed-run filter (near-zero precursors/PSMs)
      if (hideFailed) {
        filtered = filtered.filter(r => !isFailedRun(r));
      }
      if (searchTerm) {
        const term = searchTerm.toLowerCase();
        filtered = filtered.filter(r =>
          (r.run_name || '').toLowerCase().includes(term) ||
          (r.instrument || '').toLowerCase().includes(term)
        );
      }
      const getSortVal = (r) => {
        if (sortKey === 'primary_ids') return (r.mode === 'DDA' ? r.n_psms : r.n_precursors) || 0;
        return r[sortKey];
      };
      filtered.sort((a, b) => {
        let va = getSortVal(a);
        let vb = getSortVal(b);
        if (va == null) va = sortKey === 'run_date' ? '' : 0;
        if (vb == null) vb = sortKey === 'run_date' ? '' : 0;
        if (typeof va === 'string') {
          return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
        }
        return sortDir === 'asc' ? va - vb : vb - va;
      });

      const handleSort = (key) => {
        if (sortKey === key) {
          setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
        } else {
          setSortKey(key);
          setSortDir('desc');
        }
      };

      const SortHeader = ({col, label}) => (
        <th onClick={() => handleSort(col)} style={{cursor: 'pointer', userSelect: 'none'}}>
          {label}{sortKey === col ? (sortDir === 'asc' ? ' ▲' : ' ▼') : ''}
        </th>
      );

      const EM_DASH = '\u2014';
      const fmtNum = (n) => (n != null && n > 0) ? n.toLocaleString() : EM_DASH;
      const fmtFloat = (n, d=1) => (n != null) ? n.toFixed(d) : EM_DASH;
      const fmtSig = (n) => {
        if (n == null || n === 0) return EM_DASH;
        if (n >= 1e12) return (n/1e12).toFixed(1) + 'T';
        if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
        if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
        return n.toFixed(0);
      };
      const fmtSigned = (n, d=2) => {
        if (n == null) return EM_DASH;
        const sign = n >= 0 ? '+' : '';
        return sign + n.toFixed(d);
      };
      // FWHM stored in minutes; display as seconds with 1 decimal
      const fmtFwhmSec = (n) => (n != null && n > 0) ? (n * 60).toFixed(1) : EM_DASH;
      // Primary identifications: precursors for DIA, PSMs for DDA
      const primaryIds = (r) => r.mode === 'DDA' ? r.n_psms : r.n_precursors;

      return (
        <div className="card">
          <div style={{display:'flex', gap:'0.75rem', marginBottom:'0.75rem', flexWrap:'wrap', alignItems:'center'}}>
            <input
              type="text"
              placeholder="Search run name or instrument..."
              value={searchTerm}
              onChange={e => setSearchTerm(e.target.value)}
              style={{flex:'1 1 250px', padding:'0.4rem 0.6rem', background:'var(--bg)', color:'var(--text)', border:'1px solid var(--border)', borderRadius:'0.3rem'}}
            />
            <select
              value={dateFilter}
              onChange={e => setDateFilter(e.target.value)}
              style={{padding:'0.4rem 0.6rem', background:'var(--bg)', color:'var(--text)', border:'1px solid var(--border)', borderRadius:'0.3rem'}}
            >
              <option value="all">All time</option>
              <option value="today">Today</option>
              <option value="week">This week</option>
              <option value="month">This month</option>
              <option value="year">This year</option>
              <option value="past">Past years</option>
            </select>
            <label style={{display:'inline-flex', alignItems:'center', gap:'0.3rem', fontSize:'0.8rem', color:'var(--muted)'}}>
              <input type="checkbox" checked={hideFailed}
                     onChange={e => setHideFailed(e.target.checked)} />
              Hide failed
            </label>
            <label style={{display:'inline-flex', alignItems:'center', gap:'0.3rem', fontSize:'0.8rem', color:'var(--muted)'}}>
              <input type="checkbox" checked={showHidden}
                     onChange={e => setShowHidden(e.target.checked)} />
              Show hidden
            </label>
            <span style={{color:'var(--muted)', fontSize:'0.85rem'}}>
              {filtered.length} / {runs.length} runs
            </span>
          </div>
          <div style={{overflowX: 'auto'}}>
            <table>
              <thead><tr>
                <SortHeader col="run_name" label="Run" />
                <SortHeader col="instrument" label="Instrument" />
                <SortHeader col="mode" label="Mode" />
                <SortHeader col="ips_score" label="IPS" />
                <SortHeader col="peg_class" label="PEG" />
                <SortHeader col="drift_class" label="Drift" />
                <SortHeader col="primary_ids" label="Precursors / PSMs" />
                <SortHeader col="n_peptides" label="Peptides" />
                <SortHeader col="n_proteins" label="Proteins" />
                <SortHeader col="ms1_signal" label="MS1 Signal" />
                <SortHeader col="fwhm_rt_min" label="FWHM (s)" />
                <SortHeader col="median_mass_acc_ms1_ppm" label="Mass Acc ppm" />
                <SortHeader col="run_date" label="Date" />
                <th>Hide</th>
              </tr></thead>
              <tbody>
                {filtered.map(r => {
                  const ids = primaryIds(r);
                  const idsLabel = r.mode === 'DDA' ? 'PSMs' : 'Prec';
                  const failed = isFailedRun(r);
                  const isHidden = !!r.hidden;
                  // Dim hidden rows (visible only when "Show hidden"
                  // toggle is on) and subtly red-tint failed rows.
                  const rowStyle = {
                    cursor: 'pointer',
                    opacity: isHidden ? 0.5 : 1,
                    textDecoration: isHidden ? 'line-through' : 'none',
                    background: failed && !isHidden ? 'rgba(239,68,68,0.07)' : undefined,
                  };
                  return (
                    <tr key={r.id} onClick={() => setSelectedRun(r)} style={rowStyle}
                        title={isHidden ? `Hidden: ${r.hidden_reason || '(no reason given)'}` : (failed ? 'Near-zero result — flagged as failed run' : undefined)}>
                      <td style={{maxWidth:'280px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                        {failed && !isHidden && (
                          <span title="Failed run (below community-gate threshold)"
                                style={{display:'inline-block', width:'0.5rem', height:'0.5rem',
                                        background:'#ef4444', borderRadius:'50%',
                                        marginRight:'0.4rem', verticalAlign:'middle'}} />
                        )}
                        {r.run_name}
                      </td>
                      <td>{r.instrument}</td>
                      <td>{r.mode}</td>
                      <td><IpsBadge run={r} /></td>
                      <td><PegBadge run={r} /></td>
                      <td><DriftBadge run={r} /></td>
                      <td title={`${idsLabel}: ${ids != null ? ids.toLocaleString() : EM_DASH}`}>
                        {fmtNum(ids)} <span style={{color:'var(--muted)', fontSize:'0.7rem'}}>{ids > 0 ? idsLabel : ''}</span>
                      </td>
                      <td>{fmtNum(r.n_peptides)}</td>
                      <td>{fmtNum(r.n_proteins)}</td>
                      <td>{r.ms1_signal ? r.ms1_signal.toExponential(2) : EM_DASH}</td>
                      <td>{fmtFwhmSec(r.fwhm_rt_min)}</td>
                      <td>{fmtSigned(r.median_mass_acc_ms1_ppm, 2)}</td>
                      <td>{new Date(r.run_date).toLocaleString([], {year:'2-digit', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</td>
                      <td>
                        <button
                          onClick={(e) => { e.stopPropagation(); hideRun(r.id, isHidden, r.run_name); }}
                          title={isHidden ? 'Restore this run to the QC history' : 'Hide this run from the QC history (reversible)'}
                          style={{
                            padding:'0.15rem 0.45rem', fontSize:'0.7rem',
                            background:'var(--bg)', color:'var(--text)',
                            border:'1px solid var(--border)', borderRadius:'0.25rem',
                            cursor:'pointer',
                          }}>
                          {isHidden ? '↺ Restore' : '× Hide'}
                        </button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          {selectedRun && (
            <TicViewer
              runId={selectedRun.id}
              runName={selectedRun.run_name}
              instrument={selectedRun.instrument}
              spd={selectedRun.spd}
              onClose={() => setSelectedRun(null)}
            />
          )}
        </div>
      );
    }

    /* ── TIC Viewer Modal ──────────────────────────────────────────── */

    function TicViewer({ runId, runName, instrument, spd, onClose }) {
      const [tic, setTic] = useState(null);
      const [communityTic, setCommunityTic] = useState(null);
      const [loading, setLoading] = useState(true);
      const [showCommunity, setShowCommunity] = useState(true);

      useEffect(() => {
        fetch(API + `/api/runs/${runId}/tic`)
          .then(r => r.ok ? r.json() : null)
          .then(setTic)
          .catch(() => setTic(null))
          .finally(() => setLoading(false));
      }, [runId]);

      useEffect(() => {
        if (!instrument || !spd) return;
        // Infer instrument family
        const family = instrument.toLowerCase().includes('tims') ? 'timsTOF' :
                       instrument.toLowerCase().includes('astral') ? 'Astral' :
                       instrument.toLowerCase().includes('exploris') ? 'Exploris' :
                       instrument.toLowerCase().includes('lumos') || instrument.toLowerCase().includes('fusion') ? 'Fusion Lumos' :
                       'Orbitrap';
        // Try common cohort ID patterns
        const cohortIds = [
          `${family}_${spd}spd_low`,
          `${family}_${spd}spd`,
        ];
        (async () => {
          for (const cid of cohortIds) {
            try {
              const r = await fetch(`https://brettsp-stan.hf.space/api/cohorts/${encodeURIComponent(cid)}/tic`);
              if (r.ok) {
                const data = await r.json();
                if (data && data.median_tic) {
                  setCommunityTic(data);
                  return;
                }
              }
            } catch (e) {}
          }
        })();
      }, [instrument, spd]);

      if (loading) {
        return (
          <div style={{position:'fixed', top:0, left:0, right:0, bottom:0, background:'rgba(0,0,0,0.7)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000}}>
            <div className="card">Loading TIC...</div>
          </div>
        );
      }
      if (!tic) {
        return (
          <div style={{position:'fixed', top:0, left:0, right:0, bottom:0, background:'rgba(0,0,0,0.7)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000}} onClick={onClose}>
            <div className="card" style={{maxWidth:'500px'}}>
              <h3>No TIC data for this run</h3>
              <p>Re-run baseline with 0.2.40+ to extract TIC data.</p>
              <button onClick={onClose} style={{padding:'0.5rem 1rem', marginTop:'0.5rem'}}>Close</button>
            </div>
          </div>
        );
      }

      // Build SVG TIC plot
      const width = 900, height = 400, pad = 50;
      const rt = tic.rt_min;
      const intensity = tic.intensity;
      const rtMin = Math.min(...rt);
      const rtMax = Math.max(...rt);
      const maxInt = Math.max(...intensity);

      // Normalize run's TIC
      const runPoints = rt.map((r, i) => {
        const x = pad + ((r - rtMin) / (rtMax - rtMin)) * (width - 2*pad);
        const y = height - pad - (intensity[i] / maxInt) * (height - 2*pad);
        return [x, y];
      });
      const runPath = runPoints.map(([x,y],i) => `${i===0?'M':'L'}${x.toFixed(1)},${y.toFixed(1)}`).join(' ');

      // Community median trace (if available and toggle on)
      let commPath = null;
      if (showCommunity && communityTic && communityTic.median_tic) {
        const cRt = communityTic.median_tic.rt;
        const cInt = communityTic.median_tic.intensity;
        const cMax = Math.max(...cInt);
        if (cMax > 0 && cRt.length > 1) {
          const cPoints = cRt.map((r, i) => {
            const x = pad + ((r - rtMin) / (rtMax - rtMin)) * (width - 2*pad);
            const y = height - pad - (cInt[i] / cMax) * (height - 2*pad);
            return [x, y];
          });
          commPath = cPoints.map(([x,y],i) => `${i===0?'M':'L'}${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
        }
      }

      return (
        <div style={{position:'fixed', top:0, left:0, right:0, bottom:0, background:'rgba(0,0,0,0.85)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000, padding:'1rem'}} onClick={onClose}>
          <div className="card" style={{maxWidth:'1000px', width:'100%', maxHeight:'90vh', overflow:'auto'}} onClick={e => e.stopPropagation()}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'1rem'}}>
              <div>
                <h3 style={{margin:0, wordBreak:'break-all'}}>{runName}</h3>
                <div style={{color:'var(--muted)', fontSize:'0.85rem', marginTop:'0.25rem'}}>
                  {instrument} · SPD {spd || '?'}
                </div>
              </div>
              <button onClick={onClose} style={{padding:'0.4rem 0.8rem', background:'var(--bg)', color:'var(--text)', border:'1px solid var(--border)', borderRadius:'0.3rem', cursor:'pointer'}}>✕ Close</button>
            </div>
            {communityTic && (
              <label style={{display:'inline-flex', alignItems:'center', gap:'0.4rem', marginBottom:'0.5rem', fontSize:'0.85rem', cursor:'pointer'}}>
                <input type="checkbox" checked={showCommunity} onChange={e => setShowCommunity(e.target.checked)} />
                Show community median ({communityTic.n_traces || 0} traces)
              </label>
            )}
            <svg viewBox={`0 0 ${width} ${height}`} style={{width:'100%', height:'auto', background:'var(--bg)', borderRadius:'0.3rem'}}>
              {/* Axes */}
              <line x1={pad} y1={height-pad} x2={width-pad} y2={height-pad} stroke="var(--muted)" strokeWidth="1" />
              <line x1={pad} y1={pad} x2={pad} y2={height-pad} stroke="var(--muted)" strokeWidth="1" />
              {/* Community median (dashed orange) */}
              {commPath && <path d={commPath} fill="none" stroke="#ff6b35" strokeWidth="2.5" strokeDasharray="6,4" />}
              {/* Run TIC (solid blue) */}
              <path d={runPath} fill="none" stroke="#60a5fa" strokeWidth="2" />
              {/* Labels */}
              <text x={width/2} y={height-10} fill="var(--muted)" fontSize="12" textAnchor="middle">Retention Time (min)</text>
              <text x={15} y={height/2} fill="var(--muted)" fontSize="12" textAnchor="middle" transform={`rotate(-90, 15, ${height/2})`}>Intensity</text>
              <text x={pad} y={pad+15} fill="#60a5fa" fontSize="11">━ This run</text>
              {commPath && <text x={pad} y={pad+30} fill="#ff6b35" fontSize="11">┅ Community median</text>}
              <text x={width-pad} y={pad+15} fill="var(--muted)" fontSize="11" textAnchor="end">
                RT: {rtMin.toFixed(1)} - {rtMax.toFixed(1)} min · {rt.length} bins
              </text>
            </svg>
          </div>
        </div>
      );
    }

    /* ── Maintenance Event Marker ──────────────────────────────────── */

    function EventMarker({ event }) {
      const [hover, setHover] = useState(false);
      const typeLabels = {
        column_change: 'Column change',
        source_clean: 'Source clean',
        calibration: 'Calibration',
        pm: 'PM',
        lc_service: 'LC service',
        other: 'Other',

      const typeColors = {
        column_change: 'var(--accent)',
        source_clean: 'var(--pass)',

      const label = typeLabels[event.event_type] || event.event_type;

        <div
          onMouseEnter={() => setHover(true)}

        >

            width:'2px', height:'100%', minHeight:'1.6rem',
            borderLeft:`2px dashed ${color}`, display:'inline-block', verticalAlign:'middle',
          }} />
          <span style={{
            fontSize:'0.65rem', color, fontWeight:700, marginLeft:'0.2rem',
            verticalAlign:'middle', cursor:'default',
          }}>
            {label}
          </span>
          {hover && (
            <div style={{
              position:'absolute', bottom:'100%', left:0, zIndex:10,

              {event.operator && <div style={{color:'var(--muted)'}}>By: {event.operator}</div>}
              {event.notes && <div style={{color:'var(--text)', marginTop:'0.2rem'}}>{event.notes}</div>}
            </div>

    }

    /* ── Maintenance Events Table ─────────────────────────────────── */

    function MaintenanceEventsTable({ events }) {
      if (!events || events.length === 0) {
        return <div style={{color:'var(--muted)', fontSize:'0.85rem', padding:'0.5rem 0'}}>No maintenance events recorded.</div>;
      }

      const typeLabels = {
        column_change: 'Column Change',
        source_clean: 'Source Clean',
        calibration: 'Calibration',
        pm: 'PM',
        lc_service: 'LC Service',
        other: 'Other',
      };
      const typeColors = {
        column_change: '#60a5fa',
        source_clean: '#22c55e',
        calibration: '#eab308',
        pm: '#a78bfa',
        lc_service: '#f472b6',
        other: '#94a3b8',
      };

      return (
        <div style={{overflowX:'auto'}}>
          <table style={{fontSize:'0.8rem'}}>
            <thead>
              <tr>
                <th>Date</th>
                <th>Type</th>
                <th>Notes</th>
                <th>Column Info</th>
                <th>Operator</th>
              </tr>
            </thead>
            <tbody>
              {events.slice(0, 20).map(ev => {
                const color = typeColors[ev.event_type] || '#94a3b8';
                const colInfo = [ev.column_vendor, ev.column_model, ev.column_serial].filter(Boolean).join(' / ');
                return (
                  <tr key={ev.id}>
                    <td style={{whiteSpace:'nowrap'}}>{new Date(ev.event_date).toLocaleDateString([], {year:'2-digit', month:'short', day:'numeric'})}</td>
                    <td>
                      <span style={{
                        display:'inline-block', padding:'0.1rem 0.4rem', borderRadius:'999px',
                        fontSize:'0.72rem', fontWeight:600, background:color, color:'#000',
                      }}>
                        {typeLabels[ev.event_type] || ev.event_type}
                      </span>
                    </td>
                    <td style={{maxWidth:'300px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}} title={ev.notes}>{ev.notes || '\u2014'}</td>
                    <td style={{color:'var(--muted)', fontSize:'0.75rem'}}>{colInfo || '\u2014'}</td>
                    <td style={{color:'var(--muted)'}}>{ev.operator || '\u2014'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      );
    }

    function TrendCharts() {
      // Pull instruments from actual runs in the DB, not from instruments.yml config
      const { data: allRuns } = useFetch('/api/runs?limit=1000');
      const [selected, setSelected] = useState(null);
      const [trends, setTrends] = useState(null);
      const [events, setEvents] = useState([]);
      const [timeFilter, setTimeFilter] = useState('all');
      const [eventsVersion, setEventsVersion] = useState(0);
      // Community cohort percentiles — fetched once, filtered client-side
      // to the cohorts relevant to the selected instrument.
      const { data: community } = useFetch('/api/community/cohort');

      const names = useMemo(() => {
        if (!allRuns) return [];
        return [...new Set(allRuns.map(r => r.instrument).filter(Boolean))];
      }, [allRuns]);

      useEffect(() => { if (names.length && !selected) setSelected(names[0]); }, [names]);
      useEffect(() => {
        if (!selected) return;
        fetch(API + `/api/trends/${encodeURIComponent(selected)}?limit=500`).then(r => r.json()).then(setTrends);
        fetch(API + `/api/instruments/${encodeURIComponent(selected)}/events?limit=50`).then(r => r.json()).then(d => setEvents(d || []));
      }, [selected, eventsVersion]);

      const handleEventSaved = useCallback(() => {
        setEventsVersion(v => v + 1);
      }, []);

      // Filter trends by time range
      const filteredTrends = useMemo(() => {
        if (!trends) return null;
        if (timeFilter === 'all') return trends;
        const now = new Date();
        const cutoffs = {
          week: 7,
          month: 30,
          '3month': 90,
          '6month': 180,
          year: 365,
        };
        const days = cutoffs[timeFilter] || 0;
        if (!days) return trends;
        const cutoff = new Date(now.getTime() - days * 86400000);
        return trends.filter(r => new Date(r.run_date) >= cutoff);
      }, [trends, timeFilter]);

      // Merge events into trend data by finding the nearest run date for each event
      function findEventsBetween(runs, idx) {
        if (!events.length || !runs || !runs.length) return [];
        const runDate = new Date(runs[idx]?.run_date);
        const prevDate = idx > 0 ? new Date(runs[idx - 1]?.run_date) : new Date(0);
        return events.filter(e => {
          const ed = new Date(e.event_date);
          return ed > prevDate && ed <= runDate;
        });
      }

      return (
        <div>
          <div className="tabs" style={{marginBottom: '1rem'}}>
            {names.length === 0 ? (
              <div style={{color:'var(--muted)'}}>No runs in database yet. Run a baseline first.</div>
            ) : names.map(n => <div key={n} className={`tab ${n === selected ? 'active' : ''}`} onClick={() => setSelected(n)}>{n}</div>)}
          </div>
          {selected && (
            <div className="card" style={{marginBottom:'1rem'}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:'0.5rem'}}>
                <h3 style={{margin:0}}>Maintenance Log</h3>
                <LogEventButton instrument={selected} onSaved={handleEventSaved} />
              </div>
              <MaintenanceEventsTable events={events} />
            </div>
          )}
          <div style={{display:'flex', gap:'0.5rem', marginBottom:'1rem', flexWrap:'wrap', alignItems:'center'}}>
            <span style={{fontSize:'0.85rem', color:'var(--muted)'}}>Time range:</span>
            {[['week','Week'], ['month','Month'], ['3month','3 Months'], ['6month','6 Months'], ['year','Year'], ['all','All']].map(([k, label]) => (
              <button key={k}
                onClick={() => setTimeFilter(k)}
                style={{
                  padding:'0.3rem 0.7rem',
                  background: timeFilter === k ? 'var(--accent)' : 'var(--bg)',
                  color: timeFilter === k ? '#000' : 'var(--text)',
                  border:'1px solid var(--border)',
                  borderRadius:'0.3rem',
                  cursor:'pointer',
                  fontSize:'0.8rem',
                }}>{label}</button>
            ))}
            {filteredTrends && <span style={{fontSize:'0.85rem', color:'var(--muted)', marginLeft:'auto'}}>{filteredTrends.length} runs</span>}
          </div>
          {!filteredTrends || filteredTrends.length === 0
            ? <div className="empty">No trend data for {selected || 'this instrument'}.</div>
            : <TrendGraphs runs={filteredTrends} events={events} community={community} selected={selected} timeFilter={timeFilter} />
          }
        </div>
      );
    }

    // Color palette for per-SPD series. Stable order so the same
    // SPD always gets the same color across all trend cards.
    const SPD_PALETTE = ['#60a5fa', '#f97316', '#a78bfa', '#22c55e', '#eab308', '#f472b6', '#14b8a6'];
    function spdColor(spd, idx) {
      return SPD_PALETTE[idx % SPD_PALETTE.length];
    }

    // Map an instrument_model string to the community cohort family
    // name. Mirror of stan.community.submit._instrument_family so the
    // client-side community-median lookup matches what submit.py
    // writes into cohort_id.
    function instrumentFamily(model) {
      if (!model) return '';
      const m = String(model).toLowerCase();
      if (m.includes('timstof') || m.includes('tims tof')) return 'timsTOF';
      if (m.includes('astral')) return 'Astral';
      if (m.includes('exploris')) return 'Exploris';
      if (m.includes('lumos') || m.includes('fusion')) return 'Lumos';
      if (m.includes('eclipse')) return 'Eclipse';
      if (m.includes('orbitrap')) return 'Orbitrap';
      return model;
    }

    // Given sorted percentile array from the community cohort API,
    // return the median (p50) or null if the array is empty/missing.
    function cohortMedian(percentiles) {
      if (!Array.isArray(percentiles) || percentiles.length === 0) return null;
      return percentiles[Math.floor(percentiles.length / 2)];
    }

    // Look up the community median for a (family, spd, amount_ng, metric)
    // across all matching cohorts in the fetched /api/community/cohort
    // payload. We match on the broad cohort prefix (family_spd_amount)
    // and ignore the column suffix so reference lines aren't fragmented
    // across column variants.
    function communityMedian(community, family, spd, amount_ng, metric) {
      if (!community?.cohorts || !family || !spd) return null;
      // Broad cohort prefix: family_{spd}spd_{amount_bucket}
      // amount_bucket: see stan/metrics/scoring.py::amount_bucket
      const ab = amount_ng >= 1000 ? 'very-high'
        : amount_ng >= 500 ? 'high'
        : amount_ng >= 200 ? 'standard'
        : amount_ng >= 100 ? 'mid'
        : amount_ng >= 50 ? 'low'
        : 'ultra-low';
      const prefix = `${family}_${spd}spd_${ab}`;
      const matches = Object.keys(community.cohorts).filter(
        k => k === prefix || k.startsWith(prefix + '_')
      );
      if (!matches.length) return null;
      // Merge values across all matching cohorts, then median.
      const all = [];
      for (const cid of matches) {
        const arr = community.cohorts[cid]?.[metric];
        if (Array.isArray(arr)) all.push(...arr);
      }
      if (!all.length) return null;
      all.sort((a, b) => a - b);
      return all[Math.floor(all.length / 2)];
    }

    // SVG sparkline trend component with per-SPD series, this-instrument
    // median + community median reference lines, and hover tooltips.
    function Sparkline({ runs, metric, maintEvents, label,
                        community, instrumentModel, amount_ng=50,
                        height=160, showDrift=true, showZeroLine=false }) {
      if (!runs || runs.length < 2) {
        return <div style={{color:'var(--muted)', fontSize:'0.8rem'}}>Not enough data</div>;
      }

      // 1. Extract values; runs are already sorted by date (ascending)
      //    by TrendGraphs. Compute date-based x position so each dot
      //    sits at its actual calendar position instead of being
      //    evenly spaced — otherwise per-SPD lines would lie.
      const dates = runs.map(r => new Date(r.run_date).getTime());
      const tMin = Math.min(...dates);
      const tMax = Math.max(...dates);
      const tRange = (tMax - tMin) || 1;

      const vals = runs.map(r => {
        const v = r[metric];
        return (v == null || isNaN(v)) ? null : Number(v);
      });
      // For signed metrics where 0 is a meaningful value (directional drift),
      // keep zeros in the valid set. For other metrics, treat 0 as missing.
      const validVals = showZeroLine
        ? vals.filter(v => v != null)
        : vals.filter(v => v != null && v !== 0);
      if (validVals.length === 0) {
        return <div style={{color:'var(--muted)', fontSize:'0.8rem'}}>No {metric} values</div>;
      }
      let vMin = Math.min(...validVals);
      let vMax = Math.max(...validVals);
      if (showZeroLine) {
        // Expand range to always include 0 so the "no drift" line is visible.
        vMin = Math.min(vMin, 0);
        vMax = Math.max(vMax, 0);
      }
      const vRange = (vMax - vMin) || Math.abs(vMax) || 1;

      const width = 800;
      const padding = 14;
      const w = width - padding * 2;
      const h = height - padding * 2;

      // 2. Group runs by SPD bucket. null/0 → "unk" so they still plot.
      const groups = new Map();  // spd -> [{idx, x, y, run}]
      runs.forEach((r, i) => {
        if (vals[i] == null) return;
        const spd = r.spd || null;
        const key = spd || 'unk';
        const x = padding + ((dates[i] - tMin) / tRange) * w;
        const y = padding + h - ((vals[i] - vMin) / vRange) * h;
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push({ idx: i, x, y, run: r, value: vals[i] });
      });
      const groupKeys = [...groups.keys()].sort((a, b) => {
        if (a === 'unk') return 1;
        if (b === 'unk') return -1;
        return Number(b) - Number(a);  // 100 first, 30 last
      });

      // 3. This-instrument median (across all SPDs).
      const sortedVals = [...validVals].sort((a, b) => a - b);
      const instMedian = sortedVals[Math.floor(sortedVals.length / 2)];
      const instMedianY = padding + h - ((instMedian - vMin) / vRange) * h;

      // 4. Community median — per SPD when the cohort API has it.
      const family = instrumentFamily(instrumentModel);
      const communityMediansBySpd = new Map();
      if (community) {
        for (const key of groupKeys) {
          if (key === 'unk') continue;
          const cm = communityMedian(community, family, key, amount_ng, metric);
          if (cm != null) {
            communityMediansBySpd.set(key, {
              value: cm,
              y: padding + h - ((cm - vMin) / vRange) * h,
            });
          }
        }
      }

      // 5. Maintenance event vertical lines (time-axis based).
      const eventMarks = [];
      if (maintEvents) {
        for (const ev of maintEvents) {
          const t = new Date(ev.event_date).getTime();
          if (t < tMin || t > tMax) continue;
          const x = padding + ((t - tMin) / tRange) * w;
          eventMarks.push({ x, event: ev });
        }
      }

      // 5b. Drift marks — vertical dashed lines for runs flagged as drifted/warn.
      //     Drawn behind the trend line so points remain readable.
      const driftMarks = [];
      if (showDrift) {
        runs.forEach((r, i) => {
          const dc = r.drift_class;
          if (dc !== 'drifted' && dc !== 'warn') return;
          const x = padding + ((dates[i] - tMin) / tRange) * w;
          driftMarks.push({ x, run: r, severity: dc });
        });
      }

      const eventColors = {
        column_change:'#60a5fa', source_clean:'#22c55e',
        calibration:'#eab308', pm:'#a78bfa',
        lc_service:'#f472b6', other:'#94a3b8',
      };

      const zeroY = showZeroLine ? padding + h - ((0 - vMin) / vRange) * h : null;

      return (
        <div>
          <svg viewBox={`0 0 ${width} ${height}`} style={{width:'100%', height:`${height}px`}}>
            {/* Zero baseline for signed metrics — solid so direction is obvious */}
            {showZeroLine && (
              <line x1={padding} y1={zeroY} x2={width-padding} y2={zeroY}
                    stroke="#94a3b8" strokeWidth="1.2" opacity="0.7">
                <title>No drift (0.0)</title>
              </line>
            )}
            {/* This-instrument median — muted gray dashes */}
            <line x1={padding} y1={instMedianY} x2={width-padding} y2={instMedianY}
                  stroke="var(--muted)" strokeDasharray="4,4" strokeWidth="1" opacity="0.55">
              <title>This instrument median: {instMedian.toLocaleString()}</title>
            </line>
            {/* Community median — one faint dashed line per SPD, colored to match */}
            {[...communityMediansBySpd.entries()].map(([spd, cm], i) => {
              const idx = groupKeys.indexOf(spd);
              const c = spdColor(spd, idx);
              return (
                <line key={`cm-${spd}`} x1={padding} y1={cm.y} x2={width-padding} y2={cm.y}
                      stroke={c} strokeDasharray="2,5" strokeWidth="1.2" opacity="0.45">
                  <title>Community median @ {spd} SPD: {cm.value.toLocaleString()}</title>
                </line>
              );
            })}
            {/* Drift marks — drawn behind events/trend so points stay on top */}
            {driftMarks.map((dm, i) => {
              const c = dm.severity === 'drifted' ? '#ef4444' : '#f59e0b';
              return (
                <line key={`drift-${i}`} x1={dm.x} y1={padding} x2={dm.x} y2={height-padding}
                      stroke={c} strokeDasharray="2,3" strokeWidth="1.2" opacity="0.45">
                  <title>{`DIA window drift (${dm.severity}): ${dm.run.run_name}`}</title>
                </line>
              );
            })}
            {/* Maintenance events */}
            {eventMarks.map((em, i) => {
              const c = eventColors[em.event.event_type] || '#94a3b8';
              return (
                <line key={`ev-${i}`} x1={em.x} y1={padding} x2={em.x} y2={height-padding}
                      stroke={c} strokeDasharray="3,3" strokeWidth="2" opacity="0.7">
                  <title>{em.event.event_type}: {em.event.notes || em.event.event_date}</title>
                </line>
              );
            })}
            {/* Per-SPD trend lines */}
            {groupKeys.map((spd, gi) => {
              const pts = groups.get(spd);
              if (pts.length < 2) return null;
              const c = spdColor(spd, gi);
              const d = pts.map((p, i) =>
                `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`
              ).join(' ');
              return <path key={`line-${spd}`} d={d} fill="none" stroke={c} strokeWidth="2" opacity="0.9" />;
            })}
            {/* Per-SPD dots with hover tooltips */}
            {groupKeys.map((spd, gi) => {
              const pts = groups.get(spd);
              const c = spdColor(spd, gi);
              const cm = communityMediansBySpd.get(spd);
              const fmt = (v) => {
                if (v == null) return '—';
                // Integer-ish metrics print as localized ints; anything
                // with a fractional part prints with 2 decimals.
                return (Math.abs(v - Math.round(v)) < 1e-6)
                  ? Math.round(v).toLocaleString()
                  : v.toFixed(2);
              };
              return pts.map(p => {
                const dt = new Date(p.run.run_date);
                const dateStr = dt.toLocaleString([], {
                  year:'numeric', month:'short', day:'numeric',
                  hour:'2-digit', minute:'2-digit',
                });
                const spdLabel = spd === 'unk' ? 'SPD unknown' : `${spd} SPD`;
                // Tooltip now shows both medians alongside the point's
                // own value so the operator can see context without
                // eyeballing the reference lines.
                const tip =
                  `${p.run.run_name}\n` +
                  `${metric}: ${fmt(p.value)}\n` +
                  `this instrument median: ${fmt(instMedian)}\n` +
                  `community median (${spdLabel}): ${fmt(cm ? cm.value : null)}\n` +
                  `${spdLabel}\n` +
                  `${dateStr}`;
                return (
                  <circle key={`dot-${spd}-${p.idx}`}
                          cx={p.x} cy={p.y} r="3.5" fill={c}
                          stroke="#fff" strokeWidth="0.5">
                    <title>{tip}</title>
                  </circle>
                );
              });
            })}
            <text x={padding} y={padding-3} fill="var(--muted)" fontSize="11">{label}</text>
            <text x={width-padding} y={padding-3} fill="var(--muted)" fontSize="11" textAnchor="end">
              min: {vMin.toLocaleString()} · max: {vMax.toLocaleString()}
            </text>
          </svg>
          {/* Legend: SPD colors + reference line markers */}
          <div style={{display:'flex', gap:'1rem', flexWrap:'wrap', fontSize:'0.72rem',
                       color:'var(--muted)', marginTop:'0.3rem', paddingLeft:'1rem'}}>
            {groupKeys.map((spd, gi) => (
              <span key={`leg-${spd}`} style={{display:'inline-flex', alignItems:'center', gap:'0.3rem'}}>
                <span style={{width:'1.1rem', height:'2px', background:spdColor(spd, gi),
                             display:'inline-block'}}></span>
                {spd === 'unk' ? 'SPD ?' : `${spd} SPD`} ({groups.get(spd).length})
              </span>
            ))}
            <span style={{display:'inline-flex', alignItems:'center', gap:'0.3rem'}}>
              <span style={{width:'1.1rem', borderTop:'1px dashed var(--muted)',
                            display:'inline-block'}}></span>
              this instrument median
            </span>
            {communityMediansBySpd.size > 0 && (
              <span style={{display:'inline-flex', alignItems:'center', gap:'0.3rem'}}>
                <span style={{width:'1.1rem', borderTop:'1.2px dashed #888',
                             display:'inline-block', opacity:0.5}}></span>
                community median (per SPD)
              </span>
            )}
          </div>
        </div>
      );
    }

    function TrendGraphs({ runs, events, community, selected, timeFilter }) {
      // Sort runs by date ascending for trend plotting
      const sorted = useMemo(
        () => [...runs].sort((a, b) => new Date(a.run_date) - new Date(b.run_date)),
        [runs],
      );
      // Use the instrument model from the first run. All runs in a
      // trends call are from the same instrument but `selected` is the

    // cIRT anchor retention-time chart.
    //
    // Shows observed RT over time for the endogenous-HeLa anchor
    // peptide panel seeded in stan/metrics/cirt.py (one line per
    // peptide). Must split by SPD because the same peptide elutes
    // at very different absolute RTs on different gradients — a
    // 30-SPD peptide at 25 min would dominate the y-axis and
    // flatten out a 100-SPD peptide at 7 min.
    //
    // Empty state: show instructions when no irt_anchor_rts rows
    // exist for the selected instrument (user hasn't run
    // `stan backfill-cirt` yet, or their instrument doesn't have
    // a seeded panel for any SPD).
    function CIRTCard({ instrument, timeFilter }) {
      const [data, setData] = useState(null);
      const [selectedSpd, setSelectedSpd] = useState(null);

      useEffect(() => {
        if (!instrument) return;
        setData(null);
        fetch(API + `/api/cirt/${encodeURIComponent(instrument)}?limit=500`)
          .then(r => r.json())
          .then(setData)
          .catch(() => setData({ peptides: {}, n_runs: 0 }));
      }, [instrument]);

      // Apply the Trends-page time filter (Week / Month / etc.) to
      // every peptide's observation list. Without this the chart
      // always shows the full 500-run history regardless of the
      // button the user picked at the top of the page.
      const filteredData = useMemo(() => {
        if (!data?.peptides) return data;
        const cutoffs = { week: 7, month: 30, '3month': 90, '6month': 180, year: 365 };
        const days = cutoffs[timeFilter];
        if (!days) return data;
        const cutoff = new Date(Date.now() - days * 86400000);
        const out = {};
        for (const [seq, p] of Object.entries(data.peptides)) {
          const obs = p.observations.filter(o => new Date(o.run_date) >= cutoff);
          if (obs.length) out[seq] = { ...p, observations: obs };
        }
        return { ...data, peptides: out };
      }, [data, timeFilter]);

      // Every SPD that appears in at least one observation across
      // all peptides. Defaulting to the SPD with the most data.
      const availableSpds = useMemo(() => {
        if (!filteredData?.peptides) return [];
        const counts = new Map();
        for (const p of Object.values(filteredData.peptides)) {
          for (const o of p.observations) {
            const k = o.spd || null;
            counts.set(k, (counts.get(k) || 0) + 1);
          }
        }
        return [...counts.entries()]
          .sort((a, b) => (b[1] - a[1]))
          .map(([k]) => k);
      }, [filteredData]);

      useEffect(() => {
        if (availableSpds.length && selectedSpd == null) {
          setSelectedSpd(availableSpds[0]);
        }
      }, [availableSpds, selectedSpd]);

      if (!data) {
        return (
          <div className="card">
            <h3>cIRT anchor RT drift</h3>
            <div style={{color:'var(--muted)', fontSize:'0.85rem'}}>Loading…</div>
          </div>
        );
      }
      if (!data.peptides || Object.keys(data.peptides).length === 0) {
        return (
          <div className="card">
            <h3>cIRT anchor RT drift</h3>
            <div style={{color:'var(--muted)', fontSize:'0.85rem'}}>
              No cIRT anchors extracted for {instrument}. Run{' '}
              <code>stan backfill-cirt</code> to populate this chart from
              existing report.parquet files. Requires a seeded panel
              for the instrument family — see{' '}
              <code>stan/metrics/cirt.py::EMPIRICAL_CIRT_PANELS</code>.
            </div>
          </div>
        );
      }
      if (!filteredData.peptides || Object.keys(filteredData.peptides).length === 0) {
        return (
          <div className="card">
            <h3>cIRT anchor RT drift</h3>
            <div style={{color:'var(--muted)', fontSize:'0.85rem'}}>
              No cIRT anchors in the selected time range. Widen the Time range filter above.
            </div>
          </div>
        );
      }

      return (
        <div className="card">
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:'0.5rem'}}>
            <h3 style={{margin:0}}>cIRT anchor RT drift</h3>
            <div style={{display:'flex', gap:'0.4rem', alignItems:'center', fontSize:'0.8rem'}}>
              <span style={{color:'var(--muted)'}}>SPD:</span>
              {availableSpds.map(spd => (
                <button key={`cirt-spd-${spd}`}
                  onClick={() => setSelectedSpd(spd)}
                  style={{
                    padding:'0.2rem 0.55rem',
                    background: selectedSpd === spd ? 'var(--accent)' : 'var(--bg)',
                    color: selectedSpd === spd ? '#000' : 'var(--text)',
                    border:'1px solid var(--border)',
                    borderRadius:'0.25rem', cursor:'pointer',
                    fontSize:'0.75rem',
                  }}>
                  {spd == null ? '?' : spd}
                </button>
              ))}
            </div>
          </div>
          <p style={{fontSize:'0.75rem', color:'var(--muted)', margin:'0.25rem 0 0.5rem 0'}}>
            Each line = one anchor peptide's observed RT across runs at this
            SPD. Flat lines = LC behaving normally; upward or downward drift =
            column/gradient change. Horizontal dashes = the panel's reference RT.
          </p>
          <CIRTSparkline peptides={filteredData.peptides} spd={selectedSpd} />
        </div>
      );
    }

    function CIRTSparkline({ peptides, spd, height=200 }) {
      // Filter each peptide's observations down to the chosen SPD.
      const series = useMemo(() => {
        const out = [];
        for (const [seq, p] of Object.entries(peptides)) {
          const obs = p.observations.filter(o =>
            (o.spd || null) === (spd || null)
          );
          if (obs.length < 1) continue;
          out.push({ peptide: seq, reference_rt_min: p.reference_rt_min, obs });
        }
        // Sort by reference RT so legend order matches RT order.
        out.sort((a, b) => (a.reference_rt_min || 0) - (b.reference_rt_min || 0));
        return out;
      }, [peptides, spd]);

      if (series.length === 0) {
        return (
          <div style={{color:'var(--muted)', fontSize:'0.8rem'}}>
            No anchor observations at this SPD.
          </div>
        );
      }

      // Shared x-axis = full date range across every peptide at this SPD.
      // Shared y-axis = full RT range observed across every peptide
      // (lets you see absolute RT differences at a glance — a flat line
      // at y=10 visually sits above one at y=5).
      const allDates = [];
      const allRts = [];
      for (const s of series) {
        for (const o of s.obs) {
          allDates.push(new Date(o.run_date).getTime());
          allRts.push(o.observed_rt_min);
        }
      }
      const tMin = Math.min(...allDates);
      const tMax = Math.max(...allDates);
      const tRange = (tMax - tMin) || 1;
      // Include reference RTs in the Y range so the dashed line is visible
      series.forEach(s => {
        if (s.reference_rt_min != null) allRts.push(s.reference_rt_min);
      });
      const rtMin = Math.min(...allRts);
      const rtMax = Math.max(...allRts);
      const rtRange = (rtMax - rtMin) || 1;

      const width = 800;
      const padding = 14;
      const w = width - padding * 2;
      const h = height - padding * 2;

      // Assign each peptide a stable color from the SPD palette
      const colorFor = (i) => SPD_PALETTE[i % SPD_PALETTE.length];

      return (
        <div>
          <svg viewBox={`0 0 ${width} ${height}`} style={{width:'100%', height:`${height}px`}}>
            {/* Reference-RT dashed line per peptide */}
            {series.map((s, si) => {
              if (s.reference_rt_min == null) return null;
              const y = padding + h - ((s.reference_rt_min - rtMin) / rtRange) * h;
              const c = colorFor(si);
              return (
                <line key={`ref-${s.peptide}`}
                      x1={padding} y1={y} x2={width-padding} y2={y}
                      stroke={c} strokeDasharray="2,6" strokeWidth="1" opacity="0.35">
                  <title>{s.peptide} reference: {s.reference_rt_min} min</title>
                </line>
              );
            })}
            {/* Observed-RT lines per peptide */}
            {series.map((s, si) => {
              const pts = s.obs
                .map(o => {
                  const t = new Date(o.run_date).getTime();
                  return {
                    x: padding + ((t - tMin) / tRange) * w,
                    y: padding + h - ((o.observed_rt_min - rtMin) / rtRange) * h,
                    obs: o,
                  };
                })
                .sort((a, b) => a.x - b.x);
              const c = colorFor(si);
              const d = pts.map((p, i) =>
                `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`
              ).join(' ');
              return (
                <g key={`line-${s.peptide}`}>
                  {pts.length > 1 && <path d={d} fill="none" stroke={c} strokeWidth="1.8" opacity="0.9" />}
                  {pts.map((p, pi) => {
                    const dt = new Date(p.obs.run_date);
                    const dateStr = dt.toLocaleString([], {
                      year:'numeric', month:'short', day:'numeric',
                      hour:'2-digit', minute:'2-digit',
                    });
                    const delta = s.reference_rt_min != null
                      ? (p.obs.observed_rt_min - s.reference_rt_min).toFixed(2)
                      : 'n/a';
                    const tip =
                      `${s.peptide}\n` +
                      `${p.obs.run_name}\n` +
                      `RT: ${p.obs.observed_rt_min.toFixed(2)} min (Δref ${delta})\n` +
                      `${dateStr}`;
                    return (
                      <circle key={`dot-${s.peptide}-${pi}`}
                              cx={p.x} cy={p.y} r="2.5" fill={c}
                              stroke="#fff" strokeWidth="0.4">
                        <title>{tip}</title>
                      </circle>
                    );
                  })}
                </g>
              );
            })}
            <text x={padding} y={padding-3} fill="var(--muted)" fontSize="11">RT (min)</text>
            <text x={width-padding} y={padding-3} fill="var(--muted)" fontSize="11" textAnchor="end">
              {rtMin.toFixed(1)} – {rtMax.toFixed(1)} min
            </text>
          </svg>
          <div style={{display:'flex', gap:'0.8rem', flexWrap:'wrap', fontSize:'0.7rem',
                       color:'var(--muted)', marginTop:'0.3rem', paddingLeft:'1rem'}}>
            {series.map((s, si) => (
              <span key={`cirt-leg-${s.peptide}`} style={{display:'inline-flex', alignItems:'center', gap:'0.3rem'}}>
                <span style={{width:'1rem', height:'2px', background:colorFor(si),
                              display:'inline-block'}}></span>
                {s.peptide}
                <span style={{color:'var(--muted)', opacity:0.7}}>
                  ({s.reference_rt_min != null ? `ref ${s.reference_rt_min.toFixed(1)}m` : 'no ref'}, n={s.obs.length})
                </span>
              </span>
            ))}
          </div>
        </div>
      );
    }
