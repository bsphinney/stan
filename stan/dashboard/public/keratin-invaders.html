<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Keratin Invaders — STAN Arcade</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0a0f1a; color: #e5e7eb;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    user-select: none;
  }
  #wrap {
    display: flex; flex-direction: column; align-items: center;
    padding: 12px;
  }
  #hud {
    display: flex; gap: 18px; align-items: center;
    margin-bottom: 8px; font-size: 14px;
  }
  #hud b { color: #fbbf24; }
  #hud .title { color: #f472b6; font-weight: bold; font-size: 16px; }
  #hud .subtitle { color: #94a3b8; font-style: italic; font-size: 12px; }
  #hud button {
    background: #1e293b; color: #e5e7eb;
    border: 1px solid #475569; padding: 6px 14px;
    border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  #hud button:hover { background: #334155; }
  canvas {
    background:
      radial-gradient(circle at 20% 20%, rgba(244,114,182,0.07), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(251,191,36,0.06), transparent 40%),
      #0a0f1a;
    border: 1px solid #334155;
    border-radius: 6px;
    cursor: none;
    touch-action: none;
  }
  #msg {
    margin-top: 6px; font-size: 13px; color: #94a3b8;
    min-height: 20px;
  }
  #msg.win { color: #22c55e; font-weight: bold; }
  #msg.lose { color: #ef4444; font-weight: bold; }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span class="title">💇 Keratin Invaders</span>
    <span class="subtitle">filter the hair before it ruins your HeLa digest</span>
    <span>Hairs filtered: <b id="score">0</b></span>
    <span>Level: <b id="level">1</b></span>
    <span>Cleanroom integrity: <b id="lives">3</b></span>
    <button onclick="resetGame()">Reset</button>
  </div>
  <canvas id="game" width="900" height="600"></canvas>
  <div id="msg">← → or mouse to move HEPA · SPACE or click to fire — bullets kill invaders AND mid-air hairs</div>
</div>
<script>
const W = 900, H = 600;
const PLAYER_Y = H - 44;
const PLAYER_W = 70, PLAYER_H = 26;

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const levelEl = document.getElementById('level');
const livesEl = document.getElementById('lives');
const msgEl = document.getElementById('msg');

// ── Invader species ─────────────────────────────────────────
// Each species maps to a real keratin contaminant family.
// Hippies = human skin keratins (K1/K10/K14 — the Big Three of
// every trypsin digest). Dogs = KRT82/KRT86 (canine hair).
// Cats = KRT77 + friends (feline hair, the worst offender
// because cat dander travels for days).
const SPECIES = {
  hippie: {
    emoji: '🧔', hp: 1, hair: '#a16207',
    body: '#fde68a', label: 'K1/K10',
    score: 10,
  },
  dog: {
    emoji: '🐕', hp: 2, hair: '#78350f',
    body: '#fcd34d', label: 'KRT86',
    score: 25,
  },
  cat: {
    emoji: '🐈', hp: 3, hair: '#1c1917',
    body: '#e0e7ff', label: 'KRT77',
    score: 50,
  },
};

// ── Game state ───────────────────────────────────────────────
const state = {
  player: { x: W / 2 - PLAYER_W / 2, vx: 0 },
  bullets: [],
  enemies: [],
  hairs: [],
  particles: [],
  keys: {},
  score: 0,
  level: 1,
  lives: 3,
  mouseX: null,
  gameOver: false,
  levelCleared: false,
  enemyDir: 1,
  enemySpeed: 0.55,
  enemyDropTimer: 0,
  message: '',
};

function buildEnemies(level) {
  const cols = 9;
  const startX = 80, startY = 70;
  const gapX = 85, gapY = 56;
  const enemies = [];
  // Top row = cats (hardest), middle = dogs, bottom = hippies.
  // On later levels more rows appear starting from the top.
  const rowSpec = [
    { kind: 'cat' },
    { kind: 'dog' },
    { kind: 'hippie' },
  ];
  const nRows = Math.min(3 + Math.floor((level - 1) / 2), 5);
  for (let r = 0; r < Math.min(nRows, rowSpec.length); r++) {
    for (let c = 0; c < cols; c++) {
      const sp = SPECIES[rowSpec[r].kind];
      enemies.push({
        x: startX + c * gapX,
        y: startY + r * gapY,
        w: 46, h: 42,
        hp: sp.hp, maxHp: sp.hp,
        kind: rowSpec[r].kind,
        alive: true,
        wobble: Math.random() * Math.PI,
      });
    }
  }
  // Extra "boss" rows of cats on higher levels
  for (let r = rowSpec.length; r < nRows; r++) {
    for (let c = 0; c < cols; c++) {
      enemies.push({
        x: startX + c * gapX,
        y: startY + r * gapY,
        w: 46, h: 42,
        hp: 3, maxHp: 3,
        kind: 'cat',
        alive: true,
        wobble: Math.random() * Math.PI,
      });
    }
  }
  return enemies;
}

function resetGame() {
  state.player = { x: W / 2 - PLAYER_W / 2, vx: 0 };
  state.bullets = [];
  state.hairs = [];
  state.particles = [];
  state.score = 0;
  state.level = 1;
  state.lives = 3;
  state.gameOver = false;
  state.levelCleared = false;
  state.enemyDir = 1;
  state.enemySpeed = 0.55;
  state.enemies = buildEnemies(1);
  state.message = 'Cats have 3x the HP of hippies. Aim accordingly.';
  msgEl.className = '';
  updateHud();
}

function nextLevel() {
  state.level++;
  state.enemies = buildEnemies(state.level);
  state.bullets = [];
  state.hairs = [];
  state.enemyDir = 1;
  state.enemySpeed = 0.55 + state.level * 0.12;
  state.levelCleared = false;
  state.message = `Level ${state.level}: more rows, faster shedding.`;
  msgEl.className = '';
  updateHud();
}

function updateHud() {
  scoreEl.textContent = state.score;
  levelEl.textContent = state.level;
  livesEl.textContent = state.lives;
  if (state.message) msgEl.textContent = state.message;
}

// ── Drawing ──────────────────────────────────────────────────
function drawStars() {
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = 0; i < 30; i++) {
    const x = (i * 137) % W;
    const y = (i * 83 + Date.now() * 0.015) % H;
    ctx.fillRect(x, y, 1, 1);
  }
}

function drawPlayer() {
  const p = state.player;
  // HEPA air intake — hexagonal prism
  ctx.fillStyle = '#22c55e';
  ctx.beginPath();
  ctx.moveTo(p.x, PLAYER_Y + PLAYER_H);
  ctx.lineTo(p.x + 12, PLAYER_Y);
  ctx.lineTo(p.x + PLAYER_W - 12, PLAYER_Y);
  ctx.lineTo(p.x + PLAYER_W, PLAYER_Y + PLAYER_H);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#14532d';
  ctx.lineWidth = 2;
  ctx.stroke();
  // HEPA grille
  ctx.strokeStyle = '#052e16';
  ctx.lineWidth = 1;
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(p.x + 16, PLAYER_Y + 6 + i * 5);
    ctx.lineTo(p.x + PLAYER_W - 16, PLAYER_Y + 6 + i * 5);
    ctx.stroke();
  }
  // Label
  ctx.font = 'bold 8px sans-serif';
  ctx.fillStyle = '#052e16';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('HEPA', p.x + PLAYER_W / 2, PLAYER_Y + PLAYER_H - 6);
}

function drawEnemy(e) {
  if (!e.alive) return;
  const sp = SPECIES[e.kind];
  const cx = e.x + e.w / 2;
  const cy = e.y + e.h / 2;
  const hpFrac = e.hp / e.maxHp;

  // Hair tufts around the body (more tufts when hp high)
  const tufts = Math.round(12 * hpFrac);
  ctx.strokeStyle = sp.hair;
  ctx.lineWidth = 1.5;
  for (let i = 0; i < tufts; i++) {
    const a = (i / tufts) * Math.PI * 2 + e.wobble;
    const r1 = 20;
    const r2 = 26 + Math.sin(Date.now() * 0.005 + i) * 2;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1);
    ctx.lineTo(cx + Math.cos(a) * r2, cy + Math.sin(a) * r2);
    ctx.stroke();
  }

  // Body — soft rounded shape
  ctx.globalAlpha = 0.5 + 0.5 * hpFrac;
  ctx.fillStyle = sp.body;
  ctx.beginPath();
  ctx.ellipse(cx, cy, 20, 17, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Emoji face
  ctx.font = '22px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(sp.emoji, cx, cy + 2);

  // Tiny keratin label below
  ctx.font = '8px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.fillText(sp.label, cx, e.y + e.h + 2);
}

function drawBullet(b) {
  // HEPA airflow — upward arrow / puff
  ctx.strokeStyle = '#86efac';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(b.x, b.y);
  ctx.lineTo(b.x, b.y + 10);
  ctx.moveTo(b.x - 3, b.y + 3);
  ctx.lineTo(b.x + 3, b.y + 3);
  ctx.stroke();
}

function drawHair(h) {
  // Hair strand falling — wavy
  ctx.strokeStyle = h.color;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  const wiggle = Math.sin(Date.now() * 0.01 + h.phase) * 3;
  ctx.moveTo(h.x + wiggle, h.y - 6);
  ctx.lineTo(h.x - wiggle, h.y - 2);
  ctx.lineTo(h.x + wiggle, h.y + 2);
  ctx.lineTo(h.x - wiggle, h.y + 6);
  ctx.stroke();
}

function drawParticles() {
  for (const p of state.particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillRect(p.x, p.y, p.size, p.size);
    ctx.globalAlpha = 1;
  }
}

function drawSourceLine() {
  const sourceY = PLAYER_Y - 10;
  ctx.strokeStyle = 'rgba(239,68,68,0.35)';
  ctx.setLineDash([5, 5]);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, sourceY);
  ctx.lineTo(W, sourceY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.font = '10px sans-serif';
  ctx.fillStyle = 'rgba(239,68,68,0.5)';
  ctx.textAlign = 'right';
  ctx.fillText('clean bench threshold', W - 10, sourceY - 4);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawStars();
  drawSourceLine();
  state.enemies.forEach(drawEnemy);
  state.bullets.forEach(drawBullet);
  state.hairs.forEach(drawHair);
  drawPlayer();
  drawParticles();
  if (state.gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ef4444';
    ctx.font = 'bold 32px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('CLEANROOM CONTAMINATED', W / 2, H / 2 - 20);
    ctx.fillStyle = '#e5e7eb';
    ctx.font = '16px sans-serif';
    ctx.fillText(`Final score: ${state.score} hairs · reached level ${state.level}`, W / 2, H / 2 + 20);
    ctx.fillText('Every HeLa run for the next week will show K1 and K10 at 10× abundance.', W / 2, H / 2 + 44);
    ctx.fillText('Click Reset to start over.', W / 2, H / 2 + 68);
  }
}

// ── Physics ──────────────────────────────────────────────────
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    state.particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 5,
      vy: (Math.random() - 0.5) * 5,
      size: 2 + Math.random() * 2,
      color,
      life: 20 + Math.random() * 15,
      maxLife: 30,
    });
  }
}

function step() {
  if (state.gameOver) return;

  // Player input
  if (state.keys['ArrowLeft']) state.player.vx = -5;
  else if (state.keys['ArrowRight']) state.player.vx = 5;
  else state.player.vx = 0;
  state.player.x += state.player.vx;
  if (state.mouseX !== null) {
    state.player.x += (state.mouseX - PLAYER_W / 2 - state.player.x) * 0.25;
  }
  state.player.x = Math.max(0, Math.min(W - PLAYER_W, state.player.x));

  // Bullets
  for (const b of state.bullets) b.y -= 9;
  state.bullets = state.bullets.filter(b => b.y > -10);

  // Enemy horizontal slide
  let hitEdge = false;
  for (const e of state.enemies) {
    if (!e.alive) continue;
    e.x += state.enemyDir * state.enemySpeed;
    if (e.x < 20 || e.x + e.w > W - 20) hitEdge = true;
  }
  if (hitEdge) {
    state.enemyDir *= -1;
    for (const e of state.enemies) if (e.alive) e.y += 18;
  }

  // Enemy hair drops
  state.enemyDropTimer--;
  if (state.enemyDropTimer <= 0) {
    const live = state.enemies.filter(e => e.alive);
    if (live.length > 0) {
      const shooter = live[Math.floor(Math.random() * live.length)];
      state.hairs.push({
        x: shooter.x + shooter.w / 2,
        y: shooter.y + shooter.h,
        vy: 2 + state.level * 0.25,
        color: SPECIES[shooter.kind].hair,
        phase: Math.random() * Math.PI * 2,
      });
    }
    state.enemyDropTimer = 85 - state.level * 7;
    if (state.enemyDropTimer < 22) state.enemyDropTimer = 22;
  }
  for (const h of state.hairs) h.y += h.vy;

  // Bullet × enemy
  for (const b of state.bullets) {
    for (const e of state.enemies) {
      if (!e.alive) continue;
      if (b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
        e.hp--;
        b.y = -100;
        spawnParticles(b.x, b.y + 5, '#86efac', 4);
        if (e.hp <= 0) {
          e.alive = false;
          state.score += SPECIES[e.kind].score;
          spawnParticles(e.x + e.w / 2, e.y + e.h / 2, SPECIES[e.kind].hair, 16);
        }
        break;
      }
    }
  }

  // v0.2.236: bullets also vaporize falling hairs. Without this,
  // there's no defensive option once a hair has shed — the only
  // way to stop incoming hairs was to kill the shedder before
  // it dropped. Now you can shoot mid-air strands too. +2 score
  // per neutralized hair so it's lower-value than killing a
  // shedder but still worth the shot.
  const HAIR_HIT_RADIUS = 6;
  for (const b of state.bullets) {
    if (b.y < -10) continue;
    for (const h of state.hairs) {
      if (h.y > H + 10) continue;
      const dx = b.x - h.x;
      const dy = b.y - h.y;
      if (dx*dx + dy*dy < HAIR_HIT_RADIUS * HAIR_HIT_RADIUS) {
        b.y = -100;
        h.y = H + 100;
        state.score += 2;
        spawnParticles(h.x, h.y, h.color, 6);
        break;
      }
    }
  }

  state.bullets = state.bullets.filter(b => b.y > -10);

  // Hair × player
  const p = state.player;
  for (const h of state.hairs) {
    if (h.x > p.x && h.x < p.x + PLAYER_W && h.y > PLAYER_Y && h.y < PLAYER_Y + PLAYER_H) {
      state.lives--;
      h.y = H + 100;
      spawnParticles(h.x, PLAYER_Y, h.color, 14);
      state.message = `Keratin got through! ${state.lives} filter lives left.`;
      if (state.lives <= 0) {
        state.gameOver = true;
        state.message = 'Cleanroom contaminated. K1/K10 in every sample for a week.';
        msgEl.className = 'lose';
      }
    }
  }
  state.hairs = state.hairs.filter(h => h.y < H + 20);

  // Invaders reaching bench = immediate loss
  for (const e of state.enemies) {
    if (e.alive && e.y + e.h > PLAYER_Y - 10) {
      state.gameOver = true;
      state.message = `A ${e.kind} got onto your bench. Game over.`;
      msgEl.className = 'lose';
      break;
    }
  }

  // High-score submission: fire once on game-over via postMessage to
  // the parent arcade.html, which relays to the HF Space leaderboard.
  if (state.gameOver && !state._submitted) {
    state._submitted = true;
    try {
      window.parent.postMessage({
        type: 'arcade-score',
        game: 'keratin_invaders',
        score: state.score,
        won: false,  // game-over here means contamination breach
        level: state.level,
      }, '*');
    } catch (_) {}
  }

  // Particles
  for (const pt of state.particles) {
    pt.x += pt.vx;
    pt.y += pt.vy;
    pt.life--;
  }
  state.particles = state.particles.filter(p => p.life > 0);

  // Level cleared?
  const aliveCount = state.enemies.filter(e => e.alive).length;
  if (aliveCount === 0 && !state.levelCleared && !state.gameOver) {
    state.levelCleared = true;
    state.score += 50 * state.lives;
    state.message = `Level ${state.level} clean! +${50 * state.lives} filter bonus.`;
    msgEl.className = 'win';
    setTimeout(() => { if (!state.gameOver) nextLevel(); }, 1400);
  }

  updateHud();
}

// ── Input ────────────────────────────────────────────────────
window.addEventListener('keydown', (e) => {
  state.keys[e.code] = true;
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    fireBullet();
  }
});
window.addEventListener('keyup', (e) => { state.keys[e.code] = false; });

canvas.addEventListener('mousemove', (e) => {
  const r = canvas.getBoundingClientRect();
  state.mouseX = (e.clientX - r.left) * (W / r.width);
});
canvas.addEventListener('mouseleave', () => { state.mouseX = null; });
canvas.addEventListener('mousedown', () => { fireBullet(); });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  state.mouseX = (e.touches[0].clientX - r.left) * (W / r.width);
}, { passive: false });
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  state.mouseX = (e.touches[0].clientX - r.left) * (W / r.width);
  fireBullet();
}, { passive: false });

let lastFireT = 0;
function fireBullet() {
  if (state.gameOver) return;
  const now = Date.now();
  if (now - lastFireT < 200) return;
  lastFireT = now;
  state.bullets.push({ x: state.player.x + PLAYER_W / 2, y: PLAYER_Y });
}

function loop() {
  step();
  draw();
  requestAnimationFrame(loop);
}

resetGame();
loop();
</script>
</body>
</html>
